name: GlutiWise Weekly Collector (Supabase Direct)

on:
  schedule:
    - cron: "0 3 * * 1" # Mon 03:00 UTC
  workflow_dispatch:
    inputs:
      write_to_supabase:
        description: "לכתוב ל-Supabase (true/false)"
        required: true
        default: "true"

      limit_prices:
        description: "LIMIT קבצים (מומלץ = 999999 בלי LIMIT)"
        required: true
        default: "999999"

      max_records:
        description: "מגבלת records (מומלץ = 700000)"
        required: true
        default: "700000"

      max_stores:
        description: "מגבלת stores (MVP=30)"
        required: true
        default: "30"

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      # אם זו הרצה ידנית (workflow_dispatch) – קח מה-inputs,
      # אחרת (schedule) – תן ברירות מחדל “גדולות” כמו שצריך.
      LIMIT: ${{ (github.event_name == 'workflow_dispatch' && inputs.limit_prices) || '999999' }}
      MAX_RECORDS: ${{ (github.event_name == 'workflow_dispatch' && inputs.max_records) || '700000' }}
      MAX_STORES: ${{ (github.event_name == 'workflow_dispatch' && inputs.max_stores) || '30' }}
      WRITE_TO_SUPABASE: ${{ (github.event_name == 'workflow_dispatch' && inputs.write_to_supabase) || 'true' }}

    steps:
      - name: Prepare folders
        run: |
          mkdir -p dumps out

      - name: Pull scraper image
        run: |
          docker pull erlichsefi/israeli-supermarket-scarpers:latest

      - name: Download STORE + PRICE files (hardcoded types)
        run: |
          set -euo pipefail
          ENABLED_FILE_TYPES="STORE_FILE,PRICE_FULL_FILE"
          docker run --rm \
            -v "${{ github.workspace }}/dumps:/usr/src/app/dumps" \
            -e ENABLED_SCRAPERS="RAMI_LEVY,SHUFERSAL,YOHANANOF" \
            -e ENABLED_FILE_TYPES="$ENABLED_FILE_TYPES" \
            -e LIMIT="$LIMIT" \
            erlichsefi/israeli-supermarket-scarpers:latest

      - name: Build payload (ALLOWLIST) + products/stores/records json (keys uniform) [ROBUST BARCODE]
        env:
          MAX_RECORDS: ${{ env.MAX_RECORDS }}
          MAX_STORES: ${{ env.MAX_STORES }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, re, json, glob, gzip, zipfile
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone
          from collections import defaultdict, Counter

          MAX_RECORDS_TOTAL = int(os.environ.get("MAX_RECORDS","30000"))
          MAX_STORES_TOTAL  = int(os.environ.get("MAX_STORES","30"))

          ALLOWED_STORE_KEYS = {
              "ramilevy:43","shufersal:714","ramilevy:51","ramilevy:374","ramilevy:615","ramilevy:171",
              "shufersal:033","shufersal:719","shufersal:034","shufersal:724","shufersal:726","shufersal:725",
              "ramilevy:244","ramilevy:57","ramilevy:27","shufersal:046",
              "yohananof:032","yohananof:024","yohananof:021","yohananof:026","yohananof:053","yohananof:035",
          }

          # תקרה פר-סניף נגזרת מהתקציב הכולל
          MAX_PER_STORE = max(5000, MAX_RECORDS_TOTAL // max(1, len(ALLOWED_STORE_KEYS)))
          c = Counter()

          def dt_to_z(dt: datetime) -> str:
              return dt.astimezone(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00","Z")

          def now_z():
              return dt_to_z(datetime.now(timezone.utc))

          def localname(tag): return tag.split("}")[-1] if "}" in tag else tag
          def norm(s): return re.sub(r"\s+"," ",(s or "").strip())

          def canon_id(s: str) -> str:
              s=(s or "").strip()
              if re.fullmatch(r"\d+", s or ""):
                  try: return str(int(s))
                  except: return s
              return s

          def valid_barcode(bc: str) -> bool:
              return bool(re.fullmatch(r"\d{8,13}", (bc or "").strip()))

          def source_dt_from_path(path: str) -> datetime:
              """
              מנסה לחלץ תאריך/שעה מהשם (אם קיים),
              אחרת נופל ל-mtime. זה מאפשר Latest-only אמיתי.
              """
              bn = os.path.basename(path)
              # YYYYMMDDHHMMSS
              m = re.search(r"(20\d{12})", bn)
              if m:
                  c["src_from_name_14"] += 1
                  return datetime.strptime(m.group(1), "%Y%m%d%H%M%S").replace(tzinfo=timezone.utc)
              # YYYYMMDDHHMM
              m = re.search(r"(20\d{10})", bn)
              if m:
                  c["src_from_name_12"] += 1
                  return datetime.strptime(m.group(1), "%Y%m%d%H%M").replace(tzinfo=timezone.utc)
              # YYYYMMDD
              m = re.search(r"(20\d{6})", bn)
              if m:
                  c["src_from_name_8"] += 1
                  return datetime.strptime(m.group(1), "%Y%m%d").replace(tzinfo=timezone.utc)

              c["src_from_mtime"] += 1
              return datetime.fromtimestamp(os.path.getmtime(path), tz=timezone.utc)

          def load_xml_roots(path):
              lp=path.lower()
              if lp.endswith(".zip"):
                  roots=[]
                  with zipfile.ZipFile(path,"r") as z:
                      for nm in z.namelist():
                          if nm.lower().endswith(".xml"):
                              roots.append(ET.fromstring(z.read(nm)))
                  return roots
              if lp.endswith(".xml.gz") or lp.endswith(".gz"):
                  with gzip.open(path,"rb") as f:
                      return [ET.fromstring(f.read())]
              return [ET.parse(path).getroot()]

          def iter_dump_paths():
              # דטרמיניסטי: כדי ש"latest" יהיה עקבי ריצה-לריצה
              for p in sorted(glob.glob("dumps/**/*", recursive=True)):
                  if os.path.isfile(p) and p.lower().endswith((".xml",".gz",".zip",".xml.gz")):
                      yield p

          def extract_any(elem, keys):
              keys={k.lower() for k in keys}
              for el in elem.iter():
                  if localname(el.tag).lower() in keys and (el.text or "").strip():
                      return norm(el.text)
              return ""

          # allowlist index
          allow_index = defaultdict(set)      # (retailer, canon_store_id)->{store_key}
          allow_index_any = defaultdict(set)  # canon_store_id->{store_key}
          for sk in ALLOWED_STORE_KEYS:
              r, sid = sk.split(":", 1)
              cc = canon_id(sid)
              allow_index[(r, cc)].add(sk)
              allow_index_any[cc].add(sk)

          CHAINID_TO_RETAILER={
              "7290027600007":"ramilevy",
              "7290058140886":"shufersal",
              "7290803800003":"yohananof",
          }

          def retailer_from(chain_id, chain_name):
              if (chain_id or "") in CHAINID_TO_RETAILER:
                  return CHAINID_TO_RETAILER[chain_id]
              cn=chain_name or ""
              if "שופרסל" in cn: return "shufersal"
              if "רמי" in cn: return "ramilevy"
              if "יוחננוף" in cn or "YOHANANOF" in cn.upper(): return "yohananof"
              return None

          def pick_store_key(chain_id, chain_name, store_id_raw):
              rid = canon_id(store_id_raw)
              retailer = retailer_from(chain_id, chain_name)
              if retailer:
                  cands = allow_index.get((retailer, rid), set())
                  if len(cands) == 1: return next(iter(cands))
                  return None
              cands_any = allow_index_any.get(rid, set())
              if len(cands_any) == 1: return next(iter(cands_any))
              return None

          def is_gf_candidate(name: str) -> bool:
              n = (name or "").strip()
              nl = n.lower()
              return ("ללא גלוטן" in n) or ("gluten free" in nl) or ("gluten-free" in nl)

          # חילוץ ברקוד “חסין”
          def extract_barcode(node):
              BARCODE_KEYS_ORDER = ["barcode", "gtin", "ean", "itemcode", "itemid", "itemnumber", "code"]
              keys_set = set(BARCODE_KEYS_ORDER)

              def digits_only(s: str) -> str:
                  return re.sub(r"\D", "", (s or ""))

              found = {k: [] for k in BARCODE_KEYS_ORDER}
              found["attr"] = []
              any_digits_candidate = False

              for el in node.iter():
                  t = localname(el.tag).lower()
                  if t in keys_set:
                      v = (el.text or "").strip()
                      if v:
                          dv = digits_only(norm(v))
                          if dv:
                              any_digits_candidate = True
                          found[t].append(dv)

              for el in node.iter():
                  for k, v in (el.attrib or {}).items():
                      kk = str(k).lower()
                      if any(x in kk for x in ["barcode", "gtin", "ean", "itemcode", "code"]):
                          vv = (v or "").strip()
                          if vv:
                              dv = digits_only(norm(vv))
                              if dv:
                                  any_digits_candidate = True
                              found["attr"].append(dv)

              for k in BARCODE_KEYS_ORDER + ["attr"]:
                  for cand in found.get(k, []):
                      if cand and valid_barcode(cand):
                          return cand

              if any_digits_candidate:
                  c["invalid_barcode"] += 1
              else:
                  c["no_barcode"] += 1
              return ""

          # stores אמיתיים רק מקבצי STORE
          store_dict = {}

          def city_from_shuf_name(name: str) -> str:
              n=norm(name)
              if not n: return ""
              parts=n.split(" ")
              if len(parts)>=2:
                  last2=" ".join(parts[-2:])
                  if re.search(r"[א-ת]", last2): return last2
              last1=parts[-1]
              if re.search(r"[א-ת]", last1): return last1
              return ""

          # --- STORE SCAN ---
          for path in iter_dump_paths():
              try:
                  roots=load_xml_roots(path)
              except Exception:
                  c["store_load_error"] += 1
                  continue

              has_store_tag = False
              for root in roots:
                  if any(localname(el.tag).lower()=="store" for el in root.iter()):
                      has_store_tag = True
                      break
              if not has_store_tag:
                  continue

              c["store_files"] += 1
              for root in roots:
                  c["store_roots"] += 1
                  chain_id = extract_any(root, {"chainid"})
                  chain_name = extract_any(root, {"chainname"})
                  retailer = retailer_from(chain_id, chain_name)
                  if not retailer:
                      c["store_root_no_retailer"] += 1
                      continue

                  for el in root.iter():
                      if localname(el.tag).lower() != "store":
                          continue
                      c["store_nodes"] += 1
                      sid_raw = extract_any(el, {"storeid"}).strip()
                      if not sid_raw:
                          c["store_node_no_storeid"] += 1
                          continue

                      cands = allow_index.get((retailer, canon_id(sid_raw)), set())
                      if len(cands) != 1:
                          c["store_node_not_allowlisted_or_ambiguous"] += 1
                          continue

                      sk = next(iter(cands))
                      c["store_nodes_matched"] += 1

                      name = extract_any(el, {"storename"}) or ""
                      address = extract_any(el, {"address"}) or ""
                      if address.lower() == "unknown": address = ""
                      city = extract_any(el, {"city"}) or ""
                      if (not city) or city.lower() == "unknown" or re.fullmatch(r"\d+", city or ""):
                          city = ""
                      if retailer == "shufersal" and not city:
                          city = city_from_shuf_name(name)

                      store_dict[sk] = {
                          "retailer": retailer,
                          "store_id": sid_raw,
                          "store_key": sk,
                          "store_name": name,
                          "city": city,
                          "address": address,
                          "area": "",
                          "store_type": "",
                      }

          PRICE_KEYS={"itemprice","price","unitprice","saleprice","priceafterdiscount","priceinclvat"}
          NAME_KEYS={"itemname","itemdescription","productname","description","name"}

          def safe_float(x):
              x=(x or "").strip().replace(",", ".")
              try:
                  v=float(x)
                  return v if v>0 else None
              except:
                  return None

          dedup = {}
          per_store_count = defaultdict(int)
          barcode_to_name = {}
          roots_matched_per_store = defaultdict(int)

          stop = False
          # --- PRICE SCAN ---
          for path in iter_dump_paths():
              if stop: break
              base=os.path.basename(path).lower()
              if base.startswith("stores"):
                  continue

              src_dt = source_dt_from_path(path)
              src_ts = int(src_dt.timestamp())

              try:
                  roots=load_xml_roots(path)
              except Exception:
                  c["price_load_error"] += 1
                  continue

              c["price_files"] += 1

              for root in roots:
                  if stop: break
                  c["price_roots"] += 1

                  chain_id=extract_any(root, {"chainid"})
                  chain_name=extract_any(root, {"chainname"})
                  store_id_raw = extract_any(root, {"storeid"}).strip()
                  if not store_id_raw:
                      c["price_root_no_storeid"] += 1
                      continue

                  sk = pick_store_key(chain_id, chain_name, store_id_raw)
                  if not sk:
                      c["price_root_not_allowlisted_or_ambiguous"] += 1
                      continue

                  if per_store_count[sk] >= MAX_PER_STORE:
                      c["price_root_store_cap_skip"] += 1
                      continue

                  roots_matched_per_store[sk] += 1
                  updated_at = dt_to_z(src_dt)

                  for node in root.iter():
                      if localname(node.tag).lower() not in {"item","product"}:
                          continue

                      c["item_nodes"] += 1

                      bc = extract_barcode(node)
                      if not bc:
                          continue

                      raw_price = extract_any(node, PRICE_KEYS)
                      if not (raw_price or "").strip():
                          c["no_price_text"] += 1
                          continue

                      pv = safe_float(raw_price)
                      if pv is None:
                          c["bad_price"] += 1
                          continue

                      nm = extract_any(node, NAME_KEYS).strip()
                      if bc not in barcode_to_name and nm:
                          barcode_to_name[bc]=nm

                      price_key = f"{bc}:{sk}"
                      rec = {
                          "price_key": price_key,
                          "barcode": bc,
                          "store_key": sk,
                          "price": pv,
                          "updated_at": updated_at,
                          "_src_ts": src_ts,
                      }

                      ex = dedup.get(price_key)
                      if ex is not None:
                          c["dup_seen"] += 1
                          # Latest-only: מחליפים אם המקור החדש יותר
                          if src_ts > ex.get("_src_ts", -1):
                              c["dup_replaced_newer"] += 1
                              dedup[price_key] = rec
                          else:
                              c["dup_kept_existing"] += 1
                          continue

                      dedup[price_key] = rec
                      per_store_count[sk] += 1
                      c["records_kept"] += 1

                      if len(dedup) >= MAX_RECORDS_TOTAL:
                          c["hit_max_records"] += 1
                          stop = True
                          break

          if not dedup:
              raise SystemExit("No PRICE records produced after filtering. Aborting.")

          stores_with_records = sorted(per_store_count.keys(), key=lambda k: (-per_store_count[k], k))
          chosen_keys = stores_with_records[:MAX_STORES_TOTAL]
          chosen_set = set(chosen_keys)

          # מסירים שדות פנימיים לפני כתיבה
          records = []
          for r in dedup.values():
              if r["store_key"] not in chosen_set:
                  continue
              records.append({k:v for k,v in r.items() if not k.startswith("_")})

          stores  = [store_dict[sk] for sk in chosen_keys if sk in store_dict]
          used_barcodes = sorted(set(r["barcode"] for r in records))

          missing_store_rows = sum(1 for sk in chosen_keys if sk not in store_dict)
          c["chosen_missing_store_rows"] = missing_store_rows
          c["stores_with_records"] = len(per_store_count)
          c["chosen_stores"] = len(chosen_keys)
          c["final_records"] = len(records)
          c["final_unique_barcodes"] = len(used_barcodes)

          # ✅ products עם מפתחות אחידים (uniform keys) כדי לא לשבור bulk insert
          # ואת ההגנה על gf_verified נעשה בשלב ה-Upsert (INSERT-ONLY ל-products).
          now = now_z()
          products_upsert = []
          for bc in used_barcodes:
              nm = barcode_to_name.get(bc) or ""
              gf = bool(is_gf_candidate(nm))
              if gf:
                  c["gf_candidates"] += 1
              products_upsert.append({
                  "barcode": bc,
                  "name": nm,
                  "category": None,
                  "gf_flag": gf,
                  "gf_verified": False,
                  "substitute_group": None,
                  "gf_source": ("name_heuristic" if gf else None),
                  "gf_updated_at": (now if gf else None),
              })

          os.makedirs("out", exist_ok=True)
          with open("out/products_upsert.json","w",encoding="utf-8") as f:
              json.dump(products_upsert, f, ensure_ascii=False)
          with open("out/stores_upsert.json","w",encoding="utf-8") as f:
              json.dump(stores, f, ensure_ascii=False)
          with open("out/records_upsert.json","w",encoding="utf-8") as f:
              json.dump(records, f, ensure_ascii=False)

          # TOP 5: כמה roots התאימו לכל store (כדי להבין כמה snapshots יש לכל סניף)
          top_roots = sorted(roots_matched_per_store.items(), key=lambda kv: (-kv[1], kv[0]))[:5]
          top_roots_s = ";".join([f"{k}={v}" for k,v in top_roots]) if top_roots else ""

          summary = (
              f"SUMMARY stores={len(chosen_keys)} records={len(records)} unique_barcodes={len(used_barcodes)} "
              f"MAX_PER_STORE={MAX_PER_STORE} "
              f"| PARAMS max_records={MAX_RECORDS_TOTAL} max_stores={MAX_STORES_TOTAL} allowlist={len(ALLOWED_STORE_KEYS)} "
              f"| COUNTS store_files={c.get('store_files',0)} store_roots={c.get('store_roots',0)} store_nodes={c.get('store_nodes',0)} store_matched={c.get('store_nodes_matched',0)} "
              f"price_files={c.get('price_files',0)} price_roots={c.get('price_roots',0)} "
              f"root_no_storeid={c.get('price_root_no_storeid',0)} root_not_allowlisted={c.get('price_root_not_allowlisted_or_ambiguous',0)} root_store_cap_skip={c.get('price_root_store_cap_skip',0)} "
              f"item_nodes={c.get('item_nodes',0)} no_barcode={c.get('no_barcode',0)} invalid_barcode={c.get('invalid_barcode',0)} "
              f"no_price_text={c.get('no_price_text',0)} bad_price={c.get('bad_price',0)} "
              f"dup_seen={c.get('dup_seen',0)} dup_replaced_newer={c.get('dup_replaced_newer',0)} dup_kept_existing={c.get('dup_kept_existing',0)} "
              f"src_name14={c.get('src_from_name_14',0)} src_name12={c.get('src_from_name_12',0)} src_name8={c.get('src_from_name_8',0)} src_mtime={c.get('src_from_mtime',0)} "
              f"gf_candidates={c.get('gf_candidates',0)} "
              f"hit_max_records={c.get('hit_max_records',0)} stores_with_records={c.get('stores_with_records',0)} chosen_missing_store_rows={c.get('chosen_missing_store_rows',0)} "
              f"| TOP_ROOTS {top_roots_s}"
          )
          print(summary)
          PY

      - name: Upsert to Supabase (products -> stores -> prices_current) [FAIL HARD + BATCH + SHOW ERROR]
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_JWT: ${{ secrets.SUPABASE_SERVICE_ROLE_JWT }}
          WRITE_TO_SUPABASE: ${{ env.WRITE_TO_SUPABASE }}
        run: |
          set -euo pipefail
          echo "WRITE_TO_SUPABASE=$WRITE_TO_SUPABASE"
          test -f out/products_upsert.json
          test -f out/stores_upsert.json
          test -f out/records_upsert.json

          if [ "$WRITE_TO_SUPABASE" != "true" ]; then
            echo "DRY RUN: not writing to Supabase."
            exit 0
          fi

          # products: INSERT-ONLY כדי לא לדרוס gf_verified/שדות אחרים בעתיד
          PREFER_HDR_PRODUCTS="Prefer: resolution=ignore-duplicates,return=minimal,missing=default"
          # stores/prices_current: upsert רגיל
          PREFER_HDR_MERGE="Prefer: resolution=merge-duplicates,return=minimal,missing=default"

          mkdir -p out/chunks

          python3 - <<'PY'
          import json, os
          def split_json_array(src, prefix, chunk_size):
              arr = json.load(open(src, "r", encoding="utf-8"))
              if not isinstance(arr, list):
                  raise SystemExit(f"{src} is not a JSON array")
              if not arr:
                  return 0
              os.makedirs(os.path.dirname(prefix), exist_ok=True)
              n = 0
              for i in range(0, len(arr), chunk_size):
                  n += 1
                  part = arr[i:i+chunk_size]
                  with open(f"{prefix}{n:04d}.json", "w", encoding="utf-8") as f:
                      json.dump(part, f, ensure_ascii=False)
              return n

          n_prod = split_json_array("out/products_upsert.json", "out/chunks/products_", 5000)
          n_store = split_json_array("out/stores_upsert.json",   "out/chunks/stores_",   1000)
          n_rec  = split_json_array("out/records_upsert.json",  "out/chunks/records_",  5000)
          print("CHUNKS products=", n_prod, "stores=", n_store, "records=", n_rec)
          PY

          post_chunk () {
            local url="$1"
            local file="$2"
            local prefer="$3"
            echo "POST $url  file=$file"
            curl --fail-with-body -sS -o /tmp/supabase_resp.txt -X POST "$url" \
              -H "Content-Type: application/json" \
              -H "$prefer" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_JWT}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_JWT}" \
              --data-binary @"$file" \
              || { echo "❌ Supabase error body:"; sed -n '1,200p' /tmp/supabase_resp.txt; exit 1; }
          }

          # products: INSERT-ONLY
          for f in out/chunks/products_*.json; do
            [ -e "$f" ] || break
            post_chunk "${SUPABASE_URL}/rest/v1/products?on_conflict=barcode" "$f" "$PREFER_HDR_PRODUCTS"
          done

          # stores: MERGE
          if ls out/chunks/stores_*.json >/dev/null 2>&1; then
            for f in out/chunks/stores_*.json; do
              post_chunk "${SUPABASE_URL}/rest/v1/stores?on_conflict=store_key" "$f" "$PREFER_HDR_MERGE"
            done
          else
            echo "No stores chunks to send (OK)."
          fi

          # prices_current: MERGE
          for f in out/chunks/records_*.json; do
            [ -e "$f" ] || break
            post_chunk "${SUPABASE_URL}/rest/v1/prices_current?on_conflict=price_key" "$f" "$PREFER_HDR_MERGE"
          done

      - name: Upload artifacts (manual runs only)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: glutiwise-out
          path: out/
