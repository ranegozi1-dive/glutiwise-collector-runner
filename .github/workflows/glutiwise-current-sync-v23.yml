                  ]
              ),
              "top_stores_by_missing_family_count": [
                  {
                      "store_key": store_key,
                      "retailer": rows[0]["retailer"] if rows else None,
                      "city": rows[0]["city"] if rows else None,
                      "missing_family_count": sum(1 for row in rows if not row["has_any_family_candidate"]),
                      "missing_family_keys": [
                          row["comparison_family_key"]
                          for row in rows
