          def diagnose_family_gap_candidate(metadata: dict, family_rule: dict):
              category_key = clean_text(metadata.get("category_key"))
              family_tokens = metadata.get("family_tokens") or normalized_lookup_tokens_shadow(metadata.get("name") or "")
              matched_forbidden_pattern = first_matching_rule_pattern(family_rule.get("forbidden_tokens"), family_tokens)
              if matched_forbidden_pattern:
                  return "forbidden_token", matched_forbidden_pattern
              matched_required_pattern = first_matching_rule_pattern(family_rule.get("required_any_tokens"), family_tokens)
              matched_required_prefix = first_matching_rule_prefix(family_rule.get("required_any_prefixes"), family_tokens)
              if not category_matches_family_rule(category_key, family_rule):
                  if matched_required_pattern or matched_required_prefix:
                      return "strong_name_candidate_in_disallowed_category", category_key
                  return "category_not_allowed", None
              if not matched_required_pattern and not matched_required_prefix:
                  return "missing_required_token", None
              if family_rule.get("comparison_family_key") == "eggs":
                  eggs_non_shell_pattern = first_matching_rule_pattern(
                      ["\u05de\u05e6\u05d4", "\u05de\u05e6\u05d5\u05ea", "matzo", "bread", "\u05dc\u05d7\u05dd", "\u05e4\u05d9\u05ea\u05d4", "\u05d7\u05dc\u05d4", "cake", "cookie", "biscuit"],
                      family_tokens,
                  )
                  if eggs_non_shell_pattern:
                      return "eggs_non_shell_product", eggs_non_shell_pattern
                  eggs_weight_pattern = first_matching_rule_pattern(
                      ["\u05d2\u05e8", "\u05d2\u05e8\u05dd", "\u05e7\u05d2", "g", "kg"],
                      family_tokens,
                  )
                  if eggs_weight_pattern:
                      return "eggs_weight_not_shell_count", eggs_weight_pattern
              if family_rule.get("comparison_family_key") == "tahini_basic":
                  tahini_dip_pattern = first_matching_rule_pattern(
                      ["\u05d7\u05d5\u05de\u05d5\u05e1", "hummus", "\u05de\u05de\u05e8\u05d7", "spread", "dip", "\u05e1\u05dc\u05d8"],
                      family_tokens,
                  )
                  if tahini_dip_pattern:
                      return "tahini_dip_or_spread", tahini_dip_pattern
              assigned_family = clean_text(metadata.get("comparison_family_key"))
              if assigned_family and assigned_family != family_rule.get("comparison_family_key"):
                  return f"assigned_to_other_family:{assigned_family}", assigned_family
              return "would_match_target_family", matched_required_pattern or matched_required_prefix

          store_comparison_family_coverage_rows = []
          family_coverage_summary = {}
          for family_rule in comparison_family_registry:
              family_key = family_rule["comparison_family_key"]
              store_rows_for_family = []
