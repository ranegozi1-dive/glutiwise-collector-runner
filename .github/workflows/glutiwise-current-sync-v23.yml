                  "canonical_equivalent_opportunity": newly_feasible_via_canonical_only,
                  "budget_alternative_only": newly_feasible_via_budget_only,
              }
              dominant_signals = sorted(root_cause_signal_counts.items(), key=lambda item: (-item[1], item[0]))
              if len(dominant_signals) > 1 and abs(dominant_signals[0][1] - dominant_signals[1][1]) <= 2:
                  dominant_root_cause = "mixed_problem"
              else:
                  dominant_root_cause = dominant_signals[0][0]
