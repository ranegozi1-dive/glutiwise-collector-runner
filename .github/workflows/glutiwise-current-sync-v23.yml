name: GlutiWise Current Sync to Supabase v23

on:
  schedule:
    # GitHub Actions cron uses UTC. 04:17 UTC avoids the top-of-hour queue and gives a stable daily run.
    - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      write_to_supabase:
        description: "Write to Supabase"
        required: true
        type: boolean
        default: false
      write_promotion_items:
        description: "Write promotion_items_current debug layer"
        required: true
        type: boolean
        default: false
      mvp_scope_profile:
        description: "Locked MVP scope profile"
        required: true
        type: choice
        options:
          - free_mvp_3_cities
        default: free_mvp_3_cities
      target_cities_csv:
        description: "Optional comma-separated subset override from the locked MVP cities only: Hod HaSharon, Kfar Saba, Ramat HaSharon"
        required: false
        type: string
        default: ""
      allow_large_promotion_scope:
        description: "Override Free-plan guardrails for large promotion-item writes"
        required: true
        type: boolean
        default: false
      scraper_today:
        description: "Optional UTC override for scraper TODAY, format YYYY-MM-DD HH:MM"
        required: false
        type: string
        default: ""

concurrency:
  group: glutiwise-current-sync-live
  cancel-in-progress: false

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      GITHUB_EVENT_NAME: ${{ github.event_name }}
      WRITE_TO_SUPABASE: ${{ inputs.write_to_supabase || 'false' }}
      WRITE_PROMOTION_ITEMS: ${{ inputs.write_promotion_items || 'false' }}
      MVP_SCOPE_PROFILE: ${{ inputs.mvp_scope_profile || 'free_mvp_3_cities' }}
      TARGET_CITIES_CSV: ${{ inputs.target_cities_csv || '' }}
      ALLOW_LARGE_PROMOTION_SCOPE: ${{ inputs.allow_large_promotion_scope || 'false' }}
      SCRAPER_TODAY: ${{ inputs.scraper_today || '' }}
      SCHEDULED_SCOPE_PROFILE: "free_mvp_3_cities"
      SCHEDULED_WRITE_TO_SUPABASE: "false"
      SCHEDULED_WRITE_PROMOTION_ITEMS: "false"
      SCHEDULED_ALLOW_LARGE_PROMOTION_SCOPE: "false"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_JWT: ${{ secrets.SUPABASE_SERVICE_ROLE_JWT }}
      WRITE_HEAVY_DEBUG_ARTIFACTS: "false"
      SOURCE_MAX_AGE_HOURS: "48"
      ARTIFACT_RETENTION_DAYS: "1"
      LOCKED_MVP_STORE_LIMIT: "29"
      MAX_TARGET_STORES_SAFE: "29"
      SECONDARY_SOURCE_MODE: "cheapersal_qa_ready_no_fetch"
      SECONDARY_SOURCE_CANDIDATE: "cheapersal"
      SECONDARY_SOURCE_FETCH_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare folders
        run: |
          mkdir -p dumps out out/chunks

      - name: Pull scraper image
        timeout-minutes: 15
        run: |
          set -euo pipefail
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                return 1
              fi
              sleep $((attempt * 10))
              attempt=$((attempt + 1))
            done
          }
          retry 3 docker pull erlichsefi/israeli-supermarket-scarpers:latest

      - name: Download store, price, and promotion files
        timeout-minutes: 55
        run: |
          set -euo pipefail
          ARGS=(
            --rm
            -v "${{ github.workspace }}/dumps:/usr/src/app/dumps"
            -e ENABLED_SCRAPERS="RAMI_LEVY,SHUFERSAL,YOHANANOF"
            -e ENABLED_FILE_TYPES="STORE_FILE,PRICE_FULL_FILE,PROMO_FILE,PROMO_FULL_FILE"
            -e NUMBER_OF_PROCESSES="2"
            -e OUTPUT_MODE="disk"
            -e STORAGE_PATH="/usr/src/app/dumps"
          )
          if [ -n "${SCRAPER_TODAY}" ]; then
            ARGS+=( -e "TODAY=${SCRAPER_TODAY}" )
          fi
          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                return 1
              fi
              sleep $((attempt * 15))
              attempt=$((attempt + 1))
            done
          }
          retry 2 docker run "${ARGS[@]}" erlichsefi/israeli-supermarket-scarpers:latest
          python3 - <<'PY'
          import csv
          import json
          import re
          from collections import Counter, defaultdict
          from pathlib import Path

          dumps_dir = Path("dumps")
          out_dir = Path("out")
          out_dir.mkdir(parents=True, exist_ok=True)

          def classify_kind(name: str):
              lower = name.lower()
              if lower.startswith("stores") or lower.startswith("store"):
                  return "store"
              if "pricefull" in lower:
                  return "price_full"
              if "promofull" in lower:
                  return "promo_full"
              if lower.startswith("promo") or "promo" in lower:
                  return "promo"
              return "other"

          def retailer_from_path(path: Path):
              parent = path.parent.name.lower()
              if "rami" in parent:
                  return "ramilevy"
              if "shuf" in parent:
                  return "shufersal"
              if "yoh" in parent:
                  return "yohananof"
              return parent or "unknown"

          def parse_identity(filename: str):
              patterns = [
                  (r"(?i)pricefull(\d+)-(\d+)-(\d+)", "price_full"),
                  (r"(?i)promofull(\d+)-(\d+)-(\d+)", "promo_full"),
                  (r"(?i)promo(\d+)-(\d+)-(\d+)", "promo"),
                  (r"(?i)stores(\d+)-(\d+)-(\d+)", "store"),
                  (r"(?i)stores(\d+)", "store"),
              ]
              for pattern, kind in patterns:
                  m = re.search(pattern, filename)
                  if m:
                      chain_id = m.group(1)
                      store_id = m.group(2) if m.lastindex and m.lastindex >= 2 else ""
                      source_ts = m.group(3) if m.lastindex and m.lastindex >= 3 else ""
                      return kind, chain_id, store_id, source_ts
              return classify_kind(filename), "", "", ""

          inventory_rows = []
          summary = defaultdict(lambda: Counter())
          observed_store_ids = defaultdict(lambda: defaultdict(set))
          for path in sorted(dumps_dir.rglob("*")):
              if not path.is_file():
                  continue
              retailer = retailer_from_path(path)
              kind, chain_id, store_id, source_ts = parse_identity(path.name)
              size_bytes = path.stat().st_size
              inventory_rows.append({
                  "retailer": retailer,
                  "kind": kind,
                  "chain_id": chain_id,
                  "store_id": store_id,
                  "source_ts": source_ts,
                  "relative_path": str(path.as_posix()),
                  "filename": path.name,
                  "size_bytes": size_bytes,
              })
              summary[retailer][f"{kind}_files"] += 1
              summary[retailer]["total_files"] += 1
              summary[retailer]["total_bytes"] += size_bytes
              if store_id:
                  observed_store_ids[retailer][kind].add(store_id)

          with (out_dir / "downloaded_dump_inventory.csv").open("w", encoding="utf-8", newline="") as f:
              writer = csv.DictWriter(
                  f,
                  fieldnames=["retailer", "kind", "chain_id", "store_id", "source_ts", "relative_path", "filename", "size_bytes"],
              )
              writer.writeheader()
              for row in inventory_rows:
                  writer.writerow(row)

          json.dump(
              {
                  "retailers": ["shufersal", "ramilevy", "yohananof"],
                  "downloaded_file_count": len(inventory_rows),
                  "downloaded_file_summary_by_retailer": {
                      retailer: dict(counts) for retailer, counts in sorted(summary.items())
                  },
                  "downloaded_store_ids_by_retailer_and_kind": {
                      retailer: {
                          kind: sorted(store_ids)
                          for kind, store_ids in sorted(kind_map.items())
                          if store_ids
                      }
                      for retailer, kind_map in sorted(observed_store_ids.items())
                  },
              },
              (out_dir / "download_stage_summary.json").open("w", encoding="utf-8"),
              ensure_ascii=False,
              indent=2,
          )
          PY

      - name: Build payload, validate, and sync
        timeout-minutes: 85
        run: |
          cat > sync_glutiwise.py <<'PY'
          import csv
          import gzip
          import io
          import hashlib
          import json
          import os
          import re
          import sys
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          import zipfile
          from collections import Counter, defaultdict
          from datetime import datetime, timedelta, timezone
          from pathlib import Path
          
          TARGET_RETAILERS = ("shufersal", "ramilevy", "yohananof")
          LOCKED_MVP_CITIES = (
              "הוד השרון",
              "כפר סבא",
              "רמת השרון",
          )
          SCOPE_PROFILES = {
              "free_mvp_3_cities": LOCKED_MVP_CITIES,
          }
          EVENT_NAME = os.environ.get("GITHUB_EVENT_NAME", "workflow_dispatch").strip()
          IS_SCHEDULED_RUN = EVENT_NAME == "schedule"
          MANUAL_MVP_SCOPE_PROFILE = os.environ.get("MVP_SCOPE_PROFILE", "free_mvp_3_cities").strip().lower()
          SCHEDULED_SCOPE_PROFILE = os.environ.get("SCHEDULED_SCOPE_PROFILE", "free_mvp_3_cities").strip().lower()
          MVP_SCOPE_PROFILE = SCHEDULED_SCOPE_PROFILE if IS_SCHEDULED_RUN else MANUAL_MVP_SCOPE_PROFILE
          if MVP_SCOPE_PROFILE not in SCOPE_PROFILES:
              raise SystemExit(
                  f"Unsupported MVP scope profile: {MVP_SCOPE_PROFILE}. "
                  "This workflow is locked to free_mvp_3_cities."
              )
          TARGET_CITIES_CSV = "" if IS_SCHEDULED_RUN else os.environ.get("TARGET_CITIES_CSV", "").strip()
          if TARGET_CITIES_CSV:
              requested_cities = []
              for clean in (city.strip() for city in TARGET_CITIES_CSV.split(",") if city.strip()):
                  if clean not in LOCKED_MVP_CITIES:
                      raise SystemExit(
                          f"Unsupported target city override: {clean}. "
                          f"Allowed cities: {', '.join(LOCKED_MVP_CITIES)}"
                      )
                  if clean not in requested_cities:
                      requested_cities.append(clean)
              TARGET_CITIES = tuple(requested_cities)
          else:
              TARGET_CITIES = SCOPE_PROFILES[MVP_SCOPE_PROFILE]
          if not TARGET_CITIES:
              raise SystemExit("TARGET_CITIES is empty after applying the locked MVP scope.")
          CHAIN_ID_TO_RETAILER = {
              "7290027600007": "shufersal",
              "7290058140886": "ramilevy",
              "7290803800003": "yohananof",
          }
          RUN_TS = datetime.now(timezone.utc).replace(microsecond=0)
          RUN_TS_ISO = RUN_TS.isoformat().replace("+00:00", "Z")
          PRICE_STALE_BEFORE = (RUN_TS - timedelta(days=7)).isoformat().replace("+00:00", "Z")
          SOURCE_MAX_AGE_HOURS = int(os.environ.get("SOURCE_MAX_AGE_HOURS", "48"))
          SUPABASE_URL = os.environ["SUPABASE_URL"].rstrip("/")
          SUPABASE_KEY = os.environ["SUPABASE_SERVICE_ROLE_JWT"]
          MANUAL_WRITE_TO_SUPABASE = os.environ.get("WRITE_TO_SUPABASE", "false").strip().lower() == "true"
          MANUAL_WRITE_PROMOTION_ITEMS = os.environ.get("WRITE_PROMOTION_ITEMS", "false").strip().lower() == "true"
          SCHEDULED_WRITE_TO_SUPABASE = os.environ.get("SCHEDULED_WRITE_TO_SUPABASE", "true").strip().lower() == "true"
          SCHEDULED_WRITE_PROMOTION_ITEMS = os.environ.get("SCHEDULED_WRITE_PROMOTION_ITEMS", "true").strip().lower() == "true"
          WRITE_TO_SUPABASE = SCHEDULED_WRITE_TO_SUPABASE if IS_SCHEDULED_RUN else MANUAL_WRITE_TO_SUPABASE
          WRITE_PROMOTION_ITEMS = SCHEDULED_WRITE_PROMOTION_ITEMS if IS_SCHEDULED_RUN else MANUAL_WRITE_PROMOTION_ITEMS
          WRITE_PROMOTION_RAW = os.environ.get("WRITE_PROMOTION_RAW", "false").strip().lower() == "true"
          WRITE_HEAVY_DEBUG_ARTIFACTS = os.environ.get("WRITE_HEAVY_DEBUG_ARTIFACTS", "false").strip().lower() == "true"
          MANUAL_ALLOW_LARGE_PROMOTION_SCOPE = os.environ.get("ALLOW_LARGE_PROMOTION_SCOPE", "false").strip().lower() == "true"
          SCHEDULED_ALLOW_LARGE_PROMOTION_SCOPE = os.environ.get("SCHEDULED_ALLOW_LARGE_PROMOTION_SCOPE", "false").strip().lower() == "true"
          ALLOW_LARGE_PROMOTION_SCOPE = SCHEDULED_ALLOW_LARGE_PROMOTION_SCOPE if IS_SCHEDULED_RUN else MANUAL_ALLOW_LARGE_PROMOTION_SCOPE
          LOCKED_MVP_STORE_LIMIT = int(os.environ.get("LOCKED_MVP_STORE_LIMIT", "29"))
          PROMOTION_ITEMS_MAX_SAFE = int(os.environ.get("PROMOTION_ITEMS_MAX_SAFE", "1100000"))
          MAX_TARGET_STORES_SAFE = int(os.environ.get("MAX_TARGET_STORES_SAFE", str(LOCKED_MVP_STORE_LIMIT)))
          SECONDARY_SOURCE_MODE = os.environ.get("SECONDARY_SOURCE_MODE", "cheapersal_qa_ready_no_fetch").strip().lower()
          SECONDARY_SOURCE_CANDIDATE = os.environ.get("SECONDARY_SOURCE_CANDIDATE", "cheapersal").strip().lower()
          SECONDARY_SOURCE_FETCH_ENABLED = os.environ.get("SECONDARY_SOURCE_FETCH_ENABLED", "false").strip().lower() == "true"
          if SECONDARY_SOURCE_FETCH_ENABLED:
              raise SystemExit(
                  "Secondary-source live fetch is intentionally disabled in this workflow. "
                  "Official chain store/price/promotion files remain the only current-state source of truth."
              )
          OUT_DIR = Path("out")
          DUMPS_DIR = Path("dumps")
          OUT_DIR.mkdir(parents=True, exist_ok=True)
          (OUT_DIR / "chunks").mkdir(parents=True, exist_ok=True)
          download_stage_summary = {}
          download_stage_summary_path = OUT_DIR / "download_stage_summary.json"
          if download_stage_summary_path.exists():
              try:
                  download_stage_summary = json.loads(download_stage_summary_path.read_text(encoding="utf-8"))
              except Exception as exc:
                  download_stage_summary = {"load_error": str(exc)}

          def log(msg: str) -> None:
              print(f"[{datetime.now().strftime('%H:%M:%S')}] {msg}", flush=True)
          
          def write_json(path: Path, data) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              with path.open("w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
          
          def write_csv(path: Path, rows, fieldnames) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              with path.open("w", encoding="utf-8", newline="") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({k: row.get(k) for k in fieldnames})
          
          def localname(tag: str) -> str:
              return tag.split("}")[-1] if "}" in tag else tag
          
          def clean_text(value) -> str:
              if value is None:
                  return ""
              text = str(value).replace("\u200f", " ").replace("\u200e", " ").replace("\xa0", " ")
              text = re.sub(r"[\t\r\n]+", " ", text)
              text = re.sub(r"\s+", " ", text).strip()
              return text
          
          def clean_lookup_text(value) -> str:
              text = clean_text(value)
              text = text.replace('"', ' ').replace("׳", " ").replace("'", " ").replace("״", " ")
              text = text.replace("-", " ").replace("/", " ").replace("\\", " ")
              text = re.sub(r"\s+", " ", text).strip()
              return text
          
          def collapse_for_match(value) -> str:
              return re.sub(r"\s+", "", clean_lookup_text(value))
          
          def text_is_placeholder(value: str) -> bool:
              v = clean_text(value).lower()
              if not v:
                  return True
              placeholders = {
                  "unknown", "לא ידוע", "לא ידועה", "null", "none", "n/a", "na",
                  "ללא", "0", "---", "-", "_none_", "_off_not_found_", "_off_no_brand_",
                  "_off_no_manufacturer_", "not found", "brand not found", "manufacturer not found",
                  "משתנה", "כללי", "generic", "nan", "nil",
              }
              if v in placeholders:
                  return True
              if v.startswith('_off_'):
                  return True
              if re.fullmatch(r'[-_ ]+', v):
                  return True
              return False
          
          def sanitize_optional_text(value):
              v = clean_text(value)
              return "" if text_is_placeholder(v) else v
          
          def has_placeholder_leak(value) -> bool:
              v = clean_text(value)
              return bool(v) and text_is_placeholder(v)
          
          def scrub_product_row(row: dict):
              cleaned = {
                  "barcode": normalize_barcode(row.get("barcode")),
                  "name": sanitize_optional_text(row.get("name")) or None,
                  "category": sanitize_optional_text(row.get("category")) or None,
                  "brand": sanitize_optional_text(row.get("brand")) or None,
                  "manufacturer": sanitize_optional_text(row.get("manufacturer")) or None,
              }
              if not cleaned["brand"]:
                  cleaned["brand"] = fallback_brand_from_name_or_manufacturer(cleaned["name"] or "", cleaned["manufacturer"] or "") or None
              return cleaned
          
          
          def compact_row(row: dict, required_keys=None):
              required_keys = set(required_keys or [])
              compacted = {}
              for key, value in row.items():
                  if key in required_keys:
                      compacted[key] = value
                      continue
                  if value is None:
                      continue
                  if isinstance(value, str) and not clean_text(value):
                      continue
                  compacted[key] = value
              return compacted
          
          def build_target_coverage_by_store_rows(target_rows, price_keys, promo_keys, missing_price_keys, missing_promo_keys):
              price_keys = set(price_keys)
              promo_keys = set(promo_keys)
              missing_price_keys = set(missing_price_keys)
              missing_promo_keys = set(missing_promo_keys)
              rows = []
              for row in sorted(target_rows, key=lambda x: (x["canonical_city"], x["retailer"], x["store_key"])):
                  store_key = row["store_key"]
                  rows.append({
                      "store_key": store_key,
                      "retailer": row["retailer"],
                      "store_name": row["store_name"],
                      "city": row["canonical_city"],
                      "has_price_payload": store_key in price_keys,
                      "has_promo_payload": store_key in promo_keys,
                      "missing_price_file": store_key in missing_price_keys,
                      "missing_promo_file": store_key in missing_promo_keys,
                  })
              return rows
          
          def summarize_target_coverage_by_city_retailer(target_rows, price_keys, promo_keys):
              price_keys = set(price_keys)
              promo_keys = set(promo_keys)
              bucket = defaultdict(lambda: {
                  "target_stores": 0,
                  "price_payload_stores": 0,
                  "promo_payload_stores": 0,
              })
              for row in target_rows:
                  key = (row["canonical_city"], row["retailer"])
                  bucket[key]["target_stores"] += 1
                  if row["store_key"] in price_keys:
                      bucket[key]["price_payload_stores"] += 1
                  if row["store_key"] in promo_keys:
                      bucket[key]["promo_payload_stores"] += 1
              rows = []
              for (city, retailer), counts in sorted(bucket.items()):
                  rows.append({
                      "city": city,
                      "retailer": retailer,
                      "target_stores": counts["target_stores"],
                      "price_payload_stores": counts["price_payload_stores"],
                      "promo_payload_stores": counts["promo_payload_stores"],
                      "full_price_coverage": counts["target_stores"] == counts["price_payload_stores"],
                      "full_promo_coverage": counts["target_stores"] == counts["promo_payload_stores"],
                  })
              return rows
          
          def collect_product_placeholder_leaks(rows, limit=250):
              summary = Counter()
              examples = []
              for row in rows:
                  barcode = normalize_barcode(row.get("barcode"))
                  for field_name in ("name", "brand", "manufacturer", "category"):
                      value = row.get(field_name)
                      if has_placeholder_leak(value):
                          text_value = clean_text(value)
                          summary[f"{field_name}:{text_value}"] += 1
                          if len(examples) < limit:
                              examples.append({
                                  "barcode": barcode,
                                  "field": field_name,
                                  "value": text_value,
                              })
              return summary, examples
          
          def fetch_promotion_keys(filters):
              rows = rest_get_rows("promotions_current", "promotion_key", filters)
              return sorted({clean_text(row.get("promotion_key", "")) for row in rows if clean_text(row.get("promotion_key", ""))})
          
          def looks_like_generic_company_name(value: str) -> bool:
              v = clean_lookup_text(value).lower()
              if not v:
                  return True
              generic_tokens = {
                  "בעמ", "בע מ", "חברה", "תעשיות", "מפעל", "לוגיסטיקה", "שיווק", "יבוא", "יבוא ושיווק",
                  "קמעונאות", "רשת", "מזון", "פרמצבטיות", "מעבדות", "group", "ltd", "inc", "corp", "co"
              }
              return any(tok in v for tok in generic_tokens)
          
          def fallback_brand_from_name_or_manufacturer(name: str, manufacturer: str) -> str:
              name_v = sanitize_optional_text(name)
              manuf_v = sanitize_optional_text(manufacturer)
              if not manuf_v:
                  return ""
              if len(manuf_v) < 2 or len(manuf_v) > 24:
                  return ""
              if looks_like_generic_company_name(manuf_v):
                  return ""
              name_norm = clean_lookup_text(name_v).lower()
              manuf_norm = clean_lookup_text(manuf_v).lower()
              if not name_norm or not manuf_norm:
                  return ""
              manuf_tokens = [tok for tok in manuf_norm.split() if len(tok) >= 3]
              if manuf_norm in name_norm:
                  return manuf_v
              if manuf_tokens and all(tok in name_norm for tok in manuf_tokens[:2]):
                  return manuf_v
              return ""
          
          def looks_like_barcode(value: str) -> bool:
              digits = re.sub(r"\D", "", clean_text(value))
              return bool(re.fullmatch(r"\d{8,13}", digits))
          
          def normalize_barcode(value: str) -> str:
              return re.sub(r"\D", "", clean_text(value))
          
          def safe_decimal(value):
              s = clean_text(value).replace(",", ".")
              if not s:
                  return None
              try:
                  num = float(s)
              except ValueError:
                  return None
              return round(num, 2) if num > 0 else None
          
          def parse_datetime_value(value: str):
              value = clean_text(value)
              if not value:
                  return None
              raw = value.replace("Z", "+00:00")
              fmts = (
                  None,
                  "%Y%m%d%H%M",
                  "%Y%m%d%H%M%S",
                  "%d/%m/%Y %H:%M",
                  "%d/%m/%Y %H:%M:%S",
                  "%Y-%m-%d %H:%M:%S",
                  "%Y-%m-%d %H:%M",
                  "%Y-%m-%d",
              )
              for fmt in fmts:
                  try:
                      if fmt is None:
                          dt = datetime.fromisoformat(raw)
                      else:
                          dt = datetime.strptime(value, fmt)
                      if dt.tzinfo is None:
                          dt = dt.replace(tzinfo=timezone.utc)
                      return dt.astimezone(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")
                  except Exception:
                      continue
              return None
          
          def iso_to_utc_datetime(value: str):
              parsed = parse_datetime_value(value)
              if not parsed:
                  return None
              try:
                  return datetime.fromisoformat(parsed.replace('Z', '+00:00')).astimezone(timezone.utc)
              except Exception:
                  return None

          def iso_age_hours(value: str):
              dt = iso_to_utc_datetime(value)
              if not dt:
                  return None
              return round(max(0.0, (RUN_TS - dt).total_seconds() / 3600.0), 2)

          def promotion_is_active(promo_header: dict, reference_iso: str) -> bool:
              reference_dt = iso_to_utc_datetime(reference_iso) or RUN_TS
              start_dt = iso_to_utc_datetime(promo_header.get("start_at"))
              end_dt = iso_to_utc_datetime(promo_header.get("end_at"))
              if not start_dt and not end_dt:
                  return False
              if start_dt and reference_dt < start_dt:
                  return False
              if end_dt and reference_dt > end_dt:
                  return False
              return True
          
          def active_windowed_promotions(headers, reference_iso: str):
              return [header for header in headers if promotion_is_active(header, reference_iso)]

          def filename_timestamp(path: Path):
              matches = re.findall(r"(\d{12,14})", path.name)
              for candidate in reversed(matches):
                  parsed = parse_datetime_value(candidate)
                  if parsed:
                      return parsed
              return datetime.fromtimestamp(path.stat().st_mtime, timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")
          
          def sha1_text(text: str) -> str:
              return hashlib.sha1(text.encode("utf-8")).hexdigest()
          
          def canonical_store_id(retailer: str, store_id_raw: str) -> str:
              text = clean_text(store_id_raw)
              digits = re.sub(r"\D", "", text)
              if digits:
                  if retailer in {"shufersal", "yohananof"}:
                      return digits.zfill(3)
                  return str(int(digits))
              return text
          
          def retailer_from(chain_id: str, chain_name: str):
              cid = clean_text(chain_id)
              cname = clean_text(chain_name)
              if "שופרסל" in cname:
                  return "shufersal"
              if "רמי" in cname and "לוי" in cname:
                  return "ramilevy"
              if "יוחננוף" in cname or "YOHANANOF" in cname.upper():
                  return "yohananof"
              return CHAIN_ID_TO_RETAILER.get(cid)
          
          def canonical_store_key(retailer: str, store_id_raw: str) -> str:
              return f"{retailer}:{canonical_store_id(retailer, store_id_raw)}"
          
          def split_store_key(store_key: str):
              parts = clean_text(store_key).split(":", 1)
              if len(parts) != 2:
                  return clean_text(store_key), ""
              return parts[0], parts[1]
          
          def equivalent_store_keys(store_key: str):
              retailer, store_id_raw = split_store_key(store_key)
              digits = re.sub(r"\D", "", clean_text(store_id_raw))
              keys = []
              seen_local = set()
              if digits:
                  variants = [digits, digits.zfill(3)]
                  try:
                      variants.append(str(int(digits)))
                  except Exception:
                      pass
                  for variant in variants:
                      key = f"{retailer}:{variant}"
                      if key not in seen_local:
                          keys.append(key)
                          seen_local.add(key)
              else:
                  key = f"{retailer}:{clean_text(store_id_raw)}"
                  if key not in seen_local:
                      keys.append(key)
              return keys
          
          def detect_city(*values):
              matches = []
              reasons = []
              for source_name, value in values:
                  raw = clean_text(value)
                  if not raw:
                      continue
                  text = clean_lookup_text(raw)
                  text_no_space = collapse_for_match(raw)
                  tokens = [tok for tok in re.split(r"[^A-Za-zא-ת0-9]+", text) if tok]
                  token_set = set(tokens)
                  source_matches = []
                  if ("הוד" in token_set and "השרון" in token_set) or "הודהשרון" in text_no_space:
                      source_matches.append("הוד השרון")
                  if ("כפר" in token_set and "סבא" in token_set) or "כפרסבא" in text_no_space or 'כ"ס' in raw or 'כ״ס' in raw:
                      source_matches.append("כפר סבא")
                  pt_abbrev = (
                      'פ"ת' in raw
                      or 'פ״ת' in raw
                      or 'פת' in token_set
                      or ('פ' in token_set and 'ת' in token_set)
                  )
                  if (
                      ("פתח" in token_set and ("תקוה" in token_set or "תקווה" in token_set))
                      or "פתחתקוה" in text_no_space
                      or "פתחתקווה" in text_no_space
                      or pt_abbrev
                  ):
                      source_matches.append("פתח תקווה")
                  if ("רמת" in token_set and "השרון" in token_set) or "רמתהשרון" in text_no_space:
                      source_matches.append("רמת השרון")
                  if "רעננה" in token_set or "רעננה" in text_no_space:
                      source_matches.append("רעננה")
                  for city in source_matches:
                      matches.append(city)
                      reasons.append(f"{source_name}:{raw}")
              unique = []
              for city in matches:
                  if city not in unique:
                      unique.append(city)
              if len(unique) == 1:
                  return unique[0], reasons
              if len(unique) > 1:
                  return None, reasons
              return None, reasons
          
          def validate_target_assignment(row: dict):
              detected_city, reasons = detect_city(
                  ("city", row.get("city", "")),
                  ("address", row.get("address", "")),
                  ("store_name", row.get("store_name", "")),
              )
              expected_city = clean_text(row.get("canonical_city", ""))
              return detected_city, reasons, bool(expected_city and detected_city == expected_city)
          
          def choose_better_text(current: str, candidate: str) -> str:
              current = sanitize_optional_text(current)
              candidate = sanitize_optional_text(candidate)
              if not candidate:
                  return current
              if not current:
                  return candidate
              if candidate == current:
                  return current
              def score(value: str):
                  v = clean_text(value)
                  return (
                      0 if text_is_placeholder(v) else 1,
                      1 if re.search(r"[A-Za-zא-ת]", v) else 0,
                      len(v),
                      v.count(" "),
                  )
              return candidate if score(candidate) > score(current) else current
          
          def normalize_promotion_type(title: str, description: str, benefit_text: str, is_club: bool) -> str:
              text = " ".join(filter(None, [clean_text(title), clean_text(description), clean_text(benefit_text)])).lower()
              if is_club:
                  return "club"
              if re.search(r"\b[2-9]\s*ב", text) or "קנה" in text or "מתנה" in text or "השני" in text:
                  return "multibuy"
              if "%" in text or "הנחה" in text:
                  return "discount"
              if text:
                  return "simple"
              return "unknown"

          def safe_positive_int(value):
              raw = clean_text(value)
              if not raw:
                  return None
              digits = re.sub(r"[^0-9]", "", raw)
              if not digits:
                  return None
              try:
                  parsed = int(digits)
              except ValueError:
                  return None
              return parsed if parsed > 0 else None

          def safe_percent(value):
              parsed = safe_decimal(value)
              if parsed is None:
                  return None
              return parsed if 0 < parsed <= 100 else None

          def normalize_boolean_flag(value):
              raw = clean_text(value).lower()
              if not raw:
                  return None
              if raw in {"1", "true", "t", "yes", "y", "כן"}:
                  return True
              if raw in {"0", "false", "f", "no", "n", "לא"}:
                  return False
              return None

          def median_number(values):
              nums = sorted(float(v) for v in values if v is not None)
              if not nums:
                  return None
              mid = len(nums) // 2
              if len(nums) % 2:
                  return round(nums[mid], 4)
              return round((nums[mid - 1] + nums[mid]) / 2.0, 4)

          def normalize_pack_unit(unit_raw: str):
              unit = (
                  clean_text(unit_raw)
                  .lower()
                  .replace('"', '')
                  .replace("'", "")
                  .replace("׳", "")
                  .replace("״", "")
              )
              aliases = {
                  "kg": ("weight", 1000.0, "g"),
                  "g": ("weight", 1.0, "g"),
                  "gr": ("weight", 1.0, "g"),
                  "ג": ("weight", 1.0, "g"),
                  "קג": ("weight", 1000.0, "g"),
                  "גר": ("weight", 1.0, "g"),
                  "גרם": ("weight", 1.0, "g"),
                  "l": ("volume", 1000.0, "ml"),
                  "lt": ("volume", 1000.0, "ml"),
                  "liter": ("volume", 1000.0, "ml"),
                  "litre": ("volume", 1000.0, "ml"),
                  "ml": ("volume", 1.0, "ml"),
                  "ל": ("volume", 1000.0, "ml"),
                  "ליטר": ("volume", 1000.0, "ml"),
                  "מל": ("volume", 1.0, "ml"),
              }
              return aliases.get(unit)

          def pack_unit_pattern():
              return r"(?:kg|g|gr|ml|l|lt|liter|litre|ק(?:[\"׳״]+)?ג|גרם|גר|ג|ליטר|ל|מ(?:[\"׳״]+)?ל|מל)"

          def parse_pack_signature(name: str):
              text = clean_lookup_text(name).lower().replace(",", ".")
              if not text:
                  return None
              unit_pattern = pack_unit_pattern()
              match = re.search(
                  rf"(?P<count>\d{{1,3}})\s*[x*]\s*(?P<amount>\d{{1,4}}(?:\.\d+)?)\s*(?P<unit>{unit_pattern})\b",
                  text,
              )
              count = 1
              if not match:
                  match = re.search(
                      rf"(?P<amount>\d{{1,4}}(?:\.\d+)?)\s*(?P<unit>{unit_pattern})\b",
                      text,
                  )
              else:
                  count = safe_positive_int(match.group("count")) or 1
              if not match:
                  return None
              amount = safe_decimal(match.group("amount"))
              unit_info = normalize_pack_unit(match.group("unit"))
              if amount is None or not unit_info:
                  return None
              dimension, multiplier, base_unit = unit_info
              total_base_qty = round(amount * count * multiplier, 4)
              if total_base_qty <= 0:
                  return None
              return {
                  "dimension": dimension,
                  "base_unit": base_unit,
                  "total_base_qty": total_base_qty,
                  "pack_expression": clean_text(match.group(0)),
              }

          def build_product_line_signature(name: str, brand: str, manufacturer: str):
              text = clean_lookup_text(name).lower()
              if not text:
                  return ""
              unit_pattern = pack_unit_pattern()
              text = re.sub(
                  rf"\b\d{{1,3}}\s*[x*]\s*\d{{1,4}}(?:\.\d+)?\s*(?:{unit_pattern})\b",
                  " ",
                  text,
              )
              text = re.sub(
                  rf"\b\d{{1,4}}(?:\.\d+)?\s*(?:{unit_pattern})\b",
                  " ",
                  text,
              )
              removable_tokens = set()
              for source in (brand, manufacturer):
                  for token in clean_lookup_text(source).lower().split():
                      if len(token) >= 2:
                          removable_tokens.add(token)
              kept = []
              for token in re.split(r"\s+", text):
                  if not token:
                      continue
                  if token in removable_tokens:
                      continue
                  if re.fullmatch(r"\d+(?:\.\d+)?", token):
                      continue
                  if len(token) < 2:
                      continue
                  kept.append(token)
              return " ".join(kept[:8])

          def compute_unit_price_from_pack(price_value, pack_signature):
              if price_value is None or not pack_signature:
                  return None
              total_base_qty = pack_signature.get("total_base_qty")
              if not total_base_qty:
                  return None
              return round(float(price_value) / float(total_base_qty), 6)

          def first_present(mapping, keys):
              for key in keys:
                  value = mapping.get(key)
                  if clean_text(value):
                      return value
              return ""

          def parse_multibuy_terms(text: str):
              raw = clean_text(text).replace(",", ".")
              if not raw:
                  return None, None
              patterns = [
                  r"(?<!\d)(\d{1,2})\s*ב[- ]?(\d{1,4}(?:\.\d{1,2})?)",
                  r"קנה\s*(\d{1,2}).{0,12}?ב[- ]?(\d{1,4}(?:\.\d{1,2})?)",
                  r"(?:מארז|יח[י']?)\s*(\d{1,2}).{0,12}?ב[- ]?(\d{1,4}(?:\.\d{1,2})?)",
              ]
              for pattern in patterns:
                  match = re.search(pattern, raw)
                  if match:
                      qty = safe_positive_int(match.group(1))
                      total_price = safe_decimal(match.group(2))
                      if qty and total_price:
                          return qty, total_price
              return None, None

          def extract_promotion_terms(tag_values, title: str, description: str, benefit_text: str, promotion_type: str):
              merged_text = " | ".join(filter(None, [clean_text(title), clean_text(description), clean_text(benefit_text)]))
              min_qty = safe_positive_int(first_present(tag_values, [
                  "MinQty", "MinimumQty", "MinQuantity", "MinimumQuantity", "PurchaseQuantity", "RequiredQty",
                  "MinPurchaseQty", "MinNoOfItems", "RewardMinQty", "MinItems", "Quantity"
              ]))
              discount_percent = safe_percent(first_present(tag_values, [
                  "DiscountRate", "DiscountPercent", "Percent", "RewardPercent", "DiscountPct"
              ]))
              discount_amount = safe_decimal(first_present(tag_values, [
                  "DiscountAmount", "DiscountValue", "AmountOff", "RewardAmount", "DiscountSum"
              ]))
              fixed_price = safe_decimal(first_present(tag_values, [
                  "PromotionPrice", "DealPrice", "FixedPrice", "RewardPrice", "SpecialPrice", "PriceAfterDiscount", "Price"
              ]))
              multibuy_qty = min_qty
              multibuy_total_price = None
              if promotion_type == "multibuy":
                  multibuy_qty, multibuy_total_price = parse_multibuy_terms(merged_text)
                  if not multibuy_qty:
                      multibuy_qty = min_qty
                  if not multibuy_total_price:
                      multibuy_total_price = safe_decimal(first_present(tag_values, [
                          "TotalPrice", "RewardValue", "BundlePrice", "PromotionPrice", "DealPrice"
                      ]))
              if not discount_percent:
                  match = re.search(r"(?<!\d)(\d{1,2}(?:\.\d{1,2})?)\s*%", merged_text)
                  if match:
                      discount_percent = safe_percent(match.group(1))
              if promotion_type != "multibuy" and not fixed_price:
                  match = re.search(r"(?:ב-|ב|₪)\s*(\d{1,4}(?:[\.,]\d{1,2})?)\s*₪?", merged_text.replace(",", "."))
                  if match:
                      fixed_price = safe_decimal(match.group(1))
              return {
                  "min_qty": min_qty,
                  "discount_percent": discount_percent,
                  "discount_amount": discount_amount,
                  "fixed_price": fixed_price,
                  "multibuy_qty": multibuy_qty,
                  "multibuy_total_price": multibuy_total_price,
              }

          def compute_effective_price(regular_price, promo_header: dict):
              if regular_price is None:
                  return None, False
              min_qty = promo_header.get("min_qty") or 1
              fixed_price = promo_header.get("fixed_price")
              discount_percent = promo_header.get("discount_percent")
              discount_amount = promo_header.get("discount_amount")
              promotion_type = clean_text(promo_header.get("promotion_type"))
              if fixed_price and min_qty <= 1 and 0 < fixed_price < regular_price:
                  return round(fixed_price, 2), True
              if discount_percent and min_qty <= 1:
                  candidate = round(regular_price * (1 - (discount_percent / 100.0)), 2)
                  if 0 < candidate < regular_price:
                      return candidate, True
              if discount_amount and min_qty <= 1:
                  candidate = round(regular_price - discount_amount, 2)
                  if 0 < candidate < regular_price:
                      return candidate, True
              if promotion_type == "multibuy":
                  qty = promo_header.get("multibuy_qty") or min_qty
                  total_price = promo_header.get("multibuy_total_price")
                  if qty and total_price and qty > 0:
                      candidate = round(total_price / qty, 2)
                      if 0 < candidate < regular_price:
                          return candidate, False
              return round(regular_price, 2), False
          
          def promotion_compare_price_state(promo_header: dict, regular_price):
              candidate_price, directly_applicable = compute_effective_price(regular_price, promo_header)
              safe_for_compare_price = directly_applicable
              return candidate_price, directly_applicable, safe_for_compare_price
          
          def promotion_sort_key(promo_header: dict, regular_price):
              candidate_price, directly_applicable, safe_for_compare_price = promotion_compare_price_state(promo_header, regular_price)
              return (
                  0 if safe_for_compare_price else 1 if directly_applicable else 2,
                  candidate_price if candidate_price is not None else regular_price if regular_price is not None else 999999.0,
                  0 if not promo_header.get("is_club") else 1,
                  clean_text(promo_header.get("title", "")),
                  clean_text(promo_header.get("promotion_key", "")),
              )

          def apply_compare_ready_promotions(price_rows, promo_headers_rows, promo_items_rows):
              price_by_pair = {(row["store_key"], row["barcode"]): row for row in price_rows}
              promo_header_by_key = {row["promotion_key"]: row for row in promo_headers_rows}
              promos_by_pair = defaultdict(list)
              for item_row in promo_items_rows:
                  promo_key = item_row.get("promotion_key")
                  promo_header = promo_header_by_key.get(promo_key)
                  if not promo_header:
                      continue
                  pair = (promo_header.get("store_key"), item_row.get("barcode"))
                  if pair in price_by_pair:
                      promos_by_pair[pair].append(promo_header)

              compare_ready_summary = {
                  "price_rows_total": len(price_rows),
                  "price_rows_with_any_promotion": 0,
                  "price_rows_with_direct_unit_effective_price": 0,
                  "price_rows_with_club_member_promotion": 0,
                  "price_rows_with_quantity_dependent_promotion": 0,
                  "applied_promotion_type_counts": {},
              }
              promotion_type_counter = Counter()

              for pair, row in price_by_pair.items():
                  regular_price = row.get("regular_price") or row.get("price")
                  row["regular_price"] = regular_price
                  row["effective_price"] = regular_price
                  row["has_promotion"] = False
                  row["has_club_promotion"] = False
                  row["applied_promotion_key"] = None
                  row["applied_promotion_title"] = None
                  row["applied_promotion_type"] = None
                  row["promotion_benefit_text"] = None
                  row["promotion_start_at"] = None
                  row["promotion_end_at"] = None

                  headers = promos_by_pair.get(pair, [])
                  if not headers:
                      continue

                  active_headers = active_windowed_promotions(headers, RUN_TS_ISO)
                  if not active_headers:
                      continue
          
                  compare_ready_summary["price_rows_with_any_promotion"] += 1
                  selected = sorted(active_headers, key=lambda header: promotion_sort_key(header, regular_price))[0]
                  selected_effective_price, directly_applicable, safe_for_compare_price = promotion_compare_price_state(selected, regular_price)
                  if directly_applicable:
                      compare_ready_summary["price_rows_with_direct_unit_effective_price"] += 1
                      if bool(selected.get("is_club")):
                          compare_ready_summary["price_rows_with_club_member_promotion"] += 1
                  elif bool(selected.get("is_club")):
                      compare_ready_summary["price_rows_with_club_member_promotion"] += 1
                  elif clean_text(selected.get("promotion_type")) == "multibuy":
                      compare_ready_summary["price_rows_with_quantity_dependent_promotion"] += 1
          
                  row["has_promotion"] = True
                  row["has_club_promotion"] = bool(selected.get("is_club"))
                  row["effective_price"] = (
                      selected_effective_price
                      if safe_for_compare_price and selected_effective_price is not None
                      else regular_price
                  )
                  row["applied_promotion_key"] = selected.get("promotion_key")
                  row["applied_promotion_title"] = selected.get("title")
                  row["applied_promotion_type"] = selected.get("promotion_type")
                  row["promotion_benefit_text"] = selected.get("benefit_text")
                  row["promotion_start_at"] = selected.get("start_at")
                  row["promotion_end_at"] = selected.get("end_at")
                  promotion_type_counter[clean_text(selected.get("promotion_type")) or "unknown"] += 1

              compare_ready_summary["applied_promotion_type_counts"] = dict(sorted(promotion_type_counter.items()))
              return compare_ready_summary
          
          def _roots_from_zip_bytes(blob: bytes):
              roots = []
              with zipfile.ZipFile(io.BytesIO(blob), "r") as zf:
                  for name in zf.namelist():
                      if name.lower().endswith(".xml"):
                          roots.append(ET.fromstring(zf.read(name)))
              return roots
          
          def load_xml_roots(path: Path):
              blob = path.read_bytes()
              lower = path.name.lower()
              # 1) Proper zip files
              if blob[:4] == b"PK\x03\x04" or lower.endswith('.zip'):
                  roots = _roots_from_zip_bytes(blob)
                  if roots:
                      return roots
              # 2) Proper gzip files
              if blob[:2] == b"\x1f\x8b" or lower.endswith('.gz'):
                  try:
                      raw = gzip.decompress(blob)
                      # Some vendors ship zip payloads inside .gz wrappers
                      if raw[:4] == b"PK\x03\x04":
                          roots = _roots_from_zip_bytes(raw)
                          if roots:
                              return roots
                      return [ET.fromstring(raw)]
                  except Exception:
                      pass
              # 3) Mislabelled zip with .gz extension
              try:
                  roots = _roots_from_zip_bytes(blob)
                  if roots:
                      return roots
              except Exception:
                  pass
              # 4) Plain XML fallback
              return [ET.fromstring(blob)]
          
          def extract_any(elem, names):
              wanted = {n.lower() for n in names}
              for child in elem.iter():
                  if localname(child.tag).lower() in wanted:
                      text = clean_text(child.text)
                      if text:
                          return text
              return ""
          
          def collect_tag_values(elem):
              data = {}
              for child in elem.iter():
                  key = localname(child.tag)
                  text = clean_text(child.text)
                  if text and key not in data:
                      data[key] = text
              return data
          
          def iter_dump_paths():
              for path in DUMPS_DIR.rglob("*"):
                  if not path.is_file():
                      continue
                  lower = path.name.lower()
                  if lower.endswith((".xml", ".gz", ".zip", ".xml.gz")):
                      yield path
          
          def classify_dump_kind(path: Path):
              lower = path.name.lower()
              if lower.startswith("stores") or lower.startswith("store"):
                  return "store"
              if "pricefull" in lower:
                  return "price_full"
              if "promofull" in lower:
                  return "promo_full"
              if lower.startswith("promo") or "promo" in lower:
                  return "promo"
              return None
          
          def parse_filename_identity(path: Path):
              name = path.name
              patterns = [
                  (r"(?i)pricefull(\d+)-(\d+)", "price_full"),
                  (r"(?i)promofull(\d+)-(\d+)", "promo_full"),
                  (r"(?i)promo(\d+)-(\d+)", "promo"),
                  (r"(?i)stores(\d+)", "store"),
              ]
              for pattern, kind in patterns:
                  m = re.search(pattern, name)
                  if m:
                      chain_id = m.group(1)
                      store_id = m.group(2) if m.lastindex and m.lastindex >= 2 else ""
                      return kind, chain_id, store_id
              return None, "", ""
          
          def http_json(method: str, path_or_url: str, headers=None, body=None, timeout=120, expect_json=True):
              url = path_or_url if path_or_url.startswith("http") else f"{SUPABASE_URL}{path_or_url}"
              payload = None
              if body is not None:
                  payload = json.dumps(body, ensure_ascii=False).encode("utf-8")
              req = urllib.request.Request(url, data=payload, method=method)
              all_headers = headers.copy() if headers else {}
              all_headers.setdefault("apikey", SUPABASE_KEY)
              all_headers.setdefault("Authorization", f"Bearer {SUPABASE_KEY}")
              if body is not None:
                  all_headers.setdefault("Content-Type", "application/json")
              for k, v in all_headers.items():
                  req.add_header(k, v)
              last_error = None
              for attempt in range(1, 4):
                  try:
                      with urllib.request.urlopen(req, timeout=timeout) as resp:
                          raw = resp.read().decode("utf-8")
                          if not expect_json:
                              return raw
                          if not raw:
                              return None
                          return json.loads(raw)
                  except urllib.error.HTTPError as exc:
                      body_text = exc.read().decode("utf-8", errors="replace")
                      last_error = RuntimeError(f"HTTP {exc.code} {method} {url}: {body_text[:1200]}")
                  except Exception as exc:
                      last_error = exc
                  if attempt < 3:
                      time.sleep(attempt * 2)
              raise last_error
          
          def pg_quote(value: str) -> str:
              text = clean_text(value)
              text = text.replace('"', '\\"')
              return f'"{text}"'
          
          def build_in_filter(values):
              return "in.(" + ",".join(pg_quote(v) for v in values) + ")"
          
          def rest_get_rows(table: str, select_clause: str, filters=None):
              query = {"select": select_clause}
              if filters:
                  query.update(filters)
              parts = []
              for key, value in query.items():
                  parts.append(f"{urllib.parse.quote(str(key), safe='')}={urllib.parse.quote(str(value), safe='().,:*')}")
              path = f"/rest/v1/{table}?" + "&".join(parts)
              data = http_json("GET", path)
              return data or []
          
          def is_statement_timeout_error(exc: Exception) -> bool:
              text = str(exc).lower()
              markers = [
                  'statement timeout',
                  'canceling statement due to statement timeout',
                  '"code":"57014"',
                  '"code": "57014"',
                  "'57014'",
              ]
              return any(marker in text for marker in markers)
          
          def chunked(iterable, size):
              batch = []
              for item in iterable:
                  batch.append(item)
                  if len(batch) >= size:
                      yield batch
                      batch = []
              if batch:
                  yield batch
          
          def group_rows_by_key_signature(rows):
              grouped = defaultdict(list)
              for row in rows:
                  signature = tuple(sorted(row.keys()))
                  grouped[signature].append(row)
              return grouped
          
          def summarize_payload_keysets(rows):
              summary = []
              for signature, group_rows in sorted(group_rows_by_key_signature(rows).items(), key=lambda item: (len(item[0]), item[0])):
                  summary.append({
                      "row_count": len(group_rows),
                      "field_count": len(signature),
                      "fields": list(signature),
                  })
              return summary

          def select_fields(row, allowed_fields):
              return {key: row[key] for key in allowed_fields if key in row}

