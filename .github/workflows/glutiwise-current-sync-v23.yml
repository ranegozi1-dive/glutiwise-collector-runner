          def normalized_unique_tokens(values, stopwords=None):
              blocked = set(stopwords or [])
              tokens = []
              seen = set()
              for value in values:
                  text = clean_lookup_text(value).lower()
                  text = re.sub(r"[^0-9a-zA-Zא-ת]+", " ", text)
                  for token in re.split(r"\s+", text):
                      if not token or token in blocked:
                          continue
                      if re.fullmatch(r"\d+(?:\.\d+)?", token):
                          continue
                      if len(token) < 2:
                          continue
                      if token in seen:
                          continue
                      seen.add(token)
                      tokens.append(token)
              return tokens

          def build_brand_identity_key_shadow(brand: str, manufacturer: str) -> str:
              return " ".join(sorted(normalized_unique_tokens([brand, manufacturer], brand_identity_stopwords)))

          def build_pack_signature_shadow(name: str, family_rule=None):
              legacy_signature = parse_pack_signature(name)
              if legacy_signature:
                  signature = dict(legacy_signature)
                  signature["derivation_rule"] = "legacy_pack_signature"
                  return signature
              text = clean_lookup_text(name).lower().replace(",", ".")
              if not text:
                  return None
              unit_pattern = pack_unit_pattern()
              for pattern, derivation_rule in (
                  (rf"(?P<amount>\d{{1,4}}(?:\.\d+)?)\s*[x*]\s*(?P<count>\d{{1,2}})\s*(?P<unit>{unit_pattern})\b", "amount_first_multipack"),
                  (rf"(?P<count>\d{{1,2}})\s*[x*]\s*(?P<amount>\d{{1,4}}(?:\.\d+)?)\s*(?P<unit>{unit_pattern})\b", "count_first_multipack"),
              ):
                  match = re.search(pattern, text)
                  if not match:
                      continue
                  count = safe_positive_int(match.group("count"))
                  amount = safe_decimal(match.group("amount"))
                  unit_info = normalize_pack_unit(match.group("unit"))
                  if count is None or count <= 1 or count > 24 or amount is None or not unit_info:
                      continue
                  dimension, multiplier, base_unit = unit_info
                  total_base_qty = round(amount * count * multiplier, 4)
                  if total_base_qty <= 0:
                      continue
                  return {
                      "dimension": dimension,
                      "base_unit": base_unit,
                      "total_base_qty": total_base_qty,
                      "pack_expression": clean_text(match.group(0)),
                      "derivation_rule": derivation_rule,
                  }
              family_key = (family_rule or {}).get("comparison_family_key")
              if family_key == "eggs":
                  match = re.search(r"\b(?P<count>\d{1,2})\s*(?:ביצ(?:ה|ים|י)?|egg|eggs)\b", text)
                  if match:
                      count = safe_positive_int(match.group("count"))
                      if count is not None and 4 <= count <= 30:
                          return {
                              "dimension": "count",
                              "base_unit": "ea",
                              "total_base_qty": float(count),
                              "pack_expression": clean_text(match.group(0)),
                              "derivation_rule": "eggs_count_pack",
                          }
              if family_key == "eggs":
                  match = re.search(r"\b(?P<count>\d{1,2})\s*(?:\u05d9\u05d7(?:\u05d9\u05d3\u05d4|\u05d9\u05d3\u05d5\u05ea)?|pcs?|pieces?)\b", text)
                  if match:
                      count = safe_positive_int(match.group("count"))
                      if count is not None and 4 <= count <= 30:
                          return {
                              "dimension": "count",
                              "base_unit": "ea",
                              "total_base_qty": float(count),
                              "pack_expression": clean_text(match.group(0)),
                              "derivation_rule": "eggs_units_count_pack",
                          }
              if family_key == "bottled_water":
                  for pattern, derivation_rule in (
                      (r"(?P<amount>\d(?:\.\d+)?)\s*[x*]\s*(?P<count>\d{1,2})\b", "water_amount_first_liter_multipack"),
                      (r"(?P<count>\d{1,2})\s*[x*]\s*(?P<amount>\d(?:\.\d+)?)\b", "water_count_first_liter_multipack"),
                  ):
                      match = re.search(pattern, text)
                      if not match:
                          continue
                      count = safe_positive_int(match.group("count"))
                      amount = safe_decimal(match.group("amount"))
                      if count is None or count <= 1 or count > 24 or amount is None or amount <= 0 or amount > 3:
                          continue
                      return {
                          "dimension": "volume",
                          "base_unit": "ml",
                          "total_base_qty": round(amount * count * 1000.0, 4),
                          "pack_expression": clean_text(match.group(0)),
                          "derivation_rule": derivation_rule,
                      }
              return None

          def build_family_tokens_shadow(name: str, brand: str, manufacturer: str):
              text = clean_lookup_text(name).lower()
              if not text:
                  return []
              text = re.sub(r"(\d+(?:\.\d+)?)\s*%", lambda match: f" fatpct_{match.group(1).replace('.', '_')} ", text)
              unit_pattern = pack_unit_pattern()
              for pattern in (
                  rf"\b\d{{1,3}}\s*[x*]\s*\d{{1,4}}(?:\.\d+)?\s*(?:{unit_pattern})\b",
                  rf"\b\d{{1,4}}(?:\.\d+)?\s*[x*]\s*\d{{1,2}}\s*(?:{unit_pattern})\b",
                  rf"\b\d{{1,4}}(?:\.\d+)?\s*(?:{unit_pattern})\b",
              ):
                  text = re.sub(pattern, " ", text)
              removable_tokens = set(normalized_unique_tokens([brand, manufacturer], brand_identity_stopwords))
              tokens = []
              seen = set()
              allowed_short_tokens = {"s", "m", "l", "xl", "xxl"}
              for token in re.split(r"\s+", re.sub(r"[^0-9a-zA-Zא-ת]+", " ", text)):
                  if not token or token in removable_tokens or token in family_signature_stopwords:
                      continue
                  if re.fullmatch(r"\d+(?:\.\d+)?", token):
                      continue
                  if len(token) < 2 and token not in allowed_short_tokens and not token.startswith("fatpct_"):
                      continue
                  if token in seen:
                      continue
                  seen.add(token)
                  tokens.append(token)
              return tokens[:8]

          def build_family_signature_key_shadow(tokens):
              return " ".join(sorted(set(tokens)))

          def normalized_lookup_tokens_shadow(text: str):
              normalized = clean_lookup_text(text).lower()
              if not normalized:
                  return []
              normalized = re.sub(r"[^0-9a-zA-Z׳א-׳ת]+", " ", normalized)
              return [token for token in re.split(r"\s+", normalized) if token]

          def first_matching_rule_pattern(patterns, text_tokens):
              if not patterns or not text_tokens:
                  return None
              token_set = set(text_tokens)
              for pattern in patterns:
                  pattern_tokens = normalized_lookup_tokens_shadow(pattern)
                  if not pattern_tokens:
                      continue
                  if len(pattern_tokens) == 1:
                      if pattern_tokens[0] in token_set:
                          return clean_text(pattern)
                      continue
                  for index in range(0, len(text_tokens) - len(pattern_tokens) + 1):
                      if text_tokens[index:index + len(pattern_tokens)] == pattern_tokens:
                          return clean_text(pattern)
              return None

          def first_matching_rule_pattern_in_text(patterns, text_tokens, raw_text):
              matched_pattern = first_matching_rule_pattern(patterns, text_tokens)
              if matched_pattern or not patterns:
                  return matched_pattern
              collapsed_text = collapse_for_match(raw_text).lower()
              if not collapsed_text:
                  return None
              for pattern in patterns:
                  collapsed_pattern = collapse_for_match(pattern).lower()
                  if not collapsed_pattern:
                      continue
                  if collapsed_pattern in collapsed_text:
                      return clean_text(pattern)
              return None

          def first_matching_rule_prefix(prefixes, text_tokens):
              if not prefixes or not text_tokens:
                  return None
              normalized_prefixes = [
                  clean_text(prefix).lower()
                  for prefix in prefixes
                  if clean_text(prefix)
              ]
              if not normalized_prefixes:
                  return None
              for token in text_tokens:
                  normalized_token = clean_text(token).lower()
                  if not normalized_token:
                      continue
                  for prefix in normalized_prefixes:
                      if normalized_token.startswith(prefix):
                          return prefix
              return None

          def derive_curated_form_factor_parts_shadow(family_rule: dict, text_tokens, pack_signature, support_tokens=None):
              if not family_rule:
                  return []
              family_key = family_rule.get("comparison_family_key")
              if family_key == "eggs":
                  if pack_signature and pack_signature.get("dimension") == "count":
                      try:
                          count_value = int(round(float(pack_signature.get("total_base_qty") or 0)))
                      except Exception:
                          count_value = None
                      if count_value:
                          return [f"count_{count_value}"]
                  return []
              derived_parts = []
              for pattern_rule in family_rule.get("form_factor_patterns") or []:
                  matched_pattern = first_matching_rule_pattern(pattern_rule.get("any_tokens"), text_tokens)
                  if not matched_pattern and support_tokens:
                      matched_pattern = first_matching_rule_pattern(pattern_rule.get("any_tokens"), support_tokens)
                  if not matched_pattern:
                      continue
                  key = clean_text(pattern_rule.get("key"))
                  if key and key not in derived_parts:
                      derived_parts.append(key)
              if family_rule.get("include_fatpct_in_form_factor"):
                  fatpct_tokens = sorted({
                      token for token in (text_tokens or [])
                      if clean_text(token).startswith("fatpct_")
                  })
                  if fatpct_tokens:
                      derived_parts.append(fatpct_tokens[0])
              if family_rule.get("comparison_family_key") == "bottled_water" and not derived_parts and pack_signature:
                  derived_parts.append("plain_water")
              return derived_parts

          def category_matches_family_rule(category_key: str, family_rule: dict) -> bool:
              allowed_category_tokens = family_rule.get("allowed_category_tokens") or []
              if not allowed_category_tokens:
                  return True
              return bool(first_matching_rule_pattern(allowed_category_tokens, normalized_lookup_tokens_shadow(category_key)))

          def match_comparison_family_rule(name: str, category_key: str, family_tokens):
              text_tokens = normalized_lookup_tokens_shadow(name)
              if not text_tokens or not category_key:
                  return None, None
              for family_rule in comparison_family_registry:
                  if not category_matches_family_rule(category_key, family_rule):
                      continue
                  matched_forbidden_pattern = first_matching_rule_pattern(family_rule.get("forbidden_tokens"), text_tokens)
                  if matched_forbidden_pattern:
                      continue
                  matched_required_pattern = first_matching_rule_pattern(family_rule.get("required_any_tokens"), text_tokens)
                  matched_required_prefix = first_matching_rule_prefix(family_rule.get("required_any_prefixes"), text_tokens)
                  if not matched_required_pattern and not matched_required_prefix:
                      continue
                  if family_rule.get("comparison_family_key") == "eggs":
                      eggs_non_shell_pattern = first_matching_rule_pattern(
                          ["מצה", "מצות", "matzo", "bread", "לחם", "פיתה", "חלה", "cake", "cookie", "biscuit"],
                          text_tokens,
                      )
                      if eggs_non_shell_pattern:
                          continue
                      eggs_weight_pattern = first_matching_rule_pattern(
                          ["גר", "גרם", "קג", "g", "kg"],
                          text_tokens,
                      )
                      if eggs_weight_pattern:
                          continue
                  if family_rule.get("comparison_family_key") == "tahini_basic":
                      tahini_dip_pattern = first_matching_rule_pattern(
                          ["\u05d7\u05d5\u05de\u05d5\u05e1", "hummus", "\u05de\u05de\u05e8\u05d7", "spread", "dip", "\u05e1\u05dc\u05d8"],
                          text_tokens,
                      )
                      if tahini_dip_pattern:
                          continue
                  return family_rule, {
                      "matched_required_pattern": matched_required_pattern or matched_required_prefix,
                      "category_key": category_key,
                  }
              return None, None

          def derive_base_product_identity_key_shadow(family_rule: dict, family_tokens):
              if not family_rule:
                  return None
              if family_rule.get("comparison_family_key") == "eggs":
                  for pattern_rule in family_rule.get("form_factor_patterns") or []:
                      size_key = clean_text(pattern_rule.get("key"))
                      if not size_key.startswith("size_"):
                          continue
                      if first_matching_rule_pattern(pattern_rule.get("any_tokens"), family_tokens):
                          return f"shell_eggs_{size_key}"
                  return "shell_eggs"
              strip_tokens = set(family_rule.get("identity_strip_tokens") or [])
              base_tokens = [token for token in family_tokens if token not in strip_tokens]
              if not base_tokens:
                  return "generic"
              return " ".join(base_tokens[:4])

          def build_comparison_form_factor_key_shadow(family_rule: dict, base_product_identity_key: str, family_tokens=None, pack_signature=None, support_tokens=None):
              if not family_rule:
                  return None
              family_key = family_rule.get("comparison_family_key")
              if not family_key:
                  return None
              curated_parts = derive_curated_form_factor_parts_shadow(family_rule, family_tokens or [], pack_signature, support_tokens)
              if curated_parts:
                  return f"{family_key}|{'|'.join(curated_parts[:3])}"
              form_factor_default = clean_text(family_rule.get("form_factor_default"))
              if form_factor_default:
                  return f"{family_key}|{form_factor_default}"
              if base_product_identity_key and base_product_identity_key != "generic":
                  return f"{family_key}|{base_product_identity_key}"
              return family_key

          def build_form_factor_key_shadow(category_key: str, family_tokens):
              if not category_key or not family_tokens:
                  return None
              return f"{category_key}|{' '.join(family_tokens[:2])}"

          def derive_probe_plainness_shadow(metadata: dict):
              family_key = metadata.get("comparison_family_key")
              family_rule = comparison_family_registry_by_key.get(family_key) if family_key else None
              if not family_rule:
                  return {
                      "matched_probe_avoid_pattern": None,
                      "matched_probe_prefer_pattern": None,
                      "matched_probe_deprioritize_pattern": None,
                      "probe_baseline_anchor_score": 0,
                      "probe_specialty_penalty": 0,
                  }
              family_tokens = metadata.get("family_tokens") or normalized_lookup_tokens_shadow(metadata.get("name") or "")
              probe_text = " ".join(filter(None, [
                  metadata.get("name"),
                  metadata.get("line_signature"),
                  metadata.get("category"),
                  metadata.get("brand"),
                  metadata.get("substitute_group"),
              ]))
              matched_probe_avoid_pattern = first_matching_rule_pattern_in_text(
                  family_rule.get("probe_avoid_tokens"),
                  family_tokens,
                  probe_text,
              )
              matched_probe_prefer_pattern = first_matching_rule_pattern_in_text(
                  family_rule.get("probe_prefer_tokens"),
                  family_tokens,
                  probe_text,
              )
              matched_probe_deprioritize_pattern = first_matching_rule_pattern_in_text(
                  family_rule.get("probe_deprioritize_tokens"),
                  family_tokens,
                  probe_text,
              )
              probe_baseline_anchor_score = 0
              if matched_probe_prefer_pattern:
                  probe_baseline_anchor_score -= 2
              if matched_probe_avoid_pattern:
                  probe_baseline_anchor_score += 2
              if matched_probe_deprioritize_pattern:
                  probe_baseline_anchor_score += 2
              if family_rule.get("probe_prefer_tokens") and not matched_probe_prefer_pattern:
                  probe_baseline_anchor_score += 2
              pack_signature = metadata.get("pack_signature") or {}
              if family_key == "eggs" and pack_signature.get("dimension") == "count":
                  try:
                      egg_count_value = int(round(float(pack_signature.get("total_base_qty") or 0)))
                  except Exception:
                      egg_count_value = None
                  preferred_count = family_rule.get("probe_prefer_count")
                  if preferred_count and egg_count_value != preferred_count:
                      probe_baseline_anchor_score += 1
                  if egg_count_value in set(family_rule.get("probe_deprioritize_count_values") or []):
                      probe_baseline_anchor_score += 1
              return {
                  "matched_probe_avoid_pattern": matched_probe_avoid_pattern,
                  "matched_probe_prefer_pattern": matched_probe_prefer_pattern,
                  "matched_probe_deprioritize_pattern": matched_probe_deprioritize_pattern,
                  "probe_baseline_anchor_score": probe_baseline_anchor_score,
                  "probe_specialty_penalty": 1 if matched_probe_avoid_pattern else 0,
              }

          def classify_core_food_probe_candidate(candidate: dict, metadata: dict):
              text = clean_lookup_text(" ".join(filter(None, [candidate.get("category"), candidate.get("name")]))).lower()
              category_key = metadata.get("category_key") or ""
              reasons = []
              family_rule = comparison_family_registry_by_key.get(metadata.get("comparison_family_key")) if metadata.get("comparison_family_key") else None
              basket_group = metadata.get("comparison_family_key")
              probe_plainness = derive_probe_plainness_shadow(metadata)
              family_allows_misc_category = (
                  bool(family_rule)
                  and family_rule.get("comparison_family_key") in {"rice_couscous_basic"}
                  and category_key in suspicious_category_keys
                  and category_key in set(family_rule.get("allowed_category_tokens") or [])
              )
              if not category_key or ((category_key in suspicious_category_keys) and not family_allows_misc_category) or re.fullmatch(r"\d+", category_key):
                  reasons.append("suspicious_or_low_reliability_category")
              if any(token in text for token in explicit_non_food_tokens):
                  reasons.append("explicit_non_food_signal")
              if any(token in text for token in non_core_food_tokens):
                  reasons.append("non_core_food_snack_or_sweet")
              if not family_rule:
                  reasons.append("no_curated_comparison_family")
              return {
                  "basket_group": basket_group,
                  "is_selected_candidate": not reasons,
                  "reasons": reasons,
                  "matched_probe_avoid_pattern": probe_plainness["matched_probe_avoid_pattern"],
                  "matched_probe_prefer_pattern": probe_plainness["matched_probe_prefer_pattern"],
                  "matched_probe_deprioritize_pattern": probe_plainness["matched_probe_deprioritize_pattern"],
                  "probe_baseline_anchor_score": probe_plainness["probe_baseline_anchor_score"],
                  "probe_specialty_penalty": probe_plainness["probe_specialty_penalty"],
              }

          def summarize_probe_selection_quality(items, candidate_info_by_barcode):
              group_counts = Counter()
              selected_core_food_count = 0
              selected_non_food_or_suspicious_count = 0
              selected_snack_or_sweet_count = 0
              selected_with_equivalence_evidence = 0
              selected_with_pack_signature = 0
              selected_specialty_penalty_count = 0
              for item in items:
                  info = candidate_info_by_barcode.get(item["barcode"], {})
                  group_name = info.get("basket_group")
                  if group_name:
                      group_counts[group_name] += 1
                      selected_core_food_count += 1
                  reasons = set(info.get("reasons") or [])
                  if "explicit_non_food_signal" in reasons or "suspicious_or_low_reliability_category" in reasons:
                      selected_non_food_or_suspicious_count += 1
                  if "non_core_food_snack_or_sweet" in reasons:
                      selected_snack_or_sweet_count += 1
                  metadata = info.get("metadata", {})
                  if metadata.get("equivalence_group_key"):
                      selected_with_equivalence_evidence += 1
                  if metadata.get("pack_signature"):
                      selected_with_pack_signature += 1
                  if info.get("probe_specialty_penalty", 0):
                      selected_specialty_penalty_count += 1
              return {
                  "selected_item_count": len(items),
                  "selected_core_food_count": selected_core_food_count,
                  "selected_non_food_or_suspicious_count": selected_non_food_or_suspicious_count,
                  "selected_snack_or_sweet_count": selected_snack_or_sweet_count,
                  "selected_with_equivalence_evidence_count": selected_with_equivalence_evidence,
                  "selected_with_pack_signature_count": selected_with_pack_signature,
                  "selected_specialty_penalty_count": selected_specialty_penalty_count,
                  "basket_group_composition": dict(group_counts),
                  "selected_item_names": [item.get("name") for item in items],
              }

          shadow_product_probe_metadata_by_barcode = {}
          for barcode in all_barcodes:
              payload_row = product_rows_by_barcode.get(barcode, {})
              existing = existing_products.get(barcode, {})
              name_value = payload_row.get("name") or sanitize_optional_text(existing.get("name")) or None
              category_value = payload_row.get("category") or sanitize_optional_text(existing.get("category")) or None
              brand_value = payload_row.get("brand") or sanitize_optional_text(existing.get("brand")) or None
              manufacturer_value = payload_row.get("manufacturer") or sanitize_optional_text(existing.get("manufacturer")) or None
              substitute_group_value = sanitize_optional_text(existing.get("substitute_group")) or None
              gf_flag_value = normalize_boolean_flag(existing.get("gf_flag"))
              gf_verified_value = normalize_boolean_flag(existing.get("gf_verified"))
              category_key_value = normalized_category_key(category_value)
              brand_identity_key_value = build_brand_identity_key_shadow(brand_value or "", manufacturer_value or "")
              family_tokens_value = build_family_tokens_shadow(name_value or "", brand_value or "", manufacturer_value or "")
              family_signature_key_value = build_family_signature_key_shadow(family_tokens_value)
              line_signature_value = " ".join(family_tokens_value)
              comparison_family_rule_value, comparison_family_assignment_basis_value = match_comparison_family_rule(name_value or "", category_key_value, family_tokens_value)
              comparison_family_key_value = comparison_family_rule_value.get("comparison_family_key") if comparison_family_rule_value else None
              base_product_identity_key_value = derive_base_product_identity_key_shadow(comparison_family_rule_value, family_tokens_value)
              pack_signature_value = build_pack_signature_shadow(name_value or "", comparison_family_rule_value)
              explicit_equivalence_group_tokens_value = normalized_lookup_tokens_shadow(substitute_group_value or "")
              comparison_form_factor_key_value = build_comparison_form_factor_key_shadow(
                  comparison_family_rule_value,
                  base_product_identity_key_value,
                  family_tokens_value,
                  pack_signature_value,
                  explicit_equivalence_group_tokens_value,
              )
              form_factor_key_value = comparison_form_factor_key_value or build_form_factor_key_shadow(category_key_value, family_tokens_value)
              explicit_equivalence_group = clean_text(substitute_group_value).lower() if substitute_group_value else None
              derived_equivalence_group = None
              prefer_derived_equivalence_group = bool(comparison_family_rule_value.get("prefer_derived_equivalence_group")) if comparison_family_rule_value else False
              if comparison_family_key_value and comparison_form_factor_key_value:
                  derived_equivalence_group = f"derived::{comparison_form_factor_key_value}"
              elif not explicit_equivalence_group and category_key_value and len(family_tokens_value) >= 2 and form_factor_key_value:
                  derived_equivalence_group = f"generic::{form_factor_key_value}"
              if prefer_derived_equivalence_group and derived_equivalence_group:
                  equivalence_group_key_value = derived_equivalence_group
                  equivalence_group_source = "derived_curated_family_form_factor_preferred_over_explicit_substitute_group" if explicit_equivalence_group else "derived_curated_family_form_factor"
              elif explicit_equivalence_group and comparison_form_factor_key_value and comparison_family_key_value:
                  equivalence_group_key_value = f"{comparison_family_key_value}|sg::{explicit_equivalence_group}"
                  equivalence_group_source = "explicit_substitute_group_plus_curated_family_form_factor_enforced_at_match_time"
              elif explicit_equivalence_group and form_factor_key_value:
                  equivalence_group_key_value = f"generic|sg::{explicit_equivalence_group}"
                  equivalence_group_source = "explicit_substitute_group_plus_generic_family_form_factor_enforced_at_match_time"
              else:
                  equivalence_group_key_value = derived_equivalence_group
                  equivalence_group_source = "derived_curated_family_form_factor" if comparison_family_key_value and derived_equivalence_group else "derived_generic_form_factor" if derived_equivalence_group else None
              same_product_identity_key_value = None
              if comparison_family_key_value and base_product_identity_key_value:
                  same_product_identity_key_value = f"{comparison_family_key_value}|{brand_identity_key_value or 'generic_brand'}|{base_product_identity_key_value}"
              elif category_key_value and brand_identity_key_value and family_signature_key_value and len(family_tokens_value) >= 2:
                  same_product_identity_key_value = f"generic|{category_key_value}|{brand_identity_key_value}|{family_signature_key_value}"
              shadow_product_probe_metadata_by_barcode[barcode] = {
                  "barcode": barcode,
                  "name": name_value,
                  "category": category_value,
                  "brand": brand_value,
                  "manufacturer": manufacturer_value,
                  "substitute_group": substitute_group_value,
                  "gf_flag": gf_flag_value,
                  "gf_verified": gf_verified_value,
                  "requires_gluten_preservation": bool(gf_flag_value is True or gf_verified_value is True),
                  "pack_signature": pack_signature_value,
                  "pack_signature_source": pack_signature_value.get("derivation_rule") if pack_signature_value else None,
                  "line_signature": line_signature_value,
                  "family_signature_key": family_signature_key_value,
                  "family_tokens": family_tokens_value,
                  "brand_key": brand_identity_key_value,
                  "brand_identity_key": brand_identity_key_value,
                  "category_key": category_key_value,
                  "comparison_family_key": comparison_family_key_value,
                  "comparison_family_source": "curated_registry" if comparison_family_key_value else None,
                  "comparison_family_assignment_basis": comparison_family_assignment_basis_value,
                  "base_product_identity_key": base_product_identity_key_value,
                  "form_factor_key": form_factor_key_value,
                  "equivalence_group_key": equivalence_group_key_value,
                  "equivalence_group_source": equivalence_group_source,
                  "same_product_identity_key": same_product_identity_key_value,
              }

          shadow_store_coverage_by_family = defaultdict(set)
          shadow_store_coverage_by_form_factor = defaultdict(set)
          shadow_store_coverage_by_equivalence_group = defaultdict(set)
          for row in prices_payload:
              store_key = row.get("store_key")
              barcode = row.get("barcode")
              if store_key not in target_store_keys or not barcode:
                  continue
              metadata = shadow_product_probe_metadata_by_barcode.get(barcode, {})
              family_key = clean_text(metadata.get("comparison_family_key"))
              form_factor_key = clean_text(metadata.get("form_factor_key"))
              equivalence_group_key = clean_text(metadata.get("equivalence_group_key"))
              if family_key:
                  shadow_store_coverage_by_family[family_key].add(store_key)
              if form_factor_key:
                  shadow_store_coverage_by_form_factor[form_factor_key].add(store_key)
              if equivalence_group_key:
                  shadow_store_coverage_by_equivalence_group[equivalence_group_key].add(store_key)

          shadow_probe_candidates = []
          probe_candidate_info_by_barcode = {}
          for barcode in sorted(comparison_universe_barcodes):
              metadata = shadow_product_probe_metadata_by_barcode.get(barcode, {})
              candidate_row = {
                  "barcode": barcode,
                  "name": metadata.get("name"),
                  "category": metadata.get("category"),
                  "category_key": metadata.get("category_key"),
                  "brand": metadata.get("brand"),
                  "exact_store_coverage_count": len(barcode_store_key_map.get(barcode, set())),
                  "family_store_coverage_count": len(shadow_store_coverage_by_family.get(clean_text(metadata.get("comparison_family_key")), set())),
                  "form_factor_store_coverage_count": len(shadow_store_coverage_by_form_factor.get(clean_text(metadata.get("form_factor_key")), set())),
                  "equivalence_group_store_coverage_count": len(shadow_store_coverage_by_equivalence_group.get(clean_text(metadata.get("equivalence_group_key")), set())),
                  "has_pack_signature": bool(metadata.get("pack_signature")),
                  "has_equivalence_group": bool(metadata.get("equivalence_group_key")),
                  "has_same_product_identity": bool(metadata.get("same_product_identity_key")),
              }
              assessment = classify_core_food_probe_candidate(candidate_row, metadata)
              candidate_record = {
                  **candidate_row,
                  "basket_group": assessment["basket_group"],
                  "is_selected_candidate": assessment["is_selected_candidate"],
                  "reasons": assessment["reasons"],
                  "matched_probe_avoid_pattern": assessment.get("matched_probe_avoid_pattern"),
                  "matched_probe_prefer_pattern": assessment.get("matched_probe_prefer_pattern"),
                  "matched_probe_deprioritize_pattern": assessment.get("matched_probe_deprioritize_pattern"),
                  "probe_baseline_anchor_score": assessment.get("probe_baseline_anchor_score", 0),
                  "probe_specialty_penalty": assessment.get("probe_specialty_penalty", 0),
                  "metadata": metadata,
              }
              shadow_probe_candidates.append(candidate_record)
              probe_candidate_info_by_barcode[barcode] = candidate_record

          shadow_probe_candidates.sort(
              key=lambda row: (
                  core_food_group_priority.get(row.get("basket_group") or "", 99),
                  row.get("probe_baseline_anchor_score", 0),
                  -row.get("equivalence_group_store_coverage_count", 0),
                  -row.get("form_factor_store_coverage_count", 0),
                  -row.get("family_store_coverage_count", 0),
                  row.get("probe_specialty_penalty", 0),
                  -(1 if row.get("has_equivalence_group") else 0),
                  -(1 if row.get("has_same_product_identity") else 0),
                  -(1 if row.get("has_pack_signature") else 0),
                  -row.get("exact_store_coverage_count", 0),
                  row.get("name") or "",
                  row["barcode"],
              )
          )

          improved_selected_probe_barcodes = []
          improved_selected_probe_barcode_set = set()
          improved_group_counts = Counter()
          improved_selection_reason_by_barcode = {}
          for family_rule in comparison_family_registry:
              group_name = family_rule["comparison_family_key"]
              for candidate in shadow_probe_candidates:
                  if candidate["barcode"] in improved_selected_probe_barcode_set or candidate.get("basket_group") != group_name:
                      continue
                  if not candidate.get("is_selected_candidate"):
                      continue
                  improved_selected_probe_barcodes.append(candidate["barcode"])
                  improved_selected_probe_barcode_set.add(candidate["barcode"])
                  improved_group_counts[group_name] += 1
                  improved_selection_reason_by_barcode[candidate["barcode"]] = "group_priority_leader"
                  break
          for candidate in shadow_probe_candidates:
              if len(improved_selected_probe_barcodes) >= max(probe_target_sizes):
                  break
              if candidate["barcode"] in improved_selected_probe_barcode_set or not candidate.get("is_selected_candidate"):
                  continue
              group_name = candidate.get("basket_group") or "__other__"
              if improved_group_counts[group_name] >= comparison_family_registry_by_key.get(group_name, {}).get("probe_max_items", 2):
                  continue
              improved_selected_probe_barcodes.append(candidate["barcode"])
              improved_selected_probe_barcode_set.add(candidate["barcode"])
              improved_group_counts[group_name] += 1
              improved_selection_reason_by_barcode[candidate["barcode"]] = "best_remaining_core_food_candidate"
          for candidate in shadow_probe_candidates:
              if len(improved_selected_probe_barcodes) >= max(probe_target_sizes):
                  break
              if candidate["barcode"] in improved_selected_probe_barcode_set or not candidate.get("is_selected_candidate"):
                  continue
              improved_selected_probe_barcodes.append(candidate["barcode"])
              improved_selected_probe_barcode_set.add(candidate["barcode"])
              improved_group_counts[candidate.get("basket_group") or "__other__"] += 1
              improved_selection_reason_by_barcode[candidate["barcode"]] = "core_food_fallback_after_group_cap"

          improved_selected_probe_items = []
          for probe_index, barcode in enumerate(improved_selected_probe_barcodes, start=1):
              metadata = shadow_product_probe_metadata_by_barcode.get(barcode, {})
              exact_rows = [
                  price_row_by_store_barcode[(store_key, barcode)]
                  for store_key in sorted(barcode_store_key_map.get(barcode, set()))
                  if (store_key, barcode) in price_row_by_store_barcode
              ]
              reference_prices = [comparison_price_value(row) for row in exact_rows if comparison_price_value(row) is not None]
              reference_unit_prices = [
                  compute_unit_price_from_pack(comparison_price_value(row), metadata.get("pack_signature"))
                  for row in exact_rows
                  if comparison_price_value(row) is not None and metadata.get("pack_signature")
              ]
              improved_selected_probe_items.append({
                  "probe_index": probe_index,
                  "barcode": barcode,
                  "name": metadata.get("name"),
                  "category": metadata.get("category"),
                  "brand": metadata.get("brand"),
                  "substitute_group": metadata.get("substitute_group"),
                  "gf_flag": metadata.get("gf_flag"),
                  "gf_verified": metadata.get("gf_verified"),
                  "requires_gluten_preservation": metadata.get("requires_gluten_preservation", False),
                  "line_signature": metadata.get("line_signature"),
                  "pack_signature": metadata.get("pack_signature"),
                  "exact_store_coverage_count": len(barcode_store_key_map.get(barcode, set())),
                  "family_store_coverage_count": probe_candidate_info_by_barcode.get(barcode, {}).get("family_store_coverage_count", 0),
                  "form_factor_store_coverage_count": probe_candidate_info_by_barcode.get(barcode, {}).get("form_factor_store_coverage_count", 0),
                  "equivalence_group_store_coverage_count": probe_candidate_info_by_barcode.get(barcode, {}).get("equivalence_group_store_coverage_count", 0),
                  "reference_effective_price_median": median_number(reference_prices),
                  "reference_unit_price_median": median_number(reference_unit_prices),
                  "selection_reason": improved_selection_reason_by_barcode.get(barcode),
                  "probe_baseline_anchor_score": probe_candidate_info_by_barcode.get(barcode, {}).get("probe_baseline_anchor_score", 0),
                  "probe_specialty_penalty": probe_candidate_info_by_barcode.get(barcode, {}).get("probe_specialty_penalty", 0),
                  "matched_probe_avoid_pattern": probe_candidate_info_by_barcode.get(barcode, {}).get("matched_probe_avoid_pattern"),
                  "matched_probe_prefer_pattern": probe_candidate_info_by_barcode.get(barcode, {}).get("matched_probe_prefer_pattern"),
                  "matched_probe_deprioritize_pattern": probe_candidate_info_by_barcode.get(barcode, {}).get("matched_probe_deprioritize_pattern"),
                  "comparison_family_key": metadata.get("comparison_family_key"),
                  "comparison_family_source": metadata.get("comparison_family_source"),
                  "comparison_family_assignment_basis": metadata.get("comparison_family_assignment_basis"),
                  "basket_group": probe_candidate_info_by_barcode.get(barcode, {}).get("basket_group"),
              })

          write_json(OUT_DIR / "core_food_basket_probe_items.json", {
              "shadow_only": True,
              "publish_gate_impact": "none",
              "baseline_reference": "legacy_same_run_shadow_probe_selection",
              "selected_probe_items": improved_selected_probe_items,
              "excluded_candidates": [
                  {
                      "barcode": candidate["barcode"],
                      "name": candidate.get("name"),
                      "category": candidate.get("category"),
                      "comparison_family_key": candidate.get("basket_group"),
                      "family_store_coverage_count": candidate.get("family_store_coverage_count", 0),
                      "form_factor_store_coverage_count": candidate.get("form_factor_store_coverage_count", 0),
                      "equivalence_group_store_coverage_count": candidate.get("equivalence_group_store_coverage_count", 0),
                      "comparison_family_assignment_basis": candidate.get("metadata", {}).get("comparison_family_assignment_basis"),
                      "basket_group": candidate.get("basket_group"),
                      "probe_baseline_anchor_score": candidate.get("probe_baseline_anchor_score", 0),
                      "probe_specialty_penalty": candidate.get("probe_specialty_penalty", 0),
                      "matched_probe_avoid_pattern": candidate.get("matched_probe_avoid_pattern"),
                      "matched_probe_prefer_pattern": candidate.get("matched_probe_prefer_pattern"),
                      "matched_probe_deprioritize_pattern": candidate.get("matched_probe_deprioritize_pattern"),
                      "reasons": candidate.get("reasons") if candidate["barcode"] not in improved_selected_probe_barcode_set else [improved_selection_reason_by_barcode.get(candidate["barcode"])],
                  }
                  for candidate in shadow_probe_candidates
                  if candidate["barcode"] not in improved_selected_probe_barcode_set
              ],
          })

          legacy_probe_quality = summarize_probe_selection_quality(legacy_selected_probe_items[:max(probe_target_sizes)], probe_candidate_info_by_barcode)
          improved_probe_quality = summarize_probe_selection_quality(improved_selected_probe_items[:max(probe_target_sizes)], probe_candidate_info_by_barcode)
          write_json(OUT_DIR / "core_food_basket_probe_quality_summary.json", {
              "shadow_only": True,
              "publish_gate_impact": "none",
              "baseline_reference": "legacy_same_run_shadow_probe_selection",
              "before": legacy_probe_quality,
              "after": improved_probe_quality,
              "category_composition_after": improved_probe_quality["basket_group_composition"],
              "comparison_family_composition_after": improved_probe_quality["basket_group_composition"],
              "probe_cleanliness_delta": {
                  "core_food_count_delta": improved_probe_quality["selected_core_food_count"] - legacy_probe_quality["selected_core_food_count"],
                  "non_food_or_suspicious_delta": improved_probe_quality["selected_non_food_or_suspicious_count"] - legacy_probe_quality["selected_non_food_or_suspicious_count"],
                  "snack_or_sweet_delta": improved_probe_quality["selected_snack_or_sweet_count"] - legacy_probe_quality["selected_snack_or_sweet_count"],
                  "specialty_penalty_delta": improved_probe_quality["selected_specialty_penalty_count"] - legacy_probe_quality.get("selected_specialty_penalty_count", 0),
              },
              "materially_cleaner_and_more_food_first": (
                  improved_probe_quality["selected_non_food_or_suspicious_count"] < legacy_probe_quality["selected_non_food_or_suspicious_count"]
                  and improved_probe_quality["selected_snack_or_sweet_count"] < legacy_probe_quality["selected_snack_or_sweet_count"]
                  and improved_probe_quality["selected_core_food_count"] >= legacy_probe_quality["selected_core_food_count"]
              ),
          })
          write_json(OUT_DIR / "comparison_family_registry_audit.json", {
              "shadow_only": True,
              "publish_gate_impact": "none",
              "registry_drives_probe_selection": True,
              "registry_drives_non_exact_matching": True,
              "registry_family_count": len(comparison_family_registry),
              "registry_families": comparison_family_registry,
              "selected_probe_family_composition": improved_probe_quality["basket_group_composition"],
              "selected_probe_families": sorted(improved_probe_quality["basket_group_composition"].keys()),
              "families_allowing_unit_normalization": [
                  rule["comparison_family_key"]
                  for rule in comparison_family_registry
                  if rule.get("allow_unit_normalization")
              ],
              "families_allowing_canonical_equivalent": [
                  rule["comparison_family_key"]
                  for rule in comparison_family_registry
                  if rule.get("allow_canonical_equivalent")
              ],
              "what_the_workflow_refuses_to_infer": [
                  "same category alone",
                  "same brand alone",
                  "similar product name alone",
                  "same substitute group alone without curated family support",
                  "cross-category substitution",
                  "GF status from product name",
              ],
          })

          product_probe_metadata_by_barcode = shadow_product_probe_metadata_by_barcode
          selected_probe_items = improved_selected_probe_items
          basket_probe_definitions = [
              {
                  "basket_probe_name": "core_food_basket_10",
                  "requested_probe_size": 10,
                  "selected_probe_size": min(10, len(selected_probe_items)),
                  "items": selected_probe_items[:min(10, len(selected_probe_items))],
              },
              {
                  "basket_probe_name": "core_food_basket_20",
                  "requested_probe_size": 20,
                  "selected_probe_size": min(20, len(selected_probe_items)),
                  "items": selected_probe_items[:min(20, len(selected_probe_items))],
              },
          ]

          product_match_derivation_audit = {
              "shadow_only": True,
              "publish_gate_impact": "none",
              "deterministic_derivations_added": {
                  "comparison_family_key": "assigned from a small curated comparison_family_registry using token-aware required and forbidden pattern matching plus tightly scoped required-prefix matching for selected Hebrew family stems instead of loose substring hits",
                  "brand_identity_key": "normalized brand plus manufacturer tokens with corporate suffix removal",
                  "line_signature": "name tokens with pack expressions, numeric noise, and brand/manufacturer tokens removed while preserving fat and size qualifiers when explicit",
                  "pack_signature": "legacy pack parsing plus compact Hebrew unit suffix parsing, Hebrew quote-mark unit variants, eggs count parsing including construct-form egg labels, and bottled-water liter multipack parsing when family rules allow it",
                  "base_product_identity_key": "curated family identity built from normalized family tokens after family-specific strip tokens are removed",
                  "equivalence_group_key": "curated family plus form-factor derived group for selected staple families when that signal is stronger and more consistent than explicit substitute_group; otherwise explicit substitute_group plus curated family with form-factor enforced separately at match time, or derived curated family plus form-factor when no explicit group exists",
                  "comparison_form_factor_key": "curated family-specific use-case/form-factor rules first, such as egg count-only shell equivalence, milk fat+lactose-free, soft-cheese cottage-vs-labneh plus explicit fat percentage, tuna water-vs-oil, pasta shape, cereal subtype, bread type, and water plainness; only then reduced base product identity fallback",
                  "same_product_identity_key": "comparison family plus normalized brand identity plus curated base product identity",
              },
              "selected_probe_metadata_coverage": {
                  "selected_probe_item_count": len(selected_probe_items),
                  "with_comparison_family_key_count": sum(1 for item in selected_probe_items if product_probe_metadata_by_barcode.get(item["barcode"], {}).get("comparison_family_key")),
                  "with_pack_signature_count": sum(1 for item in selected_probe_items if product_probe_metadata_by_barcode.get(item["barcode"], {}).get("pack_signature")),
