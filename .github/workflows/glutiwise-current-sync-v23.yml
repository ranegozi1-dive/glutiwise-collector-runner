          def fetch_existing_products(barcodes):
              select_candidates = [
                  "barcode,name,category,brand,manufacturer,gf_flag,gf_verified,substitute_group",
                  "barcode,name,category,brand,manufacturer",
              ]
              last_exc = None
              for select_fields in select_candidates:
                  rows = {}
                  try:
                      for batch in chunked(sorted(set(barcodes)), 200):
                          filters = {"barcode": build_in_filter(batch)}
                          data = rest_get_rows("products", select_fields, filters)
                          for row in data:
                              rows[row["barcode"]] = row
                      return rows, [field.strip() for field in select_fields.split(",") if field.strip()]
                  except Exception as exc:
