              }
          write_json(OUT_DIR / "store_comparison_modes_root_cause_summary.json", comparison_modes_root_cause_summary)

          def line_confidence_class(chosen_layer: str) -> str:
              return {
                  "exact_identity": "high",
                  "same_product_unit_normalized": "high",
                  "canonical_equivalent": "medium",
                  "budget_alternative": "diagnostic_only",
                  "not_proven": "not_proven",
                  "unmatched": "no_match",
              }.get(chosen_layer, "unknown")

          def line_confidence_score(chosen_layer: str):
              return {
                  "exact_identity": 100.0,
                  "same_product_unit_normalized": 95.0,
                  "canonical_equivalent": 75.0,
                  "budget_alternative": 40.0,
                  "not_proven": 15.0,
                  "unmatched": 0.0,
              }.get(chosen_layer, 0.0)

          def pct_or_none(part: int, total: int):
              if total <= 0:
                  return None
              return round((part / total) * 100.0, 2)

          def normalized_anchor_line_price(anchor_probe: dict, candidate_unit_price):
              if candidate_unit_price is None:
                  return None
              anchor_pack = product_probe_metadata_by_barcode.get(anchor_probe["barcode"], {}).get("pack_signature")
              if not anchor_pack:
                  return None
              anchor_qty = anchor_pack.get("total_base_qty")
              if anchor_qty is None or anchor_qty <= 0:
                  return None
              return round(candidate_unit_price * anchor_qty, 6)

          def budget_candidate_line_price(anchor_probe: dict, budget_match: dict):
              comparison_basis = budget_match.get("comparison_basis")
              if comparison_basis == "unit_price":
                  return normalized_anchor_line_price(anchor_probe, budget_match.get("candidate_compare_price"))
              if comparison_basis == "same_line_price":
                  candidate_compare_price = budget_match.get("candidate_compare_price")
                  if candidate_compare_price is None:
                      return None
                  return round(candidate_compare_price, 6)
              return None

          def basket_failure_bucket(reason: str) -> str:
              reason_text = clean_text(reason).lower()
              if not reason_text:
                  return "unknown"
              if "gf_constraint" in reason_text:
                  return "gf_preservation_not_proven"
              if "no_substitute_group" in reason_text or "no_anchor_category" in reason_text or "no_anchor_line_signature" in reason_text:
                  return "missing_equivalence_metadata"
              if "pack" in reason_text or "unit_" in reason_text:
                  return "missing_pack_normalization_evidence"
              if "no_store_candidate_in_substitute_group" in reason_text or "no_same_category_candidate" in reason_text or "no_canonical_line_match" in reason_text:
                  return "no_proven_equivalent_in_store"
              if "not_cheaper_enough" in reason_text:
                  return "budget_alternative_not_meaningfully_cheaper"
              if "unmatched" in reason_text or "no_exact_identity_match" in reason_text:
                  return "no_proven_match_in_store"
              return "other"

          basket_probe_definitions = [
              {
                  "basket_probe_name": "core_food_basket_10",
                  "requested_probe_size": 10,
                  "selected_probe_size": min(10, len(selected_probe_items)),
                  "items": selected_probe_items[:min(10, len(selected_probe_items))],
              },
              {
                  "basket_probe_name": "core_food_basket_20",
                  "requested_probe_size": 20,
                  "selected_probe_size": min(20, len(selected_probe_items)),
                  "items": selected_probe_items[:min(20, len(selected_probe_items))],
              },
          ]

          comparison_source_contract = {
              "shadow_only": True,
              "publish_gate_impact": "none",
              "price_source": {
                  "source_name": "official_current_price_rows",
                  "origin": "prices_payload built from official chain current price files in this workflow",
                  "allowed_fields": ["effective_price", "regular_price", "price", "store_key", "barcode"],
                  "refused_inference": "price is never inferred from product metadata or secondary sources",
              },
              "product_metadata_source": {
                  "source_name": "workflow_product_metadata",
                  "origin": ["products_payload", "existing_products lookup"],
                  "available_existing_product_fields": existing_product_fields,
                  "allowed_fields": ["barcode", "name", "category", "brand", "manufacturer", "substitute_group"],
                  "refused_inference": "no loose fuzzy family inference outside explicit fields and deterministic signatures",
              },
              "gf_source": {
                  "source_name": "explicit_gf_metadata_only",
                  "allowed_fields": ["gf_flag", "gf_verified"],
                  "refused_inference": "gluten-free status is never inferred from the product name",
              },
              "equivalence_source": {
                  "source_name": "explicit_or_narrow_deterministic_metadata",
                  "allowed_fields": ["substitute_group", "category", "line_signature"],
                  "deterministic_derivation": ["line_signature from cleaned name plus brand/manufacturer", "pack_signature from parsed name text"],
                  "refused_inference": "no cross-category substitution and no unproven equivalent upgrades",
              },
              "normalization_source": {
                  "source_name": "pack_signature_unit_normalization",
                  "allowed_basis": "weight_or_volume normalization only when pack signature is provable and dimension-compatible, including mixed Hebrew quote-mark unit variants",
                  "refused_inference": "no normalization without provable pack evidence",
              },
          }
          write_json(OUT_DIR / "comparison_source_contract.json", comparison_source_contract)

          def resolve_basket_line_shadow_match(anchor_probe: dict, store_key: str):
              anchor_barcode = anchor_probe["barcode"]
              anchor_meta = product_probe_metadata_by_barcode.get(anchor_barcode, {})
              anchor_requires_gf = bool(anchor_meta.get("requires_gluten_preservation"))
              default_gf_source = "explicit_gf_flag_or_gf_verified" if anchor_requires_gf else "not_required"
              exact_row = price_row_by_store_barcode.get((store_key, anchor_barcode))
              if exact_row:
                  exact_price = comparison_price_value(exact_row)
                  return {
                      "source_item_id": anchor_barcode,
                      "matched_item_id": anchor_barcode,
                      "matched_item_name": anchor_meta.get("name"),
                      "chosen_layer": "exact_identity",
                      "confidence_class": line_confidence_class("exact_identity"),
                      "price_evidence_source": "official_current_price_rows_exact_barcode",
                      "metadata_evidence_source": "barcode_identity_from_official_price_row",
                      "gf_evidence_source": default_gf_source,
                      "equivalence_basis": "same_barcode",
                      "normalization_basis": "not_required",
                      "reason_or_failure_reason": "exact_identity_available",
                      "baseline_line_price": exact_price,
                      "budget_line_price": None,
                      "matched_price_value": exact_price,
                      "budget_savings_pct": None,
                      "anchor_requires_gluten_preservation": anchor_requires_gf,
                  }

              unit_match, unit_reason = find_unit_normalized_match(anchor_probe, store_key)
              if unit_match:
                  matched_barcode = unit_match.get("matched_barcode")
                  candidate_row = price_row_by_store_barcode.get((store_key, matched_barcode))
                  normalized_line_price = normalized_anchor_line_price(anchor_probe, unit_match.get("candidate_unit_price"))
                  return {
                      "source_item_id": anchor_barcode,
                      "matched_item_id": matched_barcode,
                      "matched_item_name": product_probe_metadata_by_barcode.get(matched_barcode, {}).get("name"),
                      "chosen_layer": "same_product_unit_normalized",
                      "confidence_class": line_confidence_class("same_product_unit_normalized"),
                      "price_evidence_source": "official_current_price_rows_normalized_by_pack_signature",
                      "metadata_evidence_source": "products_payload_plus_existing_products_curated_family_same_product_identity_pack_signature",
                      "gf_evidence_source": default_gf_source,
                      "equivalence_basis": "same_same_product_identity_key_different_pack_same_dimension",
                      "normalization_basis": "pack_signature_dimension_unit_normalization",
                      "reason_or_failure_reason": "unit_normalized_same_product_match",
                      "baseline_line_price": normalized_line_price,
                      "budget_line_price": None,
                      "matched_price_value": comparison_price_value(candidate_row) if candidate_row else None,
                      "budget_savings_pct": None,
                      "anchor_requires_gluten_preservation": anchor_requires_gf,
                  }

              canonical_match, canonical_reason = find_canonical_equivalent_match(anchor_probe, store_key)
              if canonical_match:
                  matched_barcode = canonical_match.get("matched_barcode")
                  candidate_row = price_row_by_store_barcode.get((store_key, matched_barcode))
                  candidate_meta = product_probe_metadata_by_barcode.get(matched_barcode, {})
                  anchor_pack = anchor_meta.get("pack_signature")
                  candidate_pack = candidate_meta.get("pack_signature")
                  normalization_basis = "not_required"
