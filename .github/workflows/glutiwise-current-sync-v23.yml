              "coverage_rows_match_successful_prices": coverage_all_store_key_set == price_store_key_set,
              "target_coverage_rows_match_target_store_count": len(target_coverage_by_store_rows) == len(target_store_key_set),
              "product_placeholder_leaks_absent": not placeholder_leak_summary,
              "store_parse_errors_absent": not store_parse_errors,
              "store_readiness_consistency_ok": store_readiness_consistency["consistency_ok"],
          }
          artifact_self_check["reasons"] = list(store_readiness_consistency["reasons"])
          artifact_self_check["artifact_self_check_ok"] = all(
              value
              for key, value in artifact_self_check.items()
              if key != "reasons"
          )
          write_json(OUT_DIR / "artifact_self_check.json", artifact_self_check)
          
          source_freshness_ok = not stale_price_source_store_keys and not stale_promo_source_store_keys
          strict_target_coverage_ok = not missing_price_store_keys and not failed_price_store_rows and not missing_promo_store_keys and not failed_promo_store_rows and source_freshness_ok
          store_readiness_ok = not weak_target_store_keys
          covered_target_store_keys = sorted(target_store_key_set & price_store_key_set & promo_store_key_set)
          uncovered_target_store_keys = sorted(target_store_key_set - set(covered_target_store_keys))
          covered_target_city_set = {discovered_stores_map[key]["canonical_city"] for key in covered_target_store_keys}
          covered_target_retailer_set = {discovered_stores_map[key]["retailer"] for key in covered_target_store_keys}
          missing_covered_target_cities = sorted(set(TARGET_CITIES) - covered_target_city_set)
          missing_covered_target_retailers = sorted(set(TARGET_RETAILERS) - covered_target_retailer_set)
          write_scope_ok = bool(covered_target_store_keys) and not target_validation_failures and not missing_covered_target_cities and not missing_covered_target_retailers and artifact_self_check["artifact_self_check_ok"] and product_hard_quality_ok
          full_comparison_scope_ok = strict_target_coverage_ok and store_set_consistency_ok and store_readiness_ok and write_scope_ok and source_freshness_ok
          write_mode = "full" if full_comparison_scope_ok else "blocked"
          if write_mode == "full":
              for unresolved_row in unresolved_existing_target_rows:
                  auto_deactivated_existing_target_rows.append({
                      "store_key": unresolved_row.get("store_key"),
                      "retailer": unresolved_row.get("retailer"),
                      "store_id": unresolved_row.get("store_id"),
                      "store_name": unresolved_row.get("store_name"),
                      "city": unresolved_row.get("city"),
                      "address": unresolved_row.get("address"),
                      "target_city_hint": unresolved_row.get("target_city_hint"),
                      "reason": unresolved_row.get("reason"),
                  })
                  stores_payload.append({
                      "retailer": unresolved_row.get("retailer"),
                      "store_id": unresolved_row.get("store_id"),
                      "store_name": unresolved_row.get("store_name"),
                      "city": unresolved_row.get("city"),
                      "store_key": unresolved_row.get("store_key"),
                      "address": unresolved_row.get("address"),
                      "area": existing_target_chain_by_key.get(unresolved_row.get("store_key"), {}).get("area"),
                      "store_type": existing_target_chain_by_key.get(unresolved_row.get("store_key"), {}).get("store_type") or "chain",
                      "mvp_active": False,
                  })
          write_csv(
              OUT_DIR / "auto_deactivated_existing_target_rows.csv",
              auto_deactivated_existing_target_rows,
              ["store_key", "retailer", "store_id", "store_name", "city", "address", "target_city_hint", "reason"],
          )
          uncovered_target_rows = []
          for store_key in uncovered_target_store_keys:
              row = discovered_stores_map[store_key]
              uncovered_target_rows.append({
                  "store_key": store_key,
                  "retailer": row["retailer"],
                  "store_name": row["store_name"],
                  "city": row["canonical_city"],
                  "missing_price_file": store_key in missing_price_store_keys,
                  "missing_promo_file": store_key in missing_promo_store_keys,
                  "has_price_payload": store_key in price_store_key_set,
                  "has_promo_payload": store_key in promo_store_key_set,
              })
          write_csv(
              OUT_DIR / "uncovered_target_stores.csv",
              uncovered_target_rows,
              ["store_key", "retailer", "store_name", "city", "missing_price_file", "missing_promo_file", "has_price_payload", "has_promo_payload"],
          )
          quarantined_target_store_keys = []
          write_json(OUT_DIR / "partial_safe_mode_summary.json", {
              "write_mode": write_mode,
              "covered_target_store_count": len(covered_target_store_keys),
              "uncovered_target_store_count": len(uncovered_target_store_keys),
              "quarantined_target_store_count": len(quarantined_target_store_keys),
              "covered_store_keys": covered_target_store_keys,
              "quarantined_store_keys": quarantined_target_store_keys,
              "note": "Full-comparison-only mode: the workflow writes only when every selected MVP store has both prices and promotions. Otherwise the DB is left untouched and the previous complete comparison remains in place.",
          })
          write_json(OUT_DIR / "db_write_decision.json", {
              "write_mode": write_mode,
              "strict_target_coverage_ok": strict_target_coverage_ok,
              "source_freshness_ok": source_freshness_ok,
              "store_readiness_ok": store_readiness_ok,
              "store_set_consistency_ok": store_set_consistency_ok,
              "artifact_self_check_ok": artifact_self_check["artifact_self_check_ok"],
              "store_readiness_consistency_ok": store_readiness_consistency["consistency_ok"],
              "artifact_self_check_reasons": artifact_self_check["reasons"],
              "product_hard_quality_ok": product_hard_quality_ok,
              "product_enrichment_quality_ok": product_enrichment_quality_ok,
              "product_enrichment_quality_blocks_write": False,
              "covered_target_store_count": len(covered_target_store_keys),
              "uncovered_target_store_count": len(uncovered_target_store_keys),
              "missing_covered_target_cities": missing_covered_target_cities,
              "missing_covered_target_retailers": missing_covered_target_retailers,
              "quarantined_target_store_count": len(quarantined_target_store_keys),
              "ready_for_db_write": full_comparison_scope_ok,
          })
          
          payload_counts = {
              "run_ts": RUN_TS_ISO,
              "event_name": EVENT_NAME,
              "is_scheduled_run": IS_SCHEDULED_RUN,
              "write_to_supabase": WRITE_TO_SUPABASE,
              "write_promotion_items": WRITE_PROMOTION_ITEMS,
              "secondary_source_mode": SECONDARY_SOURCE_MODE,
              "secondary_source_candidate": SECONDARY_SOURCE_CANDIDATE,
              "secondary_source_fetch_enabled": SECONDARY_SOURCE_FETCH_ENABLED,
              "stores_discovered": len(discovered_stores_map),
              "target_stores": len(discovered_target_stores),
              "non_target_stores": len(discovered_non_target_stores),
              "products_payload": len(products_payload),
              "prices_payload": len(prices_payload),
              "promotions_payload": len(promotions_payload),
              "promotion_items_payload": len(promotion_items_payload),
              "price_rows_with_any_promotion": compare_ready_summary.get("price_rows_with_any_promotion", 0),
              "price_rows_with_direct_unit_effective_price": compare_ready_summary.get("price_rows_with_direct_unit_effective_price", 0),
              "price_rows_with_club_member_promotion": compare_ready_summary.get("price_rows_with_club_member_promotion", 0),
              "price_rows_with_quantity_dependent_promotion": compare_ready_summary.get("price_rows_with_quantity_dependent_promotion", 0),
              "successful_price_store_keys": len(successful_price_store_keys),
              "successful_promo_store_keys": len(successful_promo_store_keys),
              "missing_price_store_keys": len(missing_price_store_keys),
              "missing_promo_store_keys": len(missing_promo_store_keys),
              "failed_promo_store_rows": len(failed_promo_store_rows),
              "legacy_store_key_aliases": len(legacy_store_key_aliases),
              "unresolved_existing_target_rows": len(unresolved_existing_target_rows),
              "auto_deactivated_existing_target_rows": len(auto_deactivated_existing_target_rows),
              "target_validation_failures": len(target_validation_failures),
              "missing_target_cities": len(missing_target_cities),
              "store_set_consistency_ok": store_set_consistency_ok,
              "artifact_self_check_ok": artifact_self_check["artifact_self_check_ok"],
              "strict_target_coverage_ok": strict_target_coverage_ok,
              "store_readiness_ok": store_readiness_ok,
              "covered_target_store_keys": len(covered_target_store_keys),
              "uncovered_target_store_keys": len(uncovered_target_store_keys),
              "quarantined_target_store_keys": len(quarantined_target_store_keys),
              "weak_target_store_keys": len(weak_target_store_keys),
              "missing_covered_target_cities": len(missing_covered_target_cities),
              "missing_covered_target_retailers": len(missing_covered_target_retailers),
              "product_hard_quality_ok": product_hard_quality_ok,
              "product_enrichment_quality_ok": product_enrichment_quality_ok,
              "ready_for_db_write": full_comparison_scope_ok,
              "write_mode": write_mode,
              "product_company_or_brand_pct": product_payload_coverage.get("pct_company_or_brand", 0),
          }
          write_json(OUT_DIR / "db_payload_counts.json", payload_counts)
          write_json(OUT_DIR / "payload_keysets_summary.json", {
              "products": summarize_payload_keysets(products_payload),
              "stores": summarize_payload_keysets(stores_payload),
              "prices_current": summarize_payload_keysets(prices_payload),
              "promotions_current": summarize_payload_keysets([select_fields(row, PROMOTIONS_CURRENT_DB_FIELDS) for row in promotions_payload]),
              "promotion_items_current": summarize_payload_keysets(promotion_items_payload),
          })
          write_json(OUT_DIR / "promotion_items_write_plan.json", {
              "write_promotion_items": WRITE_PROMOTION_ITEMS,
              "compare_ready_summary": compare_ready_summary,
              "promotion_items_payload_total": len(promotion_items_payload),
              "recommended_for_supabase_free": False,
              "note": "Compare-ready mode keeps promotion_items_current disabled by default for the scheduled Free-plan run. The workflow still requires full store coverage before publishing.",
          })
          write_json(OUT_DIR / "run_summary.json", {
              **payload_counts,
              "store_parse_errors": store_parse_errors,
              "price_parse_errors": price_parse_errors,
              "promo_parse_errors": promo_parse_errors,
          })
          if WRITE_HEAVY_DEBUG_ARTIFACTS:
              write_json(OUT_DIR / "products_upsert.json", products_payload)
              write_json(OUT_DIR / "stores_upsert.json", stores_payload)
              write_json(OUT_DIR / "prices_upsert.json", prices_payload)
              write_json(OUT_DIR / "promotions_upsert.json", promotions_payload)
              write_json(OUT_DIR / "promotion_items_upsert.json", promotion_items_payload)
          
          if write_mode != "full":
              coverage_errors = []
              if target_validation_failures:
                  coverage_errors.append(f"target_validation_failures={len(target_validation_failures)}")
              if not artifact_self_check["artifact_self_check_ok"]:
                  coverage_errors.append("artifact_self_check_ok=false")
              if not store_readiness_consistency["consistency_ok"]:
                  coverage_errors.append("store_readiness_consistency_ok=false")
              if missing_target_cities:
                  coverage_errors.append(f"missing_target_cities={len(missing_target_cities)}")
              if missing_covered_target_cities:
                  coverage_errors.append(f"missing_covered_target_cities={len(missing_covered_target_cities)}")
              if missing_covered_target_retailers:
                  coverage_errors.append(f"missing_covered_target_retailers={len(missing_covered_target_retailers)}")
              if not strict_target_coverage_ok:
                  coverage_errors.append("strict_target_coverage_ok=false")
              if not source_freshness_ok:
                  coverage_errors.append("source_freshness_ok=false")
              if not store_set_consistency_ok:
                  coverage_errors.append("store_set_consistency_ok=false")
              if not store_readiness_ok:
                  coverage_errors.append(f"weak_target_store_keys={len(weak_target_store_keys)}")
              if not product_hard_quality_ok:
                  coverage_errors.append(
                      f"product_hard_quality_failed(name>={minimum_name_pct_hard},category>={minimum_category_pct},placeholder_leaks=0)"
                  )
              message = "DB write blocked because the selected MVP scope is not complete enough for a full daily comparison: " + ", ".join(coverage_errors)
              if WRITE_TO_SUPABASE:
                  raise SystemExit(message)
              log(message)
              log("WRITE_TO_SUPABASE=false -> payload built for inspection only. Full comparison publish gate not approved.")
              sys.exit(0)
          
          if not WRITE_TO_SUPABASE:
              log("WRITE_TO_SUPABASE=false -> full target coverage achieved; DB write is ready.")
              sys.exit(0)
          
          safe_write_store_keys = set(covered_target_store_keys)
          quarantined_target_store_key_set = set(quarantined_target_store_keys)
          safe_price_pairs = {(row["store_key"], row["barcode"]) for row in prices_payload if row["store_key"] in safe_write_store_keys}
          prices_payload_to_write = [row for row in prices_payload if row["store_key"] in safe_write_store_keys]
          promotions_payload_to_write = [
              select_fields(row, PROMOTIONS_CURRENT_DB_FIELDS)
              for row in promotions_payload
              if row["store_key"] in safe_write_store_keys
          ]
          promotion_store_key_by_key = {row["promotion_key"]: row["store_key"] for row in promotions_payload_to_write}
          promotion_items_payload_to_write = [
              row for row in promotion_items_payload
              if (promotion_store_key_by_key.get(row["promotion_key"]), row["barcode"]) in safe_price_pairs
          ]
          processed_promotion_keys_to_write = {row["promotion_key"] for row in promotions_payload_to_write}
          promotion_items_rows_by_store = {}
          for row in promotion_items_payload_to_write:
              store_key = promotion_store_key_by_key.get(row["promotion_key"])
              if not store_key:
                  continue
              promotion_items_rows_by_store.setdefault(store_key, []).append(row)
          write_json(OUT_DIR / "promotion_items_write_plan.json", {
              "mvp_scope_profile": MVP_SCOPE_PROFILE,
              "target_cities": list(TARGET_CITIES),
              "write_promotion_items": WRITE_PROMOTION_ITEMS,
              "promotion_items_payload_total": len(promotion_items_payload),
              "promotion_items_payload_intersect_prices": len(promotion_items_payload_to_write),
              "safe_write_store_keys": len(safe_write_store_keys),
              "stores_with_promotion_items_to_write": len(promotion_items_rows_by_store),
              "promotion_items_max_safe": PROMOTION_ITEMS_MAX_SAFE,
              "max_target_stores_safe": MAX_TARGET_STORES_SAFE,
              "recommended_for_supabase_free": len(promotion_items_payload_to_write) <= PROMOTION_ITEMS_MAX_SAFE and len(safe_write_store_keys) <= MAX_TARGET_STORES_SAFE,
              "note": "Compare-ready mode keeps promotion_items_current optional. For the scheduled Free-plan run, keep it disabled unless you are doing a one-off debug write.",
          })
          
          if WRITE_TO_SUPABASE and WRITE_PROMOTION_ITEMS and not ALLOW_LARGE_PROMOTION_SCOPE:
              large_scope_errors = []
              if len(safe_write_store_keys) > MAX_TARGET_STORES_SAFE:
                  large_scope_errors.append(f"safe_write_store_keys={len(safe_write_store_keys)} exceeds MAX_TARGET_STORES_SAFE={MAX_TARGET_STORES_SAFE}")
              if len(promotion_items_payload_to_write) > PROMOTION_ITEMS_MAX_SAFE:
                  large_scope_errors.append(f"promotion_items_payload_to_write={len(promotion_items_payload_to_write)} exceeds PROMOTION_ITEMS_MAX_SAFE={PROMOTION_ITEMS_MAX_SAFE}")
              if large_scope_errors:
                  raise SystemExit("DB write blocked for Supabase Free safety: " + "; ".join(large_scope_errors))
          
          post_upsert("products", "barcode", products_payload, 2000)
          post_upsert("stores", "store_key", stores_payload, 500)
          post_upsert("prices_current", "price_key", prices_payload_to_write, 2500, min_chunk_size=200, split_on_timeout=True, pause_after_chunk=0.02)
          post_upsert("promotions_current", "promotion_key", promotions_payload_to_write, 750, min_chunk_size=50, split_on_timeout=True, pause_after_chunk=0.03)
          if WRITE_PROMOTION_ITEMS:
              for store_key in sorted(promotion_items_rows_by_store):
                  log(f"Writing promotion_items_current for {store_key} ({len(promotion_items_rows_by_store[store_key])} rows)")
                  post_upsert(
                      "promotion_items_current",
                      "promotion_item_key",
                      promotion_items_rows_by_store[store_key],
                      250,
                      min_chunk_size=10,
                      split_on_timeout=True,
                      pause_after_chunk=0.05,
                  )
          else:
              log("Skipping promotion_items_current write in compare-ready mode by design.")
          
          deactivated_missing_target_store_keys = {row["store_key"] for row in auto_deactivated_existing_target_rows}
          cleanup_non_current_store_keys = sorted(non_target_store_keys | legacy_store_keys_to_deactivate | deactivated_missing_target_store_keys | quarantined_target_store_key_set)
          cleanup_lookup_batches = list(chunked(cleanup_non_current_store_keys, 100))
          stale_promo_lookup_batches = list(chunked(sorted(safe_write_store_keys), 100))
          
          for batch in cleanup_lookup_batches:
              promo_keys_for_removed_stores = fetch_promotion_keys({"store_key": build_in_filter(batch)})
              delete_promotion_items_by_promotion_keys(promo_keys_for_removed_stores)
          
          delete_rows_safe("prices_current", "store_key", cleanup_non_current_store_keys, batch_size=100, min_batch_size=25, pause_after_batch=0.02)
          delete_rows_safe("promotions_current", "store_key", cleanup_non_current_store_keys, batch_size=100, min_batch_size=25, pause_after_batch=0.02)
          
          delete_rows_safe(
              "prices_current",
              "store_key",
              safe_write_store_keys,
              extra_filters={"last_seen_at": f"lt.{PRICE_STALE_BEFORE}"},
              batch_size=100,
              min_batch_size=25,
              pause_after_batch=0.02,
          )
          
          if WRITE_PROMOTION_ITEMS:
              for batch in stale_promo_lookup_batches:
                  stale_promo_filters = {
                      "store_key": build_in_filter(batch),
                      "last_seen_at": f"lt.{RUN_TS_ISO}",
                  }
                  stale_promo_keys = fetch_promotion_keys(stale_promo_filters)
                  delete_promotion_items_by_promotion_keys(stale_promo_keys)
          else:
              for batch in stale_promo_lookup_batches:
                  current_scope_promo_keys = fetch_promotion_keys({"store_key": build_in_filter(batch)})
                  delete_promotion_items_by_promotion_keys(current_scope_promo_keys)
          
          delete_rows_safe(
              "promotions_current",
              "store_key",
              safe_write_store_keys,
              extra_filters={"last_seen_at": f"lt.{RUN_TS_ISO}"},
              batch_size=100,
              min_batch_size=25,
              pause_after_batch=0.02,
          )
          
          if WRITE_PROMOTION_ITEMS and processed_promotion_keys_to_write:
              delete_rows_safe(
                  "promotion_items_current",
                  "promotion_key",
                  processed_promotion_keys_to_write,
                  extra_filters={"last_seen_at": f"lt.{RUN_TS_ISO}"},
                  batch_size=100,
                  min_batch_size=10,
                  pause_after_batch=0.02,
              )
          
          if not WRITE_HEAVY_DEBUG_ARTIFACTS:
              for chunk_path in (OUT_DIR / "chunks").glob("*"):
                  try:
                      chunk_path.unlink()
                  except Exception:
                      pass
          log("GlutiWise current sync completed successfully in full-comparison compare-ready mode.")
          PY
          python3 -m py_compile sync_glutiwise.py
          python3 sync_glutiwise.py

