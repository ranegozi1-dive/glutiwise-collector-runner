                  "stores_missing_family_candidate": len(missing_store_keys),
                  "missing_store_keys": missing_store_keys,
                  "median_priced_family_product_count_when_present": median_number(present_store_counts),
                  "stores_with_multiple_form_factors": sum(1 for row in store_rows_for_family if row["distinct_form_factor_count"] >= 2),
                  "stores_with_multiple_equivalence_groups": sum(1 for row in store_rows_for_family if row["distinct_equivalence_group_count"] >= 2),
              }
          write_csv(
              OUT_DIR / "store_comparison_family_coverage.csv",
