          def normalized_anchor_line_price_from_metadata(metadata_by_barcode, anchor_probe: dict, candidate_unit_price):
              if candidate_unit_price is None:
                  return None
              anchor_pack = anchor_probe.get("pack_signature") or metadata_by_barcode.get(anchor_probe["barcode"], {}).get("pack_signature")
              if not anchor_pack:
                  return None
              anchor_qty = anchor_pack.get("total_base_qty")
              if anchor_qty is None or anchor_qty <= 0:
                  return None
              return round(candidate_unit_price * anchor_qty, 6)

          def budget_candidate_line_price_from_metadata(metadata_by_barcode, anchor_probe: dict, budget_match: dict):
              comparison_basis = budget_match.get("comparison_basis")
              if comparison_basis and comparison_basis.startswith("unit_price"):
                  return normalized_anchor_line_price_from_metadata(metadata_by_barcode, anchor_probe, budget_match.get("candidate_compare_price"))
              if comparison_basis and comparison_basis.startswith("same_pack_direct_price"):
                  candidate_compare_price = budget_match.get("candidate_compare_price")
                  if candidate_compare_price is None:
                      return None
                  return round(candidate_compare_price, 6)
              return None

          def legacy_find_unit_normalized_match(anchor_probe: dict, store_key: str):
              anchor_barcode = anchor_probe["barcode"]
              anchor_meta = legacy_product_probe_metadata_by_barcode.get(anchor_barcode, {})
              substitute_group_value = clean_text(anchor_meta.get("substitute_group"))
              if not substitute_group_value:
                  return None, "not_proven_no_substitute_group"
              anchor_pack = anchor_meta.get("pack_signature")
              if not anchor_pack:
                  return None, "not_proven_no_anchor_pack_signature"
              if not anchor_meta.get("line_signature"):
                  return None, "not_proven_no_anchor_line_signature"
              if not anchor_meta.get("brand_key"):
                  return None, "not_proven_no_anchor_brand_key"
              anchor_category_key = anchor_meta.get("category_key")
              any_family_candidate = False
              for candidate_row in store_rows_by_substitute_group.get(store_key, {}).get(substitute_group_value, []):
                  candidate_barcode = candidate_row.get("barcode")
                  if candidate_barcode == anchor_barcode:
                      continue
                  any_family_candidate = True
                  candidate_meta = legacy_product_probe_metadata_by_barcode.get(candidate_barcode, {})
                  if candidate_meta.get("category_key") != anchor_category_key:
                      continue
                  if candidate_meta.get("brand_key") != anchor_meta.get("brand_key"):
                      continue
                  if candidate_meta.get("line_signature") != anchor_meta.get("line_signature"):
                      continue
                  candidate_pack = candidate_meta.get("pack_signature")
                  if not candidate_pack:
                      continue
                  if candidate_pack.get("dimension") != anchor_pack.get("dimension"):
                      continue
                  if abs(candidate_pack.get("total_base_qty", 0.0) - anchor_pack.get("total_base_qty", 0.0)) < 0.0001:
                      continue
                  candidate_unit_price = compute_unit_price_from_pack(comparison_price_value(candidate_row), candidate_pack)
                  if candidate_unit_price is None:
                      continue
                  return {
                      "matched_barcode": candidate_barcode,
                      "candidate_unit_price": candidate_unit_price,
                  }, ""
              if any_family_candidate:
                  return None, "not_proven_no_unit_normalized_same_product_match"
              return None, "no_store_candidate_in_substitute_group"

          def legacy_find_canonical_equivalent_match(anchor_probe: dict, store_key: str):
              anchor_barcode = anchor_probe["barcode"]
              anchor_meta = legacy_product_probe_metadata_by_barcode.get(anchor_barcode, {})
              substitute_group_value = clean_text(anchor_meta.get("substitute_group"))
              if not substitute_group_value:
                  return None, "not_proven_no_substitute_group"
              anchor_category_key = anchor_meta.get("category_key")
              if not anchor_category_key:
                  return None, "not_proven_no_anchor_category"
              if not anchor_meta.get("line_signature"):
                  return None, "not_proven_no_anchor_line_signature"
              any_family_candidate = False
              any_category_candidate = False
              gf_blocked = False
              for candidate_row in store_rows_by_substitute_group.get(store_key, {}).get(substitute_group_value, []):
                  candidate_barcode = candidate_row.get("barcode")
                  if candidate_barcode == anchor_barcode:
                      continue
                  any_family_candidate = True
                  candidate_meta = legacy_product_probe_metadata_by_barcode.get(candidate_barcode, {})
                  if candidate_meta.get("category_key") != anchor_category_key:
                      continue
                  any_category_candidate = True
                  gf_ok, _ = gluten_preservation_status(anchor_meta, candidate_meta)
                  if not gf_ok:
                      gf_blocked = True
                      continue
                  if candidate_meta.get("line_signature") != anchor_meta.get("line_signature"):
                      continue
                  return {"matched_barcode": candidate_barcode}, ""
              if gf_blocked:
                  return None, "not_proven_gf_constraint"
              if any_category_candidate:
                  return None, "not_proven_no_canonical_line_match"
              if any_family_candidate:
                  return None, "not_proven_no_same_category_candidate"
              return None, "no_store_candidate_in_substitute_group"

          def legacy_find_budget_alternative_match(anchor_probe: dict, store_key: str):
              anchor_barcode = anchor_probe["barcode"]
              anchor_meta = legacy_product_probe_metadata_by_barcode.get(anchor_barcode, {})
              substitute_group_value = clean_text(anchor_meta.get("substitute_group"))
              if not substitute_group_value:
                  return None, "not_proven_no_substitute_group"
              anchor_category_key = anchor_meta.get("category_key")
              if not anchor_category_key:
                  return None, "not_proven_no_anchor_category"
              anchor_pack = anchor_meta.get("pack_signature")
              reference_unit_price = anchor_probe.get("reference_unit_price_median")
              reference_effective_price = anchor_probe.get("reference_effective_price_median")
              any_family_candidate = False
              any_price_comparable_candidate = False
              gf_blocked = False
              best_candidate = None
              for candidate_row in store_rows_by_substitute_group.get(store_key, {}).get(substitute_group_value, []):
                  candidate_barcode = candidate_row.get("barcode")
                  if candidate_barcode == anchor_barcode:
                      continue
                  any_family_candidate = True
                  candidate_meta = legacy_product_probe_metadata_by_barcode.get(candidate_barcode, {})
                  if candidate_meta.get("category_key") != anchor_category_key:
                      continue
                  gf_ok, _ = gluten_preservation_status(anchor_meta, candidate_meta)
                  if not gf_ok:
                      gf_blocked = True
                      continue
                  candidate_compare_price = None
                  reference_compare_price = None
                  comparison_basis = None
                  candidate_pack = candidate_meta.get("pack_signature")
                  if reference_unit_price is not None and anchor_pack and candidate_pack and candidate_pack.get("dimension") == anchor_pack.get("dimension"):
                      candidate_compare_price = compute_unit_price_from_pack(comparison_price_value(candidate_row), candidate_pack)
                      reference_compare_price = reference_unit_price
                      comparison_basis = "unit_price"
                  elif reference_effective_price is not None and candidate_meta.get("line_signature") and candidate_meta.get("line_signature") == anchor_meta.get("line_signature"):
                      candidate_compare_price = comparison_price_value(candidate_row)
                      reference_compare_price = reference_effective_price
                      comparison_basis = "same_line_price"
                  if candidate_compare_price is None or reference_compare_price is None:
                      continue
                  any_price_comparable_candidate = True
                  if reference_compare_price <= 0:
                      continue
                  savings_pct = round(((reference_compare_price - candidate_compare_price) / reference_compare_price) * 100.0, 2)
                  if savings_pct < budget_alternative_min_savings_pct:
                      continue
                  candidate_payload = {
                      "matched_barcode": candidate_barcode,
                      "comparison_basis": comparison_basis,
                      "candidate_compare_price": round(candidate_compare_price, 6),
                      "savings_pct": savings_pct,
                  }
                  if best_candidate is None or candidate_compare_price < best_candidate["candidate_compare_price"]:
                      best_candidate = candidate_payload
              if best_candidate is not None:
                  return best_candidate, ""
              if gf_blocked:
                  return None, "not_proven_gf_constraint"
              if any_price_comparable_candidate:
                  return None, "not_cheaper_enough_for_budget_alternative"
              if any_family_candidate:
                  return None, "not_proven_no_price_comparable_candidate"
              return None, "no_store_candidate_in_substitute_group"

          def legacy_resolve_basket_line_shadow_match(anchor_probe: dict, store_key: str):
              anchor_barcode = anchor_probe["barcode"]
              if price_row_by_store_barcode.get((store_key, anchor_barcode)):
                  return {
                      "source_item_id": anchor_barcode,
                      "chosen_layer": "exact_identity",
                      "reason_or_failure_reason": "exact_identity_available",
                  }
              unit_match, unit_reason = legacy_find_unit_normalized_match(anchor_probe, store_key)
              if unit_match:
                  return {
                      "source_item_id": anchor_barcode,
                      "chosen_layer": "same_product_unit_normalized",
                      "reason_or_failure_reason": "unit_normalized_same_product_match",
                  }
              canonical_match, canonical_reason = legacy_find_canonical_equivalent_match(anchor_probe, store_key)
              if canonical_match:
                  return {
                      "source_item_id": anchor_barcode,
                      "chosen_layer": "canonical_equivalent",
                      "reason_or_failure_reason": "canonical_equivalent_match",
                  }
              budget_match, budget_reason = legacy_find_budget_alternative_match(anchor_probe, store_key)
              if budget_match:
                  return {
                      "source_item_id": anchor_barcode,
                      "chosen_layer": "budget_alternative",
                      "reason_or_failure_reason": "budget_alternative_match",
                  }
              failure_reason = next(
                  (
                      reason for reason in (canonical_reason, budget_reason, unit_reason)
                      if clean_text(reason).lower().startswith("not_proven")
                      and clean_text(reason).lower() != "not_proven_family_disallows_unit_normalization"
                  ),
                  None,
              )
              if not failure_reason:
                  failure_reason = next(
                      (
                          reason for reason in (canonical_reason, budget_reason, unit_reason)
                          if clean_text(reason).lower().startswith("not_proven")
                      ),
                      None,
                  )
              if not failure_reason:
                  failure_reason = next(
                      (
                          reason for reason in (canonical_reason, unit_reason, budget_reason)
                          if "gf_constraint" in clean_text(reason).lower()
                      ),
                      None,
                  )
              if not failure_reason:
                  failure_reason = canonical_reason or unit_reason or budget_reason or "unmatched_no_proven_layer"
              failure_reason_text = clean_text(failure_reason).lower()
              chosen_layer = "not_proven" if failure_reason_text.startswith("not_proven") or "gf_constraint" in failure_reason_text else "unmatched"
              return {
                  "source_item_id": anchor_barcode,
                  "chosen_layer": chosen_layer,
                  "reason_or_failure_reason": failure_reason,
              }

          def shadow_find_unit_normalized_match(anchor_probe: dict, store_key: str):
              anchor_barcode = anchor_probe["barcode"]
              anchor_meta = product_probe_metadata_by_barcode.get(anchor_barcode, {})
              family_rule = comparison_family_registry_by_key.get(anchor_meta.get("comparison_family_key"))
              if family_rule and not family_rule.get("allow_unit_normalization"):
                  return None, "not_proven_family_disallows_unit_normalization"
              same_product_identity_key = clean_text(anchor_meta.get("same_product_identity_key"))
              if not same_product_identity_key:
                  return None, "not_proven_no_same_product_identity_key"
              anchor_pack = anchor_meta.get("pack_signature")
              if not anchor_pack:
                  return None, "not_proven_no_anchor_pack_signature"
              gf_blocked = False
              best_candidate = None
              any_same_product_candidate = False
              for candidate_row in shadow_store_rows_by_same_product_key.get(store_key, {}).get(same_product_identity_key, []):
                  candidate_barcode = candidate_row.get("barcode")
                  if candidate_barcode == anchor_barcode:
                      continue
                  any_same_product_candidate = True
                  candidate_meta = product_probe_metadata_by_barcode.get(candidate_barcode, {})
                  gf_ok, _ = gluten_preservation_status(anchor_meta, candidate_meta)
                  if not gf_ok:
                      gf_blocked = True
                      continue
                  candidate_pack = candidate_meta.get("pack_signature")
                  if not candidate_pack:
                      continue
                  if candidate_pack.get("dimension") != anchor_pack.get("dimension"):
                      continue
                  if abs(candidate_pack.get("total_base_qty", 0.0) - anchor_pack.get("total_base_qty", 0.0)) < 0.0001:
                      continue
                  candidate_unit_price = compute_unit_price_from_pack(comparison_price_value(candidate_row), candidate_pack)
                  if candidate_unit_price is None:
                      continue
                  candidate_payload = {
                      "matched_barcode": candidate_barcode,
                      "candidate_unit_price": candidate_unit_price,
                      "normalization_basis": f"{anchor_pack.get('dimension')}_unit_price_normalization",
                  }
                  if best_candidate is None or candidate_unit_price < best_candidate["candidate_unit_price"]:
                      best_candidate = candidate_payload
              if best_candidate is not None:
                  return best_candidate, ""
              if gf_blocked:
                  return None, "not_proven_gf_constraint"
              if any_same_product_candidate:
                  return None, "not_proven_no_unit_normalized_same_product_match"
              return None, "no_store_candidate_in_same_product_identity_group"

          def shadow_find_canonical_equivalent_match(anchor_probe: dict, store_key: str):
              anchor_barcode = anchor_probe["barcode"]
              anchor_meta = product_probe_metadata_by_barcode.get(anchor_barcode, {})
              family_rule = comparison_family_registry_by_key.get(anchor_meta.get("comparison_family_key"))
              if family_rule and not family_rule.get("allow_canonical_equivalent"):
                  return None, "not_proven_family_disallows_canonical_equivalent"
              equivalence_group_key = clean_text(anchor_meta.get("equivalence_group_key"))
              if not equivalence_group_key:
                  return None, "not_proven_no_equivalence_group_key"
              anchor_category_key = anchor_meta.get("category_key")
              if not anchor_category_key:
                  return None, "not_proven_no_anchor_category"
              anchor_form_factor_key = clean_text(anchor_meta.get("form_factor_key"))
              if not anchor_form_factor_key:
                  return None, "not_proven_no_anchor_form_factor_key"
              any_family_candidate = False
              any_category_candidate = False
              any_form_factor_candidate = False
              gf_blocked = False
              for candidate_row in shadow_store_rows_by_equivalence_group.get(store_key, {}).get(equivalence_group_key, []):
                  candidate_barcode = candidate_row.get("barcode")
                  if candidate_barcode == anchor_barcode:
                      continue
                  any_family_candidate = True
                  candidate_meta = product_probe_metadata_by_barcode.get(candidate_barcode, {})
                  if candidate_meta.get("category_key") != anchor_category_key:
                      continue
                  any_category_candidate = True
                  if clean_text(candidate_meta.get("form_factor_key")) != anchor_form_factor_key:
                      continue
                  any_form_factor_candidate = True
                  gf_ok, _ = gluten_preservation_status(anchor_meta, candidate_meta)
                  if not gf_ok:
                      gf_blocked = True
                      continue
                  if comparison_price_value(candidate_row) is None:
                      continue
                  return {
                      "matched_barcode": candidate_barcode,
                      "equivalence_basis": "same_equivalence_group_same_category_same_form_factor",
                  }, ""
              if gf_blocked:
                  return None, "not_proven_gf_constraint"
              if any_form_factor_candidate:
                  return None, "not_proven_no_canonical_price_candidate"
              if any_category_candidate:
                  return None, "not_proven_no_matching_form_factor_candidate"
              if any_family_candidate:
                  return None, "not_proven_no_same_category_candidate"
              return None, "no_store_candidate_in_equivalence_group"

          def shadow_find_budget_alternative_match(anchor_probe: dict, store_key: str):
              anchor_barcode = anchor_probe["barcode"]
              anchor_meta = product_probe_metadata_by_barcode.get(anchor_barcode, {})
              family_rule = comparison_family_registry_by_key.get(anchor_meta.get("comparison_family_key"))
              if family_rule and not family_rule.get("allow_canonical_equivalent"):
                  return None, "not_proven_family_disallows_canonical_equivalent"
              equivalence_group_key = clean_text(anchor_meta.get("equivalence_group_key"))
              if not equivalence_group_key:
                  return None, "not_proven_no_equivalence_group_key"
              anchor_category_key = anchor_meta.get("category_key")
              if not anchor_category_key:
                  return None, "not_proven_no_anchor_category"
              anchor_form_factor_key = clean_text(anchor_meta.get("form_factor_key"))
              if not anchor_form_factor_key:
                  return None, "not_proven_no_anchor_form_factor_key"
              anchor_pack = anchor_meta.get("pack_signature")
              reference_unit_price = anchor_probe.get("reference_unit_price_median")
              reference_effective_price = anchor_probe.get("reference_effective_price_median")
              any_family_candidate = False
              any_price_comparable_candidate = False
              gf_blocked = False
              best_candidate = None
              for candidate_row in shadow_store_rows_by_equivalence_group.get(store_key, {}).get(equivalence_group_key, []):
                  candidate_barcode = candidate_row.get("barcode")
                  if candidate_barcode == anchor_barcode:
                      continue
                  any_family_candidate = True
                  candidate_meta = product_probe_metadata_by_barcode.get(candidate_barcode, {})
                  if candidate_meta.get("category_key") != anchor_category_key:
                      continue
                  if clean_text(candidate_meta.get("form_factor_key")) != anchor_form_factor_key:
                      continue
                  gf_ok, _ = gluten_preservation_status(anchor_meta, candidate_meta)
                  if not gf_ok:
                      gf_blocked = True
                      continue
                  candidate_price_value = comparison_price_value(candidate_row)
                  if candidate_price_value is None:
                      continue
                  candidate_compare_price = None
                  reference_compare_price = None
                  comparison_basis = None
                  candidate_pack = candidate_meta.get("pack_signature")
                  if reference_unit_price is not None and anchor_pack and candidate_pack and candidate_pack.get("dimension") == anchor_pack.get("dimension"):
                      candidate_compare_price = compute_unit_price_from_pack(candidate_price_value, candidate_pack)
                      reference_compare_price = reference_unit_price
                      comparison_basis = "unit_price_same_form_factor"
                  elif (
                      reference_effective_price is not None
                      and anchor_pack and candidate_pack
                      and candidate_pack.get("dimension") == anchor_pack.get("dimension")
                      and abs(candidate_pack.get("total_base_qty", 0.0) - anchor_pack.get("total_base_qty", 0.0)) < 0.0001
                  ):
                      candidate_compare_price = candidate_price_value
                      reference_compare_price = reference_effective_price
                      comparison_basis = "same_pack_direct_price"
                  if candidate_compare_price is None or reference_compare_price is None:
                      continue
                  any_price_comparable_candidate = True
                  if reference_compare_price <= 0:
                      continue
                  savings_pct = round(((reference_compare_price - candidate_compare_price) / reference_compare_price) * 100.0, 2)
                  if savings_pct < budget_alternative_min_savings_pct:
                      continue
                  candidate_payload = {
                      "matched_barcode": candidate_barcode,
                      "comparison_basis": comparison_basis,
                      "candidate_compare_price": round(candidate_compare_price, 6),
                      "reference_compare_price": round(reference_compare_price, 6),
                      "savings_pct": savings_pct,
                  }
                  if best_candidate is None or candidate_compare_price < best_candidate["candidate_compare_price"]:
                      best_candidate = candidate_payload
              if best_candidate is not None:
                  return best_candidate, ""
              if gf_blocked:
                  return None, "not_proven_gf_constraint"
              if any_price_comparable_candidate:
                  return None, "not_cheaper_enough_for_budget_alternative"
              if any_family_candidate:
                  return None, "not_proven_no_price_comparable_candidate"
              return None, "no_store_candidate_in_equivalence_group"

          def basket_failure_bucket(reason: str) -> str:
              reason_text = clean_text(reason).lower()
              if not reason_text:
                  return "unknown"
              if "gf_constraint" in reason_text:
                  return "gf_preservation_not_proven"
              if "family_disallows" in reason_text:
                  return "curated_family_restriction"
              if any(token in reason_text for token in ("no_substitute_group", "no_equivalence_group_key", "no_anchor_category", "no_anchor_line_signature", "no_anchor_form_factor_key")):
                  return "missing_equivalence_metadata"
              if any(token in reason_text for token in ("pack", "unit_", "same_product_identity_key")):
                  return "missing_pack_normalization_evidence"
              if any(token in reason_text for token in ("no_store_candidate_in_substitute_group", "no_store_candidate_in_equivalence_group", "no_matching_form_factor_candidate", "no_same_category_candidate", "no_canonical_line_match", "no_canonical_price_candidate")):
                  return "no_proven_equivalent_in_store"
              if "not_cheaper_enough" in reason_text:
                  return "budget_alternative_not_meaningfully_cheaper"
              if "unmatched" in reason_text or "no_exact_identity_match" in reason_text:
                  return "no_proven_match_in_store"
              return "other"

          def shadow_candidate_example_payload(candidate_row: dict):
              candidate_barcode = clean_text(candidate_row.get("barcode"))
              candidate_meta = product_probe_metadata_by_barcode.get(candidate_barcode, {})
              candidate_name = clean_text(candidate_meta.get("name") or candidate_row.get("name") or candidate_row.get("item_name"))
              return {
                  "barcode": candidate_barcode,
                  "name": candidate_name,
                  "brand": clean_text(candidate_meta.get("brand")),
                  "category_key": candidate_meta.get("category_key"),
                  "form_factor_key": clean_text(candidate_meta.get("form_factor_key")),
                  "equivalence_group_key": clean_text(candidate_meta.get("equivalence_group_key")),
                  "comparison_price": comparison_price_value(candidate_row),
              }

          def shadow_candidate_example_list(candidate_rows, limit=3):
              ordered_rows = sorted(
                  candidate_rows,
                  key=lambda row: (
                      comparison_price_value(row) is None,
                      comparison_price_value(row) if comparison_price_value(row) is not None else float("inf"),
                      clean_text(product_probe_metadata_by_barcode.get(clean_text(row.get("barcode")), {}).get("name") or row.get("name") or row.get("item_name")),
                  ),
              )
              examples = []
              seen = set()
              for candidate_row in ordered_rows:
                  payload = shadow_candidate_example_payload(candidate_row)
                  payload_key = (
                      payload["barcode"],
                      payload["name"],
                      payload["equivalence_group_key"],
                      payload["form_factor_key"],
                  )
                  if payload_key in seen:
                      continue
                  seen.add(payload_key)
                  examples.append(payload)
                  if len(examples) >= limit:
                      break
              return examples

          def shadow_candidate_example_names(examples):
              return " | ".join(
                  clean_text(example.get("name"))
                  for example in examples
                  if clean_text(example.get("name"))
              )

          def shadow_store_candidate_snapshot(anchor_probe: dict, store_key: str):
              anchor_barcode = anchor_probe["barcode"]
              anchor_meta = product_probe_metadata_by_barcode.get(anchor_barcode, {})
              comparison_family_key = clean_text(anchor_meta.get("comparison_family_key"))
              equivalence_group_key = clean_text(anchor_meta.get("equivalence_group_key"))
              same_product_identity_key = clean_text(anchor_meta.get("same_product_identity_key"))
              anchor_category_key = anchor_meta.get("category_key")
              anchor_form_factor_key = clean_text(anchor_meta.get("form_factor_key"))
              anchor_requires_gf = bool(anchor_meta.get("requires_gluten_preservation"))
              exact_identity_available = bool(price_row_by_store_barcode.get((store_key, anchor_barcode)))
              family_candidates = [
                  row for row in shadow_store_rows_by_family.get(store_key, {}).get(comparison_family_key, [])
                  if row.get("barcode") != anchor_barcode
              ] if comparison_family_key else []
              same_product_candidates = [
                  row for row in shadow_store_rows_by_same_product_key.get(store_key, {}).get(same_product_identity_key, [])
                  if row.get("barcode") != anchor_barcode
              ] if same_product_identity_key else []
              equivalence_group_candidates = [
                  row for row in shadow_store_rows_by_equivalence_group.get(store_key, {}).get(equivalence_group_key, [])
                  if row.get("barcode") != anchor_barcode
              ] if equivalence_group_key else []
              same_category_candidates = []
              for candidate_row in equivalence_group_candidates:
                  candidate_meta = product_probe_metadata_by_barcode.get(candidate_row.get("barcode"), {})
                  if candidate_meta.get("category_key") == anchor_category_key:
                      same_category_candidates.append(candidate_row)
              family_same_category_candidates = []
              for candidate_row in family_candidates:
                  candidate_meta = product_probe_metadata_by_barcode.get(candidate_row.get("barcode"), {})
                  if candidate_meta.get("category_key") == anchor_category_key:
                      family_same_category_candidates.append(candidate_row)
              same_form_factor_candidates = []
              for candidate_row in same_category_candidates:
                  candidate_meta = product_probe_metadata_by_barcode.get(candidate_row.get("barcode"), {})
                  if clean_text(candidate_meta.get("form_factor_key")) == anchor_form_factor_key:
                      same_form_factor_candidates.append(candidate_row)
              family_same_form_factor_candidates = []
              for candidate_row in family_same_category_candidates:
                  candidate_meta = product_probe_metadata_by_barcode.get(candidate_row.get("barcode"), {})
                  if clean_text(candidate_meta.get("form_factor_key")) == anchor_form_factor_key:
                      family_same_form_factor_candidates.append(candidate_row)
              gf_preserved_candidates = []
              for candidate_row in same_form_factor_candidates:
                  candidate_meta = product_probe_metadata_by_barcode.get(candidate_row.get("barcode"), {})
                  gf_ok, _ = gluten_preservation_status(anchor_meta, candidate_meta)
                  if gf_ok:
                      gf_preserved_candidates.append(candidate_row)
              family_priced_same_form_factor_candidates = [
                  row for row in family_same_form_factor_candidates
                  if comparison_price_value(row) is not None
              ]
              priced_candidates = [
                  row for row in gf_preserved_candidates
                  if comparison_price_value(row) is not None
              ]
              diagnostic_root_cause_bucket = "exact_identity_present"
              if not exact_identity_available:
                  if not comparison_family_key:
                      diagnostic_root_cause_bucket = "anchor_missing_comparison_family_key"
                  elif not family_candidates:
                      diagnostic_root_cause_bucket = "no_store_candidate_in_comparison_family"
                  elif not equivalence_group_key:
                      diagnostic_root_cause_bucket = "anchor_missing_equivalence_group_key"
                  elif not equivalence_group_candidates:
                      if family_same_form_factor_candidates:
                          diagnostic_root_cause_bucket = "same_family_same_form_factor_candidate_outside_equivalence_group"
                      elif family_same_category_candidates:
                          diagnostic_root_cause_bucket = "same_family_same_category_candidate_outside_equivalence_group"
                      else:
                          diagnostic_root_cause_bucket = "no_store_candidate_in_equivalence_group"
                  elif not anchor_category_key:
                      diagnostic_root_cause_bucket = "anchor_missing_category_key"
                  elif not same_category_candidates:
                      diagnostic_root_cause_bucket = "equivalence_group_without_same_category_candidate"
                  elif not anchor_form_factor_key:
                      diagnostic_root_cause_bucket = "anchor_missing_form_factor_key"
                  elif not same_form_factor_candidates:
                      diagnostic_root_cause_bucket = "same_category_without_same_form_factor_candidate"
                  elif anchor_requires_gf and not gf_preserved_candidates:
                      diagnostic_root_cause_bucket = "same_form_factor_but_gf_not_preserved"
              elif not priced_candidates:
                  diagnostic_root_cause_bucket = "same_form_factor_candidate_without_usable_price"
              else:
                  diagnostic_root_cause_bucket = "priced_equivalent_candidate_exists"
              family_same_category_examples = shadow_candidate_example_list(family_same_category_candidates)
              family_same_form_factor_examples = shadow_candidate_example_list(family_same_form_factor_candidates)
              equivalence_group_examples = shadow_candidate_example_list(equivalence_group_candidates)
              priced_equivalence_examples = shadow_candidate_example_list(priced_candidates)
              return {
                  "comparison_family_key": comparison_family_key,
                  "equivalence_group_key": equivalence_group_key,
                  "same_product_identity_key": same_product_identity_key,
                  "exact_identity_available": exact_identity_available,
                  "store_family_candidate_count": len(family_candidates),
                  "store_family_same_category_candidate_count": len(family_same_category_candidates),
                  "store_family_same_form_factor_candidate_count": len(family_same_form_factor_candidates),
                  "store_family_priced_same_form_factor_candidate_count": len(family_priced_same_form_factor_candidates),
                  "store_same_product_candidate_count": len(same_product_candidates),
                  "store_equivalence_group_candidate_count": len(equivalence_group_candidates),
                  "store_same_category_equivalence_candidate_count": len(same_category_candidates),
                  "store_same_form_factor_equivalence_candidate_count": len(same_form_factor_candidates),
                  "store_gf_preserved_equivalence_candidate_count": len(gf_preserved_candidates),
                  "store_priced_equivalence_candidate_count": len(priced_candidates),
                  "diagnostic_root_cause_bucket": diagnostic_root_cause_bucket,
                  "family_same_category_examples": family_same_category_examples,
                  "family_same_form_factor_examples": family_same_form_factor_examples,
                  "equivalence_group_examples": equivalence_group_examples,
                  "priced_equivalence_examples": priced_equivalence_examples,
                  "family_same_category_example_names": shadow_candidate_example_names(family_same_category_examples),
                  "family_same_form_factor_example_names": shadow_candidate_example_names(family_same_form_factor_examples),
                  "equivalence_group_example_names": shadow_candidate_example_names(equivalence_group_examples),
                  "priced_equivalence_example_names": shadow_candidate_example_names(priced_equivalence_examples),
              }

          def resolve_basket_line_shadow_match(anchor_probe: dict, store_key: str):
              anchor_barcode = anchor_probe["barcode"]
              anchor_meta = product_probe_metadata_by_barcode.get(anchor_barcode, {})
              anchor_requires_gf = bool(anchor_meta.get("requires_gluten_preservation"))
              default_gf_source = "explicit_gf_flag_or_gf_verified" if anchor_requires_gf else "not_required"
              exact_row = price_row_by_store_barcode.get((store_key, anchor_barcode))
              if exact_row:
                  exact_price = comparison_price_value(exact_row)
                  return {
                      "source_item_id": anchor_barcode,
                      "matched_item_id": anchor_barcode,
                      "matched_item_name": anchor_meta.get("name"),
                      "chosen_layer": "exact_identity",
                      "confidence_class": line_confidence_class("exact_identity"),
                      "price_evidence_source": "official_current_price_rows_exact_barcode",
                      "metadata_evidence_source": "barcode_identity_from_official_price_row",
                      "gf_evidence_source": default_gf_source,
                      "equivalence_basis": "same_barcode",
                      "normalization_basis": "not_required",
                      "reason_or_failure_reason": "exact_identity_available",
                      "baseline_line_price": exact_price,
                      "budget_line_price": None,
                      "matched_price_value": exact_price,
                      "budget_savings_pct": None,
                      "anchor_requires_gluten_preservation": anchor_requires_gf,
                  }

              unit_match, unit_reason = shadow_find_unit_normalized_match(anchor_probe, store_key)
              if unit_match:
                  matched_barcode = unit_match.get("matched_barcode")
                  candidate_row = price_row_by_store_barcode.get((store_key, matched_barcode))
                  normalized_line_price = normalized_anchor_line_price_from_metadata(product_probe_metadata_by_barcode, anchor_probe, unit_match.get("candidate_unit_price"))
                  return {
                      "source_item_id": anchor_barcode,
                      "matched_item_id": matched_barcode,
                      "matched_item_name": product_probe_metadata_by_barcode.get(matched_barcode, {}).get("name"),
                      "chosen_layer": "same_product_unit_normalized",
                      "confidence_class": line_confidence_class("same_product_unit_normalized"),
                      "price_evidence_source": "official_current_price_rows_normalized_by_pack_signature",
                      "metadata_evidence_source": "workflow_product_metadata_comparison_family_same_product_identity_key_pack_signature",
                      "gf_evidence_source": default_gf_source,
                      "equivalence_basis": "same_product_identity_key_same_category_same_brand_identity",
                      "normalization_basis": unit_match.get("normalization_basis") or "pack_signature_dimension_unit_normalization",
                      "reason_or_failure_reason": "unit_normalized_same_product_match",
                      "baseline_line_price": normalized_line_price,
                      "budget_line_price": None,
                      "matched_price_value": comparison_price_value(candidate_row) if candidate_row else None,
                      "budget_savings_pct": None,
                      "anchor_requires_gluten_preservation": anchor_requires_gf,
                  }

              canonical_match, canonical_reason = shadow_find_canonical_equivalent_match(anchor_probe, store_key)
              if canonical_match:
                  matched_barcode = canonical_match.get("matched_barcode")
                  candidate_row = price_row_by_store_barcode.get((store_key, matched_barcode))
                  candidate_meta = product_probe_metadata_by_barcode.get(matched_barcode, {})
                  anchor_pack = anchor_meta.get("pack_signature")
                  candidate_pack = candidate_meta.get("pack_signature")
                  normalization_basis = "direct_price_same_form_factor"
                  if anchor_pack and candidate_pack and candidate_pack.get("dimension") == anchor_pack.get("dimension"):
                      if abs(candidate_pack.get("total_base_qty", 0.0) - anchor_pack.get("total_base_qty", 0.0)) < 0.0001:
                          normalization_basis = "same_pack_verified"
                      else:
                          normalization_basis = "direct_price_used_same_form_factor_diff_pack"
                  return {
                      "source_item_id": anchor_barcode,
                      "matched_item_id": matched_barcode,
                      "matched_item_name": candidate_meta.get("name"),
                      "chosen_layer": "canonical_equivalent",
                      "confidence_class": line_confidence_class("canonical_equivalent"),
                      "price_evidence_source": "official_current_price_rows_canonical_candidate",
                      "metadata_evidence_source": "workflow_product_metadata_comparison_family_equivalence_group_form_factor",
                      "gf_evidence_source": default_gf_source,
                      "equivalence_basis": canonical_match.get("equivalence_basis") or "same_equivalence_group_same_category_same_form_factor",
                      "normalization_basis": normalization_basis,
                      "reason_or_failure_reason": "canonical_equivalent_match",
                      "baseline_line_price": comparison_price_value(candidate_row) if candidate_row else None,
                      "budget_line_price": None,
                      "matched_price_value": comparison_price_value(candidate_row) if candidate_row else None,
                      "budget_savings_pct": None,
                      "anchor_requires_gluten_preservation": anchor_requires_gf,
                  }

              budget_match, budget_reason = shadow_find_budget_alternative_match(anchor_probe, store_key)
              if budget_match:
                  matched_barcode = budget_match.get("matched_barcode")
                  candidate_row = price_row_by_store_barcode.get((store_key, matched_barcode))
                  return {
                      "source_item_id": anchor_barcode,
                      "matched_item_id": matched_barcode,
                      "matched_item_name": product_probe_metadata_by_barcode.get(matched_barcode, {}).get("name"),
                      "chosen_layer": "budget_alternative",
                      "confidence_class": line_confidence_class("budget_alternative"),
                      "price_evidence_source": "official_current_price_rows_budget_candidate",
                      "metadata_evidence_source": "workflow_product_metadata_comparison_family_equivalence_group_form_factor",
                      "gf_evidence_source": default_gf_source,
                      "equivalence_basis": "same_equivalence_group_same_category_same_form_factor_budget_alternative",
                      "normalization_basis": budget_match.get("comparison_basis") or "not_proven",
                      "reason_or_failure_reason": "budget_alternative_match",
                      "baseline_line_price": None,
                      "budget_line_price": budget_candidate_line_price_from_metadata(product_probe_metadata_by_barcode, anchor_probe, budget_match),
                      "matched_price_value": comparison_price_value(candidate_row) if candidate_row else None,
                      "budget_savings_pct": budget_match.get("savings_pct"),
                      "anchor_requires_gluten_preservation": anchor_requires_gf,
                  }

              failure_reason = next(
                  (
                      reason for reason in (canonical_reason, unit_reason, budget_reason)
                      if clean_text(reason).lower().startswith("not_proven")
                  ),
                  None,
              )
              if not failure_reason:
                  failure_reason = next(
                      (
                          reason for reason in (canonical_reason, unit_reason, budget_reason)
                          if "gf_constraint" in clean_text(reason).lower()
                      ),
                      None,
                  )
              if not failure_reason:
                  failure_reason = canonical_reason or unit_reason or budget_reason or "unmatched_no_proven_layer"
              failure_reason_text = clean_text(failure_reason).lower()
              chosen_layer = "not_proven" if failure_reason_text.startswith("not_proven") or "gf_constraint" in failure_reason_text else "unmatched"
              normalization_basis = "not_proven" if chosen_layer == "not_proven" and ("pack" in failure_reason_text or "unit_" in failure_reason_text or "same_product_identity" in failure_reason_text) else "not_applicable"
              gf_evidence_source = default_gf_source
              if "gf_constraint" in failure_reason_text:
                  gf_evidence_source = "gf_constraint_not_proven_from_explicit_metadata"
              return {
                  "source_item_id": anchor_barcode,
                  "matched_item_id": None,
                  "matched_item_name": None,
                  "chosen_layer": chosen_layer,
                  "confidence_class": line_confidence_class(chosen_layer),
                  "price_evidence_source": "no_usable_official_current_price_match",
                  "metadata_evidence_source": "workflow_product_metadata_incomplete_or_not_proven",
                  "gf_evidence_source": gf_evidence_source,
                  "equivalence_basis": "not_proven" if chosen_layer == "not_proven" else "no_proven_equivalence",
                  "normalization_basis": normalization_basis,
                  "reason_or_failure_reason": failure_reason,
                  "baseline_line_price": None,
                  "budget_line_price": None,
                  "matched_price_value": None,
                  "budget_savings_pct": None,
                  "anchor_requires_gluten_preservation": anchor_requires_gf,
              }

          basket_line_shadow_rows = []
          basket_store_shadow_rows = []
          store_side_equivalence_candidate_rows = []
          for basket_probe in basket_probe_definitions:
              basket_probe_name = basket_probe["basket_probe_name"]
              probe_items = basket_probe["items"]
              selected_probe_size = basket_probe["selected_probe_size"]
              for store in sorted(discovered_target_stores, key=lambda row: row["store_key"]):
                  store_key = store["store_key"]
                  store_line_decisions = []
                  for anchor_probe in probe_items:
                      candidate_snapshot = shadow_store_candidate_snapshot(anchor_probe, store_key)
                      decision = resolve_basket_line_shadow_match(anchor_probe, store_key)
                      store_line_decisions.append(decision)
                      basket_line_shadow_rows.append({
                          "basket_probe_name": basket_probe_name,
                          "source_item_id": decision["source_item_id"],
                          "source_item_name": anchor_probe.get("name"),
                          "store_key": store_key,
                          "retailer": store.get("retailer"),
                          "city": store.get("canonical_city") or store.get("city"),
                          "matched_item_id": decision["matched_item_id"],
                          "matched_item_name": decision["matched_item_name"],
                          "chosen_layer": decision["chosen_layer"],
                          "confidence_class": decision["confidence_class"],
                          "price_evidence_source": decision["price_evidence_source"],
                          "metadata_evidence_source": decision["metadata_evidence_source"],
                          "gf_evidence_source": decision["gf_evidence_source"],
                          "gf_constraint_required": decision["anchor_requires_gluten_preservation"],
                          "equivalence_basis": decision["equivalence_basis"],
                          "normalization_basis": decision["normalization_basis"],
                          "matched_price_value": decision["matched_price_value"],
                          "baseline_line_price": decision["baseline_line_price"],
                          "budget_line_price": decision["budget_line_price"],
                          "budget_savings_pct": decision["budget_savings_pct"],
                          "reason_or_failure_reason": decision["reason_or_failure_reason"],
                      })
                      store_side_equivalence_candidate_rows.append({
                          "basket_probe_name": basket_probe_name,
                          "source_item_id": decision["source_item_id"],
                          "source_item_name": anchor_probe.get("name"),
                          "store_key": store_key,
                          "retailer": store.get("retailer"),
                          "city": store.get("canonical_city") or store.get("city"),
                          "chosen_layer": decision["chosen_layer"],
                          "reason_or_failure_reason": decision["reason_or_failure_reason"],
                          "comparison_family_key": candidate_snapshot["comparison_family_key"],
                          "equivalence_group_key": candidate_snapshot["equivalence_group_key"],
                          "same_product_identity_key": candidate_snapshot["same_product_identity_key"],
                          "exact_identity_available": candidate_snapshot["exact_identity_available"],
                          "store_family_candidate_count": candidate_snapshot["store_family_candidate_count"],
                          "store_family_same_category_candidate_count": candidate_snapshot["store_family_same_category_candidate_count"],
                          "store_family_same_form_factor_candidate_count": candidate_snapshot["store_family_same_form_factor_candidate_count"],
                          "store_family_priced_same_form_factor_candidate_count": candidate_snapshot["store_family_priced_same_form_factor_candidate_count"],
                          "store_same_product_candidate_count": candidate_snapshot["store_same_product_candidate_count"],
                          "store_equivalence_group_candidate_count": candidate_snapshot["store_equivalence_group_candidate_count"],
                          "store_same_category_equivalence_candidate_count": candidate_snapshot["store_same_category_equivalence_candidate_count"],
                          "store_same_form_factor_equivalence_candidate_count": candidate_snapshot["store_same_form_factor_equivalence_candidate_count"],
                          "store_gf_preserved_equivalence_candidate_count": candidate_snapshot["store_gf_preserved_equivalence_candidate_count"],
                          "store_priced_equivalence_candidate_count": candidate_snapshot["store_priced_equivalence_candidate_count"],
                          "diagnostic_root_cause_bucket": candidate_snapshot["diagnostic_root_cause_bucket"],
                          "family_same_category_example_names": candidate_snapshot["family_same_category_example_names"],
                          "family_same_form_factor_example_names": candidate_snapshot["family_same_form_factor_example_names"],
                          "equivalence_group_example_names": candidate_snapshot["equivalence_group_example_names"],
                          "priced_equivalence_example_names": candidate_snapshot["priced_equivalence_example_names"],
                      })
                  layer_counts = Counter(decision["chosen_layer"] for decision in store_line_decisions)
                  exact_or_normalized_line_count = (
                      layer_counts.get("exact_identity", 0)
                      + layer_counts.get("same_product_unit_normalized", 0)
                  )
                  baseline_line_count = (
                      exact_or_normalized_line_count
                      + layer_counts.get("canonical_equivalent", 0)
                  )
                  resolved_line_count = baseline_line_count + layer_counts.get("budget_alternative", 0)
                  full_baseline_coverage = (
                      baseline_line_count == selected_probe_size
                      and layer_counts.get("not_proven", 0) == 0
                      and layer_counts.get("unmatched", 0) == 0
                  )
                  high_confidence_baseline_coverage = (
                      exact_or_normalized_line_count == selected_probe_size
                      and layer_counts.get("canonical_equivalent", 0) == 0
                      and layer_counts.get("not_proven", 0) == 0
                      and layer_counts.get("unmatched", 0) == 0
                  )
                  complete_with_budget_alternatives = (
                      resolved_line_count == selected_probe_size
                      and layer_counts.get("not_proven", 0) == 0
                      and layer_counts.get("unmatched", 0) == 0
                  )
                  near_full_after_user_approved_alternatives = (
                      resolved_line_count >= max(0, selected_probe_size - 1)
                      and layer_counts.get("not_proven", 0) == 0
                  )
                  baseline_basket_total = None
                  baseline_line_prices = [
                      decision["baseline_line_price"]
                      for decision in store_line_decisions
                      if decision["chosen_layer"] in ("exact_identity", "same_product_unit_normalized", "canonical_equivalent")
                  ]
                  if (
                      full_baseline_coverage
                      and len(baseline_line_prices) == selected_probe_size
                      and all(price is not None for price in baseline_line_prices)
                  ):
                      baseline_basket_total = round(sum(baseline_line_prices), 4)
                  optional_lower_cost_total_with_budget_alternatives = None
                  if complete_with_budget_alternatives:
                      basket_line_prices = []
                      for decision in store_line_decisions:
                          price_value = decision["baseline_line_price"] if decision["baseline_line_price"] is not None else decision["budget_line_price"]
                          if price_value is None:
                              basket_line_prices = []
                              break
                          basket_line_prices.append(price_value)
                      if len(basket_line_prices) == selected_probe_size:
                          optional_lower_cost_total_with_budget_alternatives = round(sum(basket_line_prices), 4)
                  failure_reason_counts = Counter(
                      decision["reason_or_failure_reason"]
                      for decision in store_line_decisions
                      if decision["chosen_layer"] in ("not_proven", "unmatched")
                  )
                  if high_confidence_baseline_coverage:
                      basket_summary_reason = "full_high_confidence_baseline_coverage"
                  elif full_baseline_coverage:
                      basket_summary_reason = "full_baseline_coverage_with_canonical_equivalent_lines"
                  elif complete_with_budget_alternatives:
                      basket_summary_reason = "complete_only_with_budget_alternatives"
                  else:
                      basket_summary_reason = ", ".join(
                          f"{reason}:{count}" for reason, count in failure_reason_counts.most_common(3)
                      ) or "incomplete_baseline_coverage"
                  overall_basket_confidence_score = round(
                      sum(line_confidence_score(decision["chosen_layer"]) for decision in store_line_decisions) / selected_probe_size,
                      2,
                  ) if selected_probe_size else None
                  basket_store_shadow_rows.append({
                      "basket_probe_name": basket_probe_name,
                      "store_key": store_key,
                      "retailer": store.get("retailer"),
                      "city": store.get("canonical_city") or store.get("city"),
                      "exact_line_count": layer_counts.get("exact_identity", 0),
                      "normalized_line_count": layer_counts.get("same_product_unit_normalized", 0),
                      "canonical_line_count": layer_counts.get("canonical_equivalent", 0),
                      "budget_alternative_line_count": layer_counts.get("budget_alternative", 0),
                      "unmatched_line_count": layer_counts.get("unmatched", 0),
                      "not_proven_line_count": layer_counts.get("not_proven", 0),
                      "exact_or_normalized_completion_ratio": round(exact_or_normalized_line_count / selected_probe_size, 4) if selected_probe_size else None,
                      "baseline_completion_ratio": round(baseline_line_count / selected_probe_size, 4) if selected_probe_size else None,
                      "resolved_completion_ratio": round(resolved_line_count / selected_probe_size, 4) if selected_probe_size else None,
                      "resolved_missing_line_count": max(0, selected_probe_size - resolved_line_count),
                      "baseline_basket_total": baseline_basket_total,
                      "optional_lower_cost_total_with_budget_alternatives": optional_lower_cost_total_with_budget_alternatives,
                      "overall_basket_confidence_score": overall_basket_confidence_score,
                      "high_confidence_baseline_coverage": high_confidence_baseline_coverage,
                      "full_baseline_coverage": full_baseline_coverage,
                      "complete_with_budget_alternatives": complete_with_budget_alternatives,
                      "near_full_after_user_approved_alternatives": near_full_after_user_approved_alternatives,
                      "reason_passed_or_failed": basket_summary_reason,
                  })

          write_csv(
              OUT_DIR / "basket_line_shadow_matches.csv",
              basket_line_shadow_rows,
              [
                  "basket_probe_name",
                  "source_item_id",
                  "source_item_name",
                  "store_key",
                  "retailer",
                  "city",
                  "matched_item_id",
                  "matched_item_name",
                  "chosen_layer",
                  "confidence_class",
                  "price_evidence_source",
                  "metadata_evidence_source",
                  "gf_evidence_source",
                  "gf_constraint_required",
                  "equivalence_basis",
                  "normalization_basis",
                  "matched_price_value",
                  "baseline_line_price",
                  "budget_line_price",
                  "budget_savings_pct",
                  "reason_or_failure_reason",
              ],
          )
          write_csv(
              OUT_DIR / "basket_store_shadow_summary.csv",
              basket_store_shadow_rows,
              [
                  "basket_probe_name",
                  "store_key",
                  "retailer",
                  "city",
                  "exact_line_count",
                  "normalized_line_count",
                  "canonical_line_count",
                  "budget_alternative_line_count",
                  "unmatched_line_count",
                  "not_proven_line_count",
                  "exact_or_normalized_completion_ratio",
                  "baseline_completion_ratio",
                  "resolved_completion_ratio",
                  "resolved_missing_line_count",
                  "baseline_basket_total",
                  "optional_lower_cost_total_with_budget_alternatives",
                  "overall_basket_confidence_score",
                  "high_confidence_baseline_coverage",
                  "full_baseline_coverage",
                  "complete_with_budget_alternatives",
                  "near_full_after_user_approved_alternatives",
                  "reason_passed_or_failed",
              ],
          )
          write_csv(
              OUT_DIR / "store_side_equivalence_candidate_coverage.csv",
              store_side_equivalence_candidate_rows,
              [
                  "basket_probe_name",
                  "source_item_id",
                  "source_item_name",
                  "store_key",
                  "retailer",
                  "city",
                  "chosen_layer",
                  "reason_or_failure_reason",
                  "comparison_family_key",
                  "equivalence_group_key",
                  "same_product_identity_key",
                  "exact_identity_available",
                  "store_family_candidate_count",
                  "store_family_same_category_candidate_count",
                  "store_family_same_form_factor_candidate_count",
                  "store_family_priced_same_form_factor_candidate_count",
                  "store_same_product_candidate_count",
                  "store_equivalence_group_candidate_count",
                  "store_same_category_equivalence_candidate_count",
                  "store_same_form_factor_equivalence_candidate_count",
                  "store_gf_preserved_equivalence_candidate_count",
                  "store_priced_equivalence_candidate_count",
                  "diagnostic_root_cause_bucket",
                  "family_same_category_example_names",
                  "family_same_form_factor_example_names",
                  "equivalence_group_example_names",
                  "priced_equivalence_example_names",
              ],
          )

          store_side_equivalence_candidate_coverage_summary = {
              "shadow_only": True,
              "publish_gate_impact": "none",
              "basket_probes": {},
          }
          for basket_probe in basket_probe_definitions:
              basket_probe_name = basket_probe["basket_probe_name"]
              probe_candidate_rows = [
                  row for row in store_side_equivalence_candidate_rows
                  if row["basket_probe_name"] == basket_probe_name
                  and row["chosen_layer"] in ("not_proven", "unmatched")
              ]
              bucket_counts = Counter(row["diagnostic_root_cause_bucket"] for row in probe_candidate_rows)
              family_counts = Counter((row["comparison_family_key"] or "unknown") for row in probe_candidate_rows)
              if bucket_counts.get("no_store_candidate_in_comparison_family", 0) >= max(
                  bucket_counts.get("no_store_candidate_in_equivalence_group", 0),
                  bucket_counts.get("same_family_same_category_candidate_outside_equivalence_group", 0),
                  bucket_counts.get("same_family_same_form_factor_candidate_outside_equivalence_group", 0),
                  bucket_counts.get("equivalence_group_without_same_category_candidate", 0),
                  bucket_counts.get("same_category_without_same_form_factor_candidate", 0),
                  bucket_counts.get("same_form_factor_candidate_without_usable_price", 0),
              ):
                  dominant_diagnosis = "likely_genuinely_shallow_store_assortment"
              elif bucket_counts.get("same_family_same_form_factor_candidate_outside_equivalence_group", 0) or bucket_counts.get("same_family_same_category_candidate_outside_equivalence_group", 0):
                  dominant_diagnosis = "likely_equivalence_group_derivation_gap"
              elif bucket_counts.get("no_store_candidate_in_equivalence_group", 0):
                  dominant_diagnosis = "likely_store_side_family_assignment_or_equivalence_grouping_gap"
              elif bucket_counts.get("equivalence_group_without_same_category_candidate", 0) or bucket_counts.get("same_category_without_same_form_factor_candidate", 0):
                  dominant_diagnosis = "likely_category_or_form_factor_alignment_gap"
              elif bucket_counts.get("same_form_factor_candidate_without_usable_price", 0):
                  dominant_diagnosis = "likely_price_eligibility_gap_for_equivalent_candidates"
              else:
                  dominant_diagnosis = "mixed_or_unclear"
              store_side_equivalence_candidate_coverage_summary["basket_probes"][basket_probe_name] = {
                  "unmatched_or_not_proven_line_count": len(probe_candidate_rows),
                  "dominant_diagnostic_root_cause": dominant_diagnosis,
                  "diagnostic_root_cause_buckets": dict(bucket_counts.most_common(10)),
                  "top_unmatched_comparison_families": dict(family_counts.most_common(10)),
                  "rows_with_any_store_family_candidate": sum(1 for row in probe_candidate_rows if row["store_family_candidate_count"] > 0),
                  "rows_with_any_family_same_category_candidate": sum(1 for row in probe_candidate_rows if row["store_family_same_category_candidate_count"] > 0),
                  "rows_with_any_family_same_form_factor_candidate": sum(1 for row in probe_candidate_rows if row["store_family_same_form_factor_candidate_count"] > 0),
                  "rows_with_any_family_priced_same_form_factor_candidate": sum(1 for row in probe_candidate_rows if row["store_family_priced_same_form_factor_candidate_count"] > 0),
                  "rows_with_any_store_same_product_candidate": sum(1 for row in probe_candidate_rows if row["store_same_product_candidate_count"] > 0),
                  "rows_with_any_store_equivalence_group_candidate": sum(1 for row in probe_candidate_rows if row["store_equivalence_group_candidate_count"] > 0),
                  "rows_with_any_same_category_equivalence_candidate": sum(1 for row in probe_candidate_rows if row["store_same_category_equivalence_candidate_count"] > 0),
                  "rows_with_any_same_form_factor_equivalence_candidate": sum(1 for row in probe_candidate_rows if row["store_same_form_factor_equivalence_candidate_count"] > 0),
                  "rows_with_any_priced_equivalence_candidate": sum(1 for row in probe_candidate_rows if row["store_priced_equivalence_candidate_count"] > 0),
              }
          write_json(
              OUT_DIR / "store_side_equivalence_candidate_coverage_summary.json",
              store_side_equivalence_candidate_coverage_summary,
          )

          basket_completion_readiness_summary = {
              "shadow_only": True,
              "publish_gate_impact": "none",
              "budget_alternatives_require_user_approval": True,
              "near_full_missing_line_threshold": 1,
              "basket_probes": {},
          }
          for basket_probe in basket_probe_definitions:
              basket_probe_name = basket_probe["basket_probe_name"]
              selected_probe_size = basket_probe["selected_probe_size"]
              probe_store_rows = [
                  row for row in basket_store_shadow_rows
                  if row["basket_probe_name"] == basket_probe_name
              ]
              city_breakdown = {}
              for city_name in sorted({clean_text(row.get("city")) or "unknown" for row in probe_store_rows}):
                  city_rows = [row for row in probe_store_rows if (clean_text(row.get("city")) or "unknown") == city_name]
                  city_breakdown[city_name] = {
                      "store_count": len(city_rows),
                      "stores_supporting_high_confidence_baseline_coverage": sum(1 for row in city_rows if row["high_confidence_baseline_coverage"]),
                      "stores_supporting_full_basket_including_canonical": sum(1 for row in city_rows if row["full_baseline_coverage"]),
                      "stores_supporting_full_basket_after_user_approved_alternatives": sum(1 for row in city_rows if row["complete_with_budget_alternatives"]),
