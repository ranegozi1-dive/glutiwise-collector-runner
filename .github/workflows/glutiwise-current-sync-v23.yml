          promo_store_key_set = set(successful_promo_store_keys)
          coverage_store_key_set = {row["store_key"] for row in price_store_coverage_rows if row.get("valid_price_rows", 0) > 0}
          store_set_consistency = {
              "target_store_count": len(target_store_key_set),
              "target_city_count": len(discovered_target_city_set),
              "target_city_coverage": sorted(discovered_target_city_set),
              "target_missing_cities": missing_target_cities,
              "price_store_count": len(price_store_key_set),
              "promo_store_count": len(promo_store_key_set),
              "coverage_store_count": len(coverage_store_key_set),
              "target_missing_in_prices": sorted(target_store_key_set - price_store_key_set),
              "target_missing_in_promotions": sorted(target_store_key_set - promo_store_key_set),
              "target_missing_in_coverage": sorted(target_store_key_set - coverage_store_key_set),
              "price_not_in_target": sorted(price_store_key_set - target_store_key_set),
              "promo_not_in_target": sorted(promo_store_key_set - target_store_key_set),
              "coverage_not_in_target": sorted(coverage_store_key_set - target_store_key_set),
          }
          store_set_consistency_ok = all(not store_set_consistency[key] for key in [
              "target_missing_cities",
              "target_missing_in_prices",
              "target_missing_in_promotions",
              "target_missing_in_coverage",
              "price_not_in_target",
              "promo_not_in_target",
