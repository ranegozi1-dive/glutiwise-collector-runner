                          item[0],
                      )
                  )[:10]
              ],
              "family_coverage": family_coverage_summary,
          }
          write_json(
              OUT_DIR / "store_comparison_family_coverage_summary.json",
              store_family_coverage_summary,
          )

          store_family_gap_diagnostic_rows = []
          store_family_gap_diagnostic_summary = {
              "shadow_only": True,
              "publish_gate_impact": "none",
              "families": {},
          }
          for family_rule in comparison_family_registry:
              family_key = family_rule["comparison_family_key"]
              family_gap_reason_counts = Counter()
              family_gap_store_rows = []
              for store in sorted(discovered_target_stores, key=lambda row: row["store_key"]):
                  store_key = store["store_key"]
                  if shadow_store_rows_by_family.get(store_key, {}).get(family_key):
                      continue
                  reason_counts = Counter()
                  category_match_candidate_count = 0
                  example_names_by_reason = defaultdict(list)
                  for candidate_row in shadow_store_price_rows_by_store.get(store_key, []):
                      candidate_meta = product_probe_metadata_by_barcode.get(candidate_row.get("barcode"), {})
                      reason_key, reason_detail = diagnose_family_gap_candidate(candidate_meta, family_rule)
                      if reason_key == "category_not_allowed":
                          continue
                      category_match_candidate_count += 1
                      reason_counts[reason_key] += 1
                      candidate_name = clean_text(candidate_meta.get("name"))
                      if candidate_name and len(example_names_by_reason[reason_key]) < 3:
                          example_names_by_reason[reason_key].append(
                              candidate_name if not reason_detail else f"{candidate_name} [{reason_detail}]"
                          )
                  if category_match_candidate_count == 0:
                      reason_counts["no_allowed_category_rows_in_store"] = 1
                  dominant_gap_reason = reason_counts.most_common(1)[0][0] if reason_counts else "no_allowed_category_rows_in_store"
                  family_gap_reason_counts[dominant_gap_reason] += 1
                  row = {
                      "store_key": store_key,
                      "retailer": store.get("retailer"),
                      "city": store.get("city"),
                      "comparison_family_key": family_key,
                      "category_match_candidate_count": category_match_candidate_count,
                      "dominant_gap_reason": dominant_gap_reason,
                      "gap_reason_counts": " | ".join(f"{reason}:{count}" for reason, count in reason_counts.most_common(5)),
                      "example_candidates": " | ".join(
                          example
                          for examples in example_names_by_reason.values()
                          for example in examples[:2]
                      ),
                  }
                  store_family_gap_diagnostic_rows.append(row)
                  family_gap_store_rows.append(row)
              if family_gap_store_rows:
                  store_family_gap_diagnostic_summary["families"][family_key] = {
                      "stores_missing_family_candidate": len(family_gap_store_rows),
                      "dominant_gap_reasons": dict(family_gap_reason_counts.most_common(8)),
                      "top_store_examples": family_gap_store_rows[:10],
