                      ) or root_updated or filename_timestamp(path)
                      item_name = extract_any(node, {"ItemName", "ItemNm", "ProductName", "Description", "ItemDescription"})
                      brand = extract_any(node, {"BrandName", "Brand", "BrandNm", "BrandDescription", "BrandDesc", "TradeMark", "Trademark", "BrandHebrewName", "BrandEngName", "ItemBrand", "BrandLabel", "BrandLongName", "BrandShortName", "BrandTitle"})
                      manufacturer = extract_any(node, {"ManufacturerName", "ManufactureName", "Manufacturer", "Manufacture", "ManufactorerName", "Manufactorer", "ManufacturerDesc", "ManufactureDesc", "SupplierName", "Supplier", "SupplierNm", "SupplierHebName", "SupplierEngName", "ProducerName", "VendorName", "VendorNm", "CompanyName", "ImporterName", "Importer", "ManufacturerHebName", "ManufacturerEngName"})
                      category = extract_any(node, {"MainCategoryName", "Category", "DepartmentName", "SubCategoryName", "ItemCategory", "MainCategory", "SubCategory", "CategoryName", "Department", "SubDepartmentName", "DepartmentNm", "SubDepartment", "FamilyName", "FamilyNm", "GroupName", "SubGroupName", "ItemType", "ItemTypeName", "CategoryNm", "SectionName", "PrimaryCategoryName"})
                      item_name = sanitize_optional_text(item_name)
                      brand = sanitize_optional_text(brand)
                      manufacturer = sanitize_optional_text(manufacturer)
                      category = sanitize_optional_text(category)
                      if not brand:
                          brand = fallback_brand_from_name_or_manufacturer(item_name, manufacturer)
                      price_key = f"{barcode}:{store_key}"
                      existing = items_by_key.get(price_key)
                      if existing is None or (updated_at, len(clean_text(item_name))) > (existing["updated_at"], len(clean_text(existing.get("_name_candidate", "")))):
                          items_by_key[price_key] = {
                              "price_key": price_key,
                              "barcode": barcode,
                              "store_key": store_key,
                              "price": price,
                              "regular_price": price,
                              "effective_price": price,
                              "has_promotion": False,
                              "has_club_promotion": False,
                              "applied_promotion_key": None,
                              "applied_promotion_title": None,
                              "applied_promotion_type": None,
                              "promotion_benefit_text": None,
                              "promotion_start_at": None,
                              "promotion_end_at": None,
                              "updated_at": updated_at,
                              "last_seen_at": RUN_TS_ISO,
                              "_name_candidate": item_name,
                          }
                      coverage["valid_price_rows"] += 1
                      coverage["unique_barcodes"].add(barcode)
                      if clean_text(item_name) and not text_is_placeholder(item_name):
                          coverage["name_present"] += 1
                      if clean_text(brand) and not text_is_placeholder(brand):
                          coverage["brand_present"] += 1
                      if clean_text(manufacturer) and not text_is_placeholder(manufacturer):
                          coverage["manufacturer_present"] += 1
                      if clean_text(category) and not text_is_placeholder(category):
                          coverage["category_present"] += 1
                      product_candidates[barcode]["name"].append(item_name)
                      product_candidates[barcode]["brand"].append(brand)
                      product_candidates[barcode]["manufacturer"].append(manufacturer)
                      product_candidates[barcode]["category"].append(category)
              items = list(items_by_key.values())
              for item in items:
                  item.pop("_name_candidate", None)
              coverage["unique_barcodes"] = len(coverage["unique_barcodes"])
              return items, product_candidates, coverage, parse_errors
          
