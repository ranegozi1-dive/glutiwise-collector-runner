                          "start_at": start_at,
                          "end_at": end_at,
                          "updated_at": RUN_TS_ISO,
                          "last_seen_at": RUN_TS_ISO,
                      }
                      if WRITE_PROMOTION_RAW:
                          promotion_header_row["raw_payload"] = tag_values
                      promo_headers[promotion_key] = promotion_header_row
                      for barcode in sorted(set(barcodes)):
                          promotion_item_key = sha1_text(f"{promotion_key}|{barcode}")
                          promo_items[promotion_item_key] = {
                              "promotion_item_key": promotion_item_key,
                              "promotion_key": promotion_key,
                              "barcode": barcode,
                              "updated_at": RUN_TS_ISO,
                              "last_seen_at": RUN_TS_ISO,
                          }
              return list(promo_headers.values()), list(promo_items.values()), parse_errors
          
          discovered_stores_map, ambiguous_rows, store_parse_errors, store_file_rows = discover_stores()
          
          existing_target_chain_rows = fetch_existing_target_chain_stores()
          existing_target_chain_by_key = {row["store_key"]: row for row in existing_target_chain_rows}
          legacy_store_key_aliases = {}
          unresolved_existing_target_rows = []
          auto_deactivated_existing_target_rows = []
          registry_fallback_target_rows = []
          initial_missing_target_retailers = []
          initial_missing_target_cities = []
          
          for row in existing_target_chain_rows:
              raw_key = clean_text(row.get("store_key", ""))
              row_retailer = clean_text(row.get("retailer", ""))
              if not raw_key or row_retailer not in TARGET_RETAILERS:
                  continue
              raw_key_retailer, raw_key_store_id = split_store_key(raw_key)
              row_store_id = row.get("store_id", "") or raw_key_store_id
              canonical_key = canonical_store_key(row_retailer, row_store_id)
              if raw_key_retailer == row_retailer and raw_key != canonical_key and canonical_key in discovered_stores_map:
                  legacy_store_key_aliases[raw_key] = canonical_key
              if row.get("mvp_active") and canonical_key not in discovered_stores_map:
                  unresolved_existing_target_rows.append({
                      "store_key": raw_key,
                      "retailer": row.get("retailer", ""),
                      "store_id": row.get("store_id", ""),
                      "store_name": row.get("store_name", ""),
                      "city": row.get("city", ""),
                      "address": row.get("address", ""),
                      "target_city_hint": "",
                      "reason": "existing_mvp_active_store_not_found_in_latest_store_files",
                  })
          
          def select_existing_store_for_discovered(discovered_key: str):
              exact = existing_target_chain_by_key.get(discovered_key)
              if exact:
                  return exact
              for alias_key in equivalent_store_keys(discovered_key):
                  candidate = existing_target_chain_by_key.get(alias_key)
                  if candidate:
                      if alias_key != discovered_key:
                          legacy_store_key_aliases.setdefault(alias_key, discovered_key)
                      return candidate
              return None
          
          target_validation_failures = []
          for row in discovered_stores_map.values():
              detected_city, detected_reasons, is_valid_target = validate_target_assignment(row)
              row["validation_detected_city"] = detected_city or ""
              row["validation_reasons"] = " | ".join(detected_reasons)
              if row.get("is_target") and not is_valid_target:
                  target_validation_failures.append({
                      "store_key": row.get("store_key", ""),
                      "retailer": row.get("retailer", ""),
                      "store_name": row.get("store_name", ""),
                      "city": row.get("city", ""),
                      "canonical_city": row.get("canonical_city", ""),
                      "address": row.get("address", ""),
                      "validation_detected_city": detected_city or "",
                      "validation_reasons": " | ".join(detected_reasons),
                      "reason": "target_city_not_supported_by_source_fields",
                  })
                  row["is_target"] = False
                  row["target_city"] = ""
                  row["canonical_city"] = clean_text(row.get("city", "")) or clean_text(row.get("store_name", ""))
          
          discovered_store_keys = set(discovered_stores_map.keys())
          def prune_dump_files(keep_paths):
              keep_resolved = set()
              for item in keep_paths:
                  if not item:
                      continue
                  try:
                      keep_resolved.add(str(Path(item).resolve()))
                  except Exception:
                      continue
              removed_files = 0
              removed_bytes = 0
              for path in DUMPS_DIR.rglob('*'):
                  if not path.is_file():
                      continue
                  resolved = str(path.resolve())
                  if resolved in keep_resolved:
                      continue
                  try:
                      removed_bytes += path.stat().st_size
                  except Exception:
                      pass
                  try:
                      path.unlink()
                      removed_files += 1
                  except Exception:
                      continue
              write_json(OUT_DIR / 'dump_prune_summary.json', {
                  'kept_files': len(keep_resolved),
                  'removed_files': removed_files,
                  'removed_bytes': removed_bytes,
              })

          def summarize_target_scope(rows):
              by_retailer = Counter(row["retailer"] for row in rows)
              discovered_target_city_set = {
                  row["canonical_city"]
                  for row in rows
                  if row.get("canonical_city") in TARGET_CITIES
              }
              missing_retailers = [ret for ret in TARGET_RETAILERS if by_retailer.get(ret, 0) == 0]
              missing_target_cities = sorted(set(TARGET_CITIES) - discovered_target_city_set)
              return by_retailer, missing_retailers, missing_target_cities

          def build_registry_fallback_row(existing_row: dict):
              retailer = clean_text(existing_row.get("retailer", ""))
              store_id_raw = existing_row.get("store_id", "")
              store_key = canonical_store_key(retailer, store_id_raw)
              detected_city, detected_reasons = detect_city(
                  ("city", existing_row.get("city", "")),
                  ("address", existing_row.get("address", "")),
                  ("store_name", existing_row.get("store_name", "")),
              )
              canonical_city = clean_text(existing_row.get("city", ""))
              if canonical_city not in TARGET_CITIES:
                  canonical_city = detected_city or canonical_city
              if retailer not in TARGET_RETAILERS or canonical_city not in TARGET_CITIES:
                  return None
              validation_reasons = ["fallback_registry:existing_target_chain"]
              validation_reasons.extend(detected_reasons)
              return {
                  "retailer": retailer,
                  "store_id": canonical_store_id(retailer, store_id_raw),
                  "store_name": sanitize_optional_text(existing_row.get("store_name", "")) or store_key,
                  "city": clean_text(existing_row.get("city", "")),
                  "canonical_city": canonical_city,
                  "store_key": store_key,
                  "address": sanitize_optional_text(existing_row.get("address", "")) or "",
                  "area": sanitize_optional_text(existing_row.get("area", "")) or "",
                  "store_type": sanitize_optional_text(existing_row.get("store_type", "")) or "chain",
                  "is_target": True,
                  "target_city": canonical_city,
                  "source_file": "",
                  "source_ts": "",
                  "discovery_source": "existing_target_chain_registry_fallback",
                  "validation_detected_city": detected_city or canonical_city,
                  "validation_reasons": " | ".join(reason for reason in validation_reasons if reason),
              }

          discovered_target_stores = [row for row in discovered_stores_map.values() if row.get("is_target")]
          initial_by_retailer, initial_missing_target_retailers, initial_missing_target_cities = summarize_target_scope(discovered_target_stores)
          if initial_missing_target_retailers or initial_missing_target_cities:
              for existing_row in sorted(
                  existing_target_chain_rows,
                  key=lambda row: (
                      clean_text(row.get("city", "")),
                      clean_text(row.get("retailer", "")),
                      canonical_store_key(clean_text(row.get("retailer", "")), row.get("store_id", "")),
                  ),
              ):
                  if not existing_row.get("mvp_active"):
                      continue
                  fallback_row = build_registry_fallback_row(existing_row)
                  if not fallback_row:
                      continue
                  if (
                      fallback_row["retailer"] not in initial_missing_target_retailers
                      and fallback_row["canonical_city"] not in initial_missing_target_cities
                  ):
                      continue
                  if fallback_row["store_key"] in discovered_stores_map:
                      continue
                  discovered_stores_map[fallback_row["store_key"]] = fallback_row
                  registry_fallback_target_rows.append(fallback_row)
          discovered_non_target_stores = [row for row in discovered_stores_map.values() if not row.get("is_target")]
          discovered_target_stores = [row for row in discovered_stores_map.values() if row.get("is_target")]
          discovered_target_city_set = {
              row["canonical_city"]
              for row in discovered_target_stores
              if row.get("canonical_city") in TARGET_CITIES
          }
          target_store_keys = {row["store_key"] for row in discovered_target_stores}
          non_target_store_keys = {row["store_key"] for row in discovered_non_target_stores}
          legacy_store_keys_to_deactivate = set(legacy_store_key_aliases.keys())

          write_csv(
              OUT_DIR / "stores_discovered.csv",
              sorted(discovered_stores_map.values(), key=lambda x: (x["retailer"], x["canonical_city"], x["store_key"])),
              ["retailer", "store_id", "store_key", "store_name", "city", "canonical_city", "address", "area", "store_type", "is_target", "discovery_source", "source_file", "source_ts"],
          )
          write_csv(
              OUT_DIR / "target_stores.csv",
              sorted(discovered_target_stores, key=lambda x: (x["canonical_city"], x["retailer"], x["store_key"])),
              ["retailer", "store_id", "store_key", "store_name", "canonical_city", "address", "discovery_source", "source_file"],
          )
          write_csv(
              OUT_DIR / "non_target_stores.csv",
              sorted(discovered_non_target_stores, key=lambda x: (x["retailer"], x["canonical_city"], x["store_key"])),
              ["retailer", "store_id", "store_key", "store_name", "canonical_city", "address", "discovery_source", "source_file"],
          )
          write_csv(
              OUT_DIR / "ambiguous_city_matches.csv",
              ambiguous_rows,
              ["retailer", "store_key", "store_name", "city", "address", "reason"],
          )
          write_csv(
              OUT_DIR / "legacy_store_key_aliases.csv",
              [
                  {
                      "legacy_store_key": old_key,
                      "canonical_store_key": new_key,
                  }
                  for old_key, new_key in sorted(legacy_store_key_aliases.items())
              ],
              ["legacy_store_key", "canonical_store_key"],
          )
          write_csv(
              OUT_DIR / "unresolved_existing_target_rows.csv",
              unresolved_existing_target_rows,
              ["store_key", "retailer", "store_id", "store_name", "city", "address", "target_city_hint", "reason"],
          )
          write_csv(
              OUT_DIR / "target_store_registry_fallback.csv",
              sorted(registry_fallback_target_rows, key=lambda x: (x["canonical_city"], x["retailer"], x["store_key"])),
              ["retailer", "store_id", "store_key", "store_name", "canonical_city", "address", "discovery_source", "validation_detected_city", "validation_reasons"],
          )
          write_csv(
              OUT_DIR / "target_validation_failures.csv",
              target_validation_failures,
              ["store_key", "retailer", "store_name", "city", "canonical_city", "address", "validation_detected_city", "validation_reasons", "reason"],
          )
          by_retailer, missing_retailers, missing_target_cities = summarize_target_scope(discovered_target_stores)
          store_discovery_summary = {
              "stores_discovered": len(discovered_stores_map),
              "target_stores_discovered": len(discovered_target_stores),
              "non_target_stores_discovered": len(discovered_non_target_stores),
              "target_store_counts_by_retailer": dict(by_retailer),
              "target_store_counts_by_city": dict(Counter(row["canonical_city"] for row in discovered_target_stores)),
              "target_validation_failures": len(target_validation_failures),
              "fallback_target_stores_added": len(registry_fallback_target_rows),
              "fallback_target_store_counts_by_retailer": dict(Counter(row["retailer"] for row in registry_fallback_target_rows)),
              "fallback_target_store_counts_by_city": dict(Counter(row["canonical_city"] for row in registry_fallback_target_rows)),
              "initial_missing_target_retailers": initial_missing_target_retailers,
              "initial_missing_target_cities": initial_missing_target_cities,
              "download_stage_summary": download_stage_summary,
          }
          write_json(OUT_DIR / "store_discovery_summary.json", store_discovery_summary)
          if initial_missing_target_retailers or initial_missing_target_cities or registry_fallback_target_rows:
              write_json(OUT_DIR / "source_gap_summary.json", {
                  **store_discovery_summary,
                  "failure_stage": "store_discovery",
                  "failure_reason": "missing_required_target_scope_from_store_files",
                  "missing_target_retailers": missing_retailers,
                  "missing_target_cities": missing_target_cities,
                  "store_scope_restored_by_registry_fallback": not missing_retailers and not missing_target_cities,
                  "fallback_store_keys": [row["store_key"] for row in registry_fallback_target_rows],
              })

          if not discovered_target_stores:
              write_json(OUT_DIR / "source_gap_summary.json", {
                  **store_discovery_summary,
                  "failure_stage": "store_discovery",
                  "failure_reason": "no_target_stores_discovered_after_source_only_validation",
                  "missing_target_retailers": list(TARGET_RETAILERS),
                  "missing_target_cities": list(TARGET_CITIES),
                  "store_scope_restored_by_registry_fallback": False,
              })
              write_json(OUT_DIR / "run_summary.json", {
                  "status": "failed_before_payload",
                  "failure_stage": "store_discovery",
                  "failure_reason": "no_target_stores_discovered_after_source_only_validation",
                  "target_store_count": 0,
              })
              raise SystemExit("No target stores were discovered from STORE files after source-only target validation. Aborting.")
          if len(discovered_target_stores) > LOCKED_MVP_STORE_LIMIT:
              raise SystemExit(
                  f"Discovered {len(discovered_target_stores)} target stores, which exceeds the locked MVP limit "
                  f"of {LOCKED_MVP_STORE_LIMIT}. Aborting to avoid unintended scope expansion."
              )

          if missing_retailers or missing_target_cities:
              write_json(OUT_DIR / "source_gap_summary.json", {
                  **store_discovery_summary,
                  "failure_stage": "store_discovery",
                  "failure_reason": "missing_required_target_scope_from_store_files",
                  "missing_target_retailers": missing_retailers,
                  "missing_target_cities": missing_target_cities,
                  "store_scope_restored_by_registry_fallback": False,
                  "fallback_store_keys": [row["store_key"] for row in registry_fallback_target_rows],
              })
              write_json(OUT_DIR / "run_summary.json", {
                  "status": "failed_before_payload",
                  "failure_stage": "store_discovery",
                  "failure_reason": "missing_required_target_scope_from_store_files",
                  "target_store_count": len(discovered_target_stores),
                  "missing_target_retailers": missing_retailers,
                  "missing_target_cities": missing_target_cities,
              })
          if missing_retailers:
              raise SystemExit(f"No target stores discovered for retailers: {', '.join(missing_retailers)}")
          if missing_target_cities:
              raise SystemExit(f"No target stores discovered for target cities: {', '.join(missing_target_cities)}")
          
          price_file_map, price_file_diagnostics = select_latest_files("price_full", target_store_keys=target_store_keys)
          missing_price_store_keys = sorted(target_store_keys - set(price_file_map.keys()))
          write_csv(
              OUT_DIR / "missing_price_files.csv",
              [
                  {
                      "store_key": key,
                      "retailer": discovered_stores_map[key]["retailer"],
                      "store_name": discovered_stores_map[key]["store_name"],
                      "city": discovered_stores_map[key]["canonical_city"],
                  }
                  for key in missing_price_store_keys
              ],
              ["store_key", "retailer", "store_name", "city"],
          )
          
          promo_full_map, promo_full_diag = select_latest_files("promo_full", target_store_keys=target_store_keys)
          promo_partial_map, promo_partial_diag = select_latest_files("promo", target_store_keys=target_store_keys)
          promo_file_map = {}
          for store_key in target_store_keys:
              if store_key in promo_full_map:
                  promo_file_map[store_key] = promo_full_map[store_key]
              elif store_key in promo_partial_map:
                  promo_file_map[store_key] = promo_partial_map[store_key]
          missing_promo_store_keys = sorted(target_store_keys - set(promo_file_map.keys()))

          keep_dump_paths = [row.get("source_file") for row in discovered_stores_map.values()]
          keep_dump_paths.extend(selection["path"] for selection in price_file_map.values())
          keep_dump_paths.extend(selection["path"] for selection in promo_file_map.values())
          prune_dump_files(keep_dump_paths)

          source_freshness_rows = []
          stale_price_source_store_keys = []
          stale_promo_source_store_keys = []
          for store_key in sorted(target_store_keys):
              price_selection = price_file_map.get(store_key)
              promo_selection = promo_file_map.get(store_key)
              price_source_age_hours = iso_age_hours(price_selection["timestamp"]) if price_selection else None
              promo_source_age_hours = iso_age_hours(promo_selection["timestamp"]) if promo_selection else None
              price_source_is_stale = bool(price_selection) and price_source_age_hours is not None and price_source_age_hours > SOURCE_MAX_AGE_HOURS
              promo_source_is_stale = bool(promo_selection) and promo_source_age_hours is not None and promo_source_age_hours > SOURCE_MAX_AGE_HOURS
              if price_source_is_stale:
                  stale_price_source_store_keys.append(store_key)
              if promo_source_is_stale:
                  stale_promo_source_store_keys.append(store_key)
              freshness_status = "fresh"
              if price_source_is_stale and promo_source_is_stale:
                  freshness_status = "stale_price_and_promo"
              elif price_source_is_stale:
                  freshness_status = "stale_price"
              elif promo_source_is_stale:
                  freshness_status = "stale_promo"
              source_freshness_rows.append({
                  "store_key": store_key,
                  "retailer": discovered_stores_map[store_key]["retailer"],
                  "store_name": discovered_stores_map[store_key]["store_name"],
                  "city": discovered_stores_map[store_key]["canonical_city"],
                  "price_source_ts": price_selection["timestamp"] if price_selection else "",
                  "price_source_age_hours": price_source_age_hours,
                  "price_source_is_stale": price_source_is_stale,
                  "promo_source_ts": promo_selection["timestamp"] if promo_selection else "",
                  "promo_source_age_hours": promo_source_age_hours,
                  "promo_source_is_stale": promo_source_is_stale,
                  "freshness_status": freshness_status,
              })
          write_csv(
              OUT_DIR / "source_freshness_by_store.csv",
              source_freshness_rows,
              ["store_key", "retailer", "store_name", "city", "price_source_ts", "price_source_age_hours", "price_source_is_stale", "promo_source_ts", "promo_source_age_hours", "promo_source_is_stale", "freshness_status"],
          )
          write_json(OUT_DIR / "source_freshness_summary.json", {
              "source_max_age_hours": SOURCE_MAX_AGE_HOURS,
              "stale_price_source_store_keys": sorted(stale_price_source_store_keys),
              "stale_promo_source_store_keys": sorted(stale_promo_source_store_keys),
              "fresh_store_count": sum(1 for row in source_freshness_rows if row["freshness_status"] == "fresh"),
              "stale_store_count": sum(1 for row in source_freshness_rows if row["freshness_status"] != "fresh"),
          })
          
          stores_payload = [
              merge_store_row(discovered_stores_map[key], select_existing_store_for_discovered(key))
              for key in sorted(target_store_keys)
          ]
          for legacy_key in sorted(legacy_store_keys_to_deactivate):
              existing_row = existing_target_chain_by_key.get(legacy_key)
              if not existing_row:
                  continue
              stores_payload.append({
                  "retailer": existing_row.get("retailer"),
                  "store_id": existing_row.get("store_id"),
                  "store_name": existing_row.get("store_name"),
                  "city": existing_row.get("city"),
                  "store_key": existing_row.get("store_key"),
                  "address": existing_row.get("address"),
                  "area": existing_row.get("area"),
                  "store_type": existing_row.get("store_type") or "chain",
                  "mvp_active": False,
              })
          
          prices_payload = []
          successful_price_store_keys = []
          failed_price_store_rows = []
          products_candidates = defaultdict(lambda: defaultdict(list))
          prices_summary_rows = []
          price_store_coverage_rows = []
          price_parse_errors = list(price_file_diagnostics)
          
          for store_key in sorted(target_store_keys):
              selection = price_file_map.get(store_key)
              if not selection:
                  continue
              items, product_candidates, coverage, parse_errors = parse_price_file(selection["path"], store_key)
              price_parse_errors.extend(parse_errors)
              if parse_errors or items is None or not items:
                  price_store_coverage_rows.append({
                      "store_key": store_key,
                      "retailer": discovered_stores_map[store_key]["retailer"],
                      "store_name": discovered_stores_map[store_key]["store_name"],
                      "city": discovered_stores_map[store_key]["canonical_city"],
                      "valid_price_rows": coverage.get("valid_price_rows", 0),
                      "unique_barcodes": coverage.get("unique_barcodes", 0),
                      "name_present": coverage.get("name_present", 0),
                      "brand_present": coverage.get("brand_present", 0),
                      "manufacturer_present": coverage.get("manufacturer_present", 0),
                      "category_present": coverage.get("category_present", 0),
                      "pct_name": 0,
                      "pct_brand": 0,
                      "pct_manufacturer": 0,
                      "pct_category": 0,
                      "source_file": str(selection["path"]),
                      "source_ts": selection["timestamp"],
                  })
                  failed_price_store_rows.append({
                      "store_key": store_key,
                      "retailer": discovered_stores_map[store_key]["retailer"],
                      "store_name": discovered_stores_map[store_key]["store_name"],
                      "city": discovered_stores_map[store_key]["canonical_city"],
                      "source_file": str(selection["path"]),
                      "source_ts": selection["timestamp"],
                      "error": "; ".join(err.get("error", "parse failure") for err in (parse_errors or [{"error": "zero valid items"}])),
                  })
                  continue
              prices_payload.extend(items)
              successful_price_store_keys.append(store_key)
              for barcode, fields in product_candidates.items():
                  for field_name, values in fields.items():
                      products_candidates[barcode][field_name].extend(values)
              def pct(n, d):
                  return round((100.0 * n / d), 2) if d else 0.0
              price_store_coverage_rows.append({
                  "store_key": store_key,
                  "retailer": discovered_stores_map[store_key]["retailer"],
                  "store_name": discovered_stores_map[store_key]["store_name"],
                  "city": discovered_stores_map[store_key]["canonical_city"],
                  "valid_price_rows": coverage.get("valid_price_rows", 0),
                  "unique_barcodes": coverage.get("unique_barcodes", 0),
                  "name_present": coverage.get("name_present", 0),
                  "brand_present": coverage.get("brand_present", 0),
                  "manufacturer_present": coverage.get("manufacturer_present", 0),
                  "category_present": coverage.get("category_present", 0),
                  "pct_name": pct(coverage.get("name_present", 0), coverage.get("valid_price_rows", 0)),
                  "pct_brand": pct(coverage.get("brand_present", 0), coverage.get("valid_price_rows", 0)),
                  "pct_manufacturer": pct(coverage.get("manufacturer_present", 0), coverage.get("valid_price_rows", 0)),
                  "pct_category": pct(coverage.get("category_present", 0), coverage.get("valid_price_rows", 0)),
                  "source_file": str(selection["path"]),
                  "source_ts": selection["timestamp"],
              })
              prices_summary_rows.append({
                  "store_key": store_key,
                  "retailer": discovered_stores_map[store_key]["retailer"],
                  "store_name": discovered_stores_map[store_key]["store_name"],
                  "city": discovered_stores_map[store_key]["canonical_city"],
                  "items_count": len(items),
                  "source_file": str(selection["path"]),
                  "source_ts": selection["timestamp"],
              })
          
          write_csv(
              OUT_DIR / "failed_price_files.csv",
              failed_price_store_rows,
              ["store_key", "retailer", "store_name", "city", "source_file", "source_ts", "error"],
          )
          
          if not successful_price_store_keys:
              raise SystemExit("No target stores produced valid price payloads. Aborting before DB write.")
          
          price_success_by_retailer = Counter(discovered_stores_map[key]["retailer"] for key in successful_price_store_keys)
          missing_price_retailers = [ret for ret in TARGET_RETAILERS if price_success_by_retailer.get(ret, 0) == 0]
          if missing_price_retailers:
              price_source_gap_summary = {
                  "failure_stage": "price_payload",
                  "failure_reason": "missing_target_price_payloads_by_retailer",
                  "missing_price_retailers": missing_price_retailers,
                  "missing_price_store_keys": [
                      key
                      for key in missing_price_store_keys
                      if discovered_stores_map[key]["retailer"] in missing_price_retailers
                  ],
                  "successful_price_store_counts_by_retailer": dict(price_success_by_retailer),
                  "failed_price_store_counts_by_retailer": dict(
                      Counter(row["retailer"] for row in failed_price_store_rows)
                  ),
              }
              write_json(OUT_DIR / "price_source_gap_summary.json", price_source_gap_summary)
              prior_source_gap_summary = {}
              source_gap_summary_path = OUT_DIR / "source_gap_summary.json"
              if source_gap_summary_path.exists():
                  try:
                      prior_source_gap_summary = json.loads(source_gap_summary_path.read_text(encoding="utf-8"))
                  except Exception:
                      prior_source_gap_summary = {}
              write_json(
                  source_gap_summary_path,
                  {
                      **prior_source_gap_summary,
                      **price_source_gap_summary,
                      "store_scope_restored_by_registry_fallback": bool(registry_fallback_target_rows) and not missing_retailers and not missing_target_cities,
                      "fallback_store_keys": [row["store_key"] for row in registry_fallback_target_rows],
                  },
              )
              if WRITE_TO_SUPABASE:
                  raise SystemExit("No valid price payloads were produced for retailers: " + ", ".join(missing_price_retailers))
              log(
                  "WRITE_TO_SUPABASE=false -> continuing with partial retailer price coverage for diagnostics only. "
                  + "Missing valid price payload retailers: "
                  + ", ".join(missing_price_retailers)
              )
          
          all_barcodes = sorted(products_candidates.keys())
          existing_products, existing_product_fields = fetch_existing_products(all_barcodes)
          products_payload = []
          for barcode in all_barcodes:
              existing = existing_products.get(barcode, {})
              fields = products_candidates[barcode]
              name_value = best_from_candidates(existing.get("name", ""), fields.get("name", []))
              manufacturer_value = best_from_candidates(existing.get("manufacturer", ""), fields.get("manufacturer", []))
              brand_value = best_from_candidates(existing.get("brand", ""), fields.get("brand", []))
              category_value = best_from_candidates(existing.get("category", ""), fields.get("category", []))
              if not brand_value:
                  brand_value = fallback_brand_from_name_or_manufacturer(name_value or "", manufacturer_value or "") or None
              products_payload.append(compact_row(scrub_product_row({
                  "barcode": barcode,
                  "name": name_value,
                  "category": category_value,
                  "brand": brand_value,
                  "manufacturer": manufacturer_value,
              }), required_keys={"barcode"}))
          
          promotions_payload = []
          promotion_items_payload = []
          successful_promo_store_keys = []
          failed_promo_store_rows = []
          processed_promotion_keys = set()
          promotions_summary_rows = []
          promo_parse_errors = price_parse_errors[:0] + list(promo_full_diag) + list(promo_partial_diag)
          
          for store_key in sorted(target_store_keys):
              selection = promo_file_map.get(store_key)
              if not selection:
                  continue
              promo_headers, promo_items, parse_errors = parse_promo_file(selection["path"], store_key)
              promo_parse_errors.extend(parse_errors)
              if parse_errors or promo_headers is None:
                  failed_promo_store_rows.append({
                      "store_key": store_key,
                      "retailer": discovered_stores_map[store_key]["retailer"],
                      "store_name": discovered_stores_map[store_key]["store_name"],
                      "city": discovered_stores_map[store_key]["canonical_city"],
                      "source_file": str(selection["path"]),
                      "source_ts": selection["timestamp"],
                      "error": "; ".join(err.get("error", "parse failure") for err in (parse_errors or [{"error": "promo parse failure"}])),
                  })
                  continue
              promotions_payload.extend(promo_headers)
              promotion_items_payload.extend(promo_items)
              processed_promotion_keys.update(row["promotion_key"] for row in promo_headers)
              successful_promo_store_keys.append(store_key)
              promotions_summary_rows.append({
                  "store_key": store_key,
                  "retailer": discovered_stores_map[store_key]["retailer"],
                  "store_name": discovered_stores_map[store_key]["store_name"],
                  "city": discovered_stores_map[store_key]["canonical_city"],
                  "promotions_count": len(promo_headers),
                  "promotion_items_count": len(promo_items),
                  "source_file": str(selection["path"]),
                  "source_ts": selection["timestamp"],
              })
          
          def assert_unique(rows, key_name, table_name):
              seen = set()
              duplicates = []
              for row in rows:
                  key = row[key_name]
                  if key in seen:
                      duplicates.append(key)
                  seen.add(key)
              if duplicates:
                  raise SystemExit(f"Duplicate {key_name} values in {table_name}: {duplicates[:20]}")
          
          compare_ready_summary = apply_compare_ready_promotions(prices_payload, promotions_payload, promotion_items_payload)
          write_json(OUT_DIR / "compare_ready_summary.json", compare_ready_summary)

          assert_unique(products_payload, "barcode", "products")
          assert_unique(stores_payload, "store_key", "stores")
          assert_unique(prices_payload, "price_key", "prices_current")
          assert_unique(promotions_payload, "promotion_key", "promotions_current")
          assert_unique(promotion_items_payload, "promotion_item_key", "promotion_items_current")
          
          write_csv(
              OUT_DIR / "prices_summary_by_store.csv",
              prices_summary_rows,
              ["store_key", "retailer", "store_name", "city", "items_count", "source_file", "source_ts"],
          )
          write_csv(
              OUT_DIR / "missing_promo_files.csv",
              [
                  {
                      "store_key": key,
                      "retailer": discovered_stores_map[key]["retailer"],
                      "store_name": discovered_stores_map[key]["store_name"],
                      "city": discovered_stores_map[key]["canonical_city"],
                  }
                  for key in missing_promo_store_keys
              ],
              ["store_key", "retailer", "store_name", "city"],
          )
          write_csv(
              OUT_DIR / "promotions_summary_by_store.csv",
              promotions_summary_rows,
              ["store_key", "retailer", "store_name", "city", "promotions_count", "promotion_items_count", "source_file", "source_ts"],
          )
          write_csv(
              OUT_DIR / "failed_promo_files.csv",
              failed_promo_store_rows,
              ["store_key", "retailer", "store_name", "city", "source_file", "source_ts", "error"],
          )
          write_csv(
              OUT_DIR / "product_field_coverage_by_store.csv",
              price_store_coverage_rows,
              ["store_key", "retailer", "store_name", "city", "valid_price_rows", "unique_barcodes", "name_present", "brand_present", "manufacturer_present", "category_present", "pct_name", "pct_brand", "pct_manufacturer", "pct_category", "source_file", "source_ts"],
          )
          
          city_scope_summary = []
          price_counts_by_city = Counter()
          promo_counts_by_city = Counter()
          promo_items_counts_by_city = Counter()
          for row in prices_summary_rows:
              price_counts_by_city[row["city"]] += int(row["items_count"])
          for row in promotions_summary_rows:
              promo_counts_by_city[row["city"]] += int(row["promotions_count"])
              promo_items_counts_by_city[row["city"]] += int(row["promotion_items_count"])
          for city in TARGET_CITIES:
              city_scope_summary.append({
                  "city": city,
                  "target_store_count": sum(1 for row in discovered_target_stores if row.get("canonical_city") == city),
                  "prices_payload_count": price_counts_by_city.get(city, 0),
                  "promotions_payload_count": promo_counts_by_city.get(city, 0),
                  "promotion_items_payload_count": promo_items_counts_by_city.get(city, 0),
              })
          write_json(OUT_DIR / "mvp_scope_summary.json", {
              "mvp_scope_profile": MVP_SCOPE_PROFILE,
              "target_cities": list(TARGET_CITIES),
              "target_store_count": len(discovered_target_stores),
              "locked_mvp_store_limit": LOCKED_MVP_STORE_LIMIT,
              "write_promotion_items": WRITE_PROMOTION_ITEMS,
              "compare_ready_summary": compare_ready_summary,
              "city_scope_summary": city_scope_summary,
              "recommended_for_supabase_free": len(discovered_target_stores) <= MAX_TARGET_STORES_SAFE,
          })
          write_json(OUT_DIR / "secondary_source_strategy.json", {
              "mode": SECONDARY_SOURCE_MODE,
              "candidate": SECONDARY_SOURCE_CANDIDATE,
              "fetch_enabled": SECONDARY_SOURCE_FETCH_ENABLED,
              "current_price_source_of_truth": "official_chain_files_only",
              "chosen_strategy": "Cheapersal QA-ready only, no live integration yet",
              "why_chosen_now": [
                  "Cheapersal is the best realistic secondary-source candidate in the current MVP stage because it is well aligned with official supermarket transparency data, city/store-level benchmarking, and a low-maintenance QA role.",
                  "The workflow does not safely prove a stable or approved secondary endpoint/schema for live enrichment, so keeping the secondary source in QA-ready/no-fetch mode avoids DB pollution and preserves official files as the only current-price truth.",
                  "This keeps the door open for future coverage audits and completeness benchmarking without weakening freshness, publish gates, or latest-only current-state replacement."
              ],
              "option_evaluation": {
                  "official_source_only": "Best for live current-state truth; remains mandatory for writes.",
                  "pricez": "Useful public benchmark, but user-contributed metadata makes it riskier as a direct enrichment source for trusted current-state writes.",
                  "cheapersal": "Best current secondary candidate for future QA benchmarking because it is focused on store/city comparison without requiring a paid dependency in the workflow.",
                  "pricepilot": "Potentially powerful normalized/commercial option, but it adds vendor cost, dependency risk, and integration assumptions that are not proven in this workflow.",
                  "direct_chain_catalog_pages": "Official metadata candidate in theory, but too fragile to integrate safely here without verified endpoints/selectors per chain."
              },
              "live_write_policy": "No secondary source may write prices_current/promotions_current/stores current-state rows in this workflow.",
              "future_safe_uses": [
                  "coverage_audit",
                  "promotion_gap_detection",
                  "metadata_enrichment_for_already_known_official_products"
              ],
          })
          
          target_coverage_by_store_rows = build_target_coverage_by_store_rows(
              discovered_target_stores,
              successful_price_store_keys,
              successful_promo_store_keys,
              missing_price_store_keys,
              missing_promo_store_keys,
          )
          target_coverage_by_city_retailer_rows = summarize_target_coverage_by_city_retailer(
              discovered_target_stores,
              successful_price_store_keys,
              successful_promo_store_keys,
          )
          write_csv(
              OUT_DIR / "target_coverage_by_store.csv",
              target_coverage_by_store_rows,
              ["store_key", "retailer", "store_name", "city", "has_price_payload", "has_promo_payload", "missing_price_file", "missing_promo_file"],
          )
          product_category_by_barcode = {
              row["barcode"]: clean_text(row.get("category"))
              for row in products_payload
              if clean_text(row.get("category"))
          }
          store_price_rows = defaultdict(list)
          barcode_store_key_map = defaultdict(set)
          for row in prices_payload:
              if row.get('store_key') in target_store_keys:
                  store_price_rows[row['store_key']].append(row)
                  barcode_store_key_map[row['barcode']].add(row['store_key'])

          comparison_universe_barcodes = {
              barcode
              for barcode, store_keys in barcode_store_key_map.items()
              if len(store_keys) >= 2
          }
          best_priced_products_count = max((len({row['barcode'] for row in rows}) for rows in store_price_rows.values()), default=0)
          best_active_categories_count = max((
              len({
                  product_category_by_barcode.get(row['barcode'], '')
                  for row in rows
                  if product_category_by_barcode.get(row['barcode'], '')
              })
              for rows in store_price_rows.values()
          ), default=0)
          best_promoted_products_count = max((len({row['barcode'] for row in rows if row.get('has_promotion')}) for rows in store_price_rows.values()), default=0)
          best_comparable_products_count = max((
              len({row['barcode'] for row in rows if row['barcode'] in comparison_universe_barcodes})
              for rows in store_price_rows.values()
          ), default=0)
          best_comparable_categories_count = max((
              len({
                  product_category_by_barcode.get(row['barcode'], '')
                  for row in rows
                  if row['barcode'] in comparison_universe_barcodes and product_category_by_barcode.get(row['barcode'], '')
              })
              for rows in store_price_rows.values()
          ), default=0)

          store_readiness_rows = []
          weak_target_store_keys = []
          partial_target_store_keys = []
          ready_target_store_keys = []
          stale_target_store_key_set = set(stale_price_source_store_keys) | set(stale_promo_source_store_keys)
          for store in sorted(discovered_target_stores, key=lambda x: x['store_key']):
              store_key = store['store_key']
              rows = store_price_rows.get(store_key, [])
              comparable_rows = [row for row in rows if row['barcode'] in comparison_universe_barcodes]
              priced_products_count = len({row['barcode'] for row in rows})
              active_categories_count = len({
                  product_category_by_barcode.get(row['barcode'], '')
                  for row in rows
                  if product_category_by_barcode.get(row['barcode'], '')
              })
              promoted_products_count = len({row['barcode'] for row in rows if row.get('has_promotion')})
              comparable_products_count = len({row['barcode'] for row in comparable_rows})
              comparable_categories_count = len({
                  product_category_by_barcode.get(row['barcode'], '')
                  for row in comparable_rows
                  if product_category_by_barcode.get(row['barcode'], '')
              })
              priced_vs_best = round((100.0 * priced_products_count / best_priced_products_count), 1) if best_priced_products_count else 0.0
              categories_vs_best = round((100.0 * active_categories_count / best_active_categories_count), 1) if best_active_categories_count else 0.0
              promotions_vs_best = round((100.0 * promoted_products_count / best_promoted_products_count), 1) if best_promoted_products_count else 0.0
              comparable_products_vs_best = round((100.0 * comparable_products_count / best_comparable_products_count), 1) if best_comparable_products_count else 0.0
              comparable_categories_vs_best = round((100.0 * comparable_categories_count / best_comparable_categories_count), 1) if best_comparable_categories_count else 0.0
              comparison_universe_coverage_pct = round((100.0 * comparable_products_count / len(comparison_universe_barcodes)), 1) if comparison_universe_barcodes else 0.0
              source_freshness_status = 'fresh' if store_key not in stale_target_store_key_set else 'stale_source'
              if priced_products_count == 0:
                  comparison_readiness = 'exclude_no_prices'
              elif store_key in stale_target_store_key_set:
                  comparison_readiness = 'stale_source'
                  weak_target_store_keys.append(store_key)
              elif comparable_products_count == 0:
                  comparison_readiness = 'weak_coverage'
                  weak_target_store_keys.append(store_key)
              elif comparable_products_vs_best >= 80.0 and comparable_categories_vs_best >= 70.0:
                  comparison_readiness = 'ready_for_comparison'
                  ready_target_store_keys.append(store_key)
              elif comparable_products_vs_best >= 60.0:
                  comparison_readiness = 'partial_review'
                  partial_target_store_keys.append(store_key)
              else:
                  comparison_readiness = 'weak_coverage'
                  weak_target_store_keys.append(store_key)
              store_readiness_rows.append({
                  'store_key': store_key,
                  'retailer': store.get('retailer'),
                  'store_name': store.get('store_name'),
                  'city': store.get('canonical_city') or store.get('city'),
                  'priced_products_count': priced_products_count,
                  'active_categories_count': active_categories_count,
                  'promoted_products_count': promoted_products_count,
                  'comparable_products_count': comparable_products_count,
                  'comparable_categories_count': comparable_categories_count,
                  'comparison_universe_coverage_pct': comparison_universe_coverage_pct,
                  'priced_products_vs_best_store_pct': priced_vs_best,
                  'active_categories_vs_best_store_pct': categories_vs_best,
                  'promotions_vs_best_store_pct': promotions_vs_best,
                  'comparable_products_vs_best_store_pct': comparable_products_vs_best,
                  'comparable_categories_vs_best_store_pct': comparable_categories_vs_best,
                  'source_freshness_status': source_freshness_status,
                  'comparison_readiness': comparison_readiness,
              })
          write_csv(
              OUT_DIR / 'store_readiness.csv',
              store_readiness_rows,
              ['store_key', 'retailer', 'store_name', 'city', 'priced_products_count', 'active_categories_count', 'promoted_products_count', 'comparable_products_count', 'comparable_categories_count', 'comparison_universe_coverage_pct', 'priced_products_vs_best_store_pct', 'active_categories_vs_best_store_pct', 'promotions_vs_best_store_pct', 'comparable_products_vs_best_store_pct', 'comparable_categories_vs_best_store_pct', 'source_freshness_status', 'comparison_readiness'],
          )
          readiness_rows_by_status = defaultdict(list)
          for row in store_readiness_rows:
              readiness_rows_by_status[row['comparison_readiness']].append(row['store_key'])
          ready_target_store_keys = sorted(readiness_rows_by_status.get('ready_for_comparison', []))
          partial_target_store_keys = sorted(readiness_rows_by_status.get('partial_review', []))
          weak_target_store_keys = sorted(readiness_rows_by_status.get('weak_coverage', []) + readiness_rows_by_status.get('stale_source', []))
          excluded_no_prices_target_store_keys = sorted(readiness_rows_by_status.get('exclude_no_prices', []))
          unexpected_readiness_status_rows = sorted(
              [
                  {
                      'store_key': row['store_key'],
                      'comparison_readiness': row['comparison_readiness'],
                  }
                  for row in store_readiness_rows
                  if row['comparison_readiness'] not in {'ready_for_comparison', 'partial_review', 'weak_coverage', 'stale_source', 'exclude_no_prices'}
              ],
              key=lambda item: item['store_key'],
          )
          store_readiness_summary = {
              'readiness_method': 'shared_exact_barcode_comparison_universe',
              'comparison_universe_products_count': len(comparison_universe_barcodes),
              'best_priced_products_count': best_priced_products_count,
              'best_active_categories_count': best_active_categories_count,
              'best_promoted_products_count': best_promoted_products_count,
              'best_comparable_products_count': best_comparable_products_count,
              'best_comparable_categories_count': best_comparable_categories_count,
              'ready_target_store_count': len(ready_target_store_keys),
              'partial_target_store_count': len(partial_target_store_keys),
              'weak_target_store_count': len(weak_target_store_keys),
              'stale_target_store_count': len(sorted(stale_target_store_key_set)),
              'stale_target_store_keys': sorted(stale_target_store_key_set),
              'ready_target_store_keys': ready_target_store_keys,
              'partial_target_store_keys': partial_target_store_keys,
              'weak_target_store_keys': weak_target_store_keys,
              'excluded_no_prices_target_store_count': len(excluded_no_prices_target_store_keys),
              'excluded_no_prices_target_store_keys': excluded_no_prices_target_store_keys,
          }
          write_json(OUT_DIR / 'store_readiness_summary.json', store_readiness_summary)

          target_store_rows_with_category_coverage = sorted({
              row['store_key']
              for row in price_store_coverage_rows
              if row.get('store_key') in set(target_store_keys) and int(row.get('category_present', 0) or 0) > 0
          })
          all_rows_active_categories_zero = bool(store_readiness_rows) and all(
              int(row.get('active_categories_count', 0) or 0) == 0
              for row in store_readiness_rows
          )
          all_rows_comparable_categories_zero = bool(store_readiness_rows) and all(
              int(row.get('comparable_categories_count', 0) or 0) == 0
              for row in store_readiness_rows
          )
          recomputed_ready_target_store_count = len(ready_target_store_keys)
          recomputed_partial_target_store_count = len(partial_target_store_keys)
          recomputed_weak_target_store_count = len(weak_target_store_keys)
          contradiction_flags = {
              'summary_ready_count_mismatch': store_readiness_summary['ready_target_store_count'] != recomputed_ready_target_store_count,
              'summary_partial_count_mismatch': store_readiness_summary['partial_target_store_count'] != recomputed_partial_target_store_count,
              'summary_weak_count_mismatch': store_readiness_summary['weak_target_store_count'] != recomputed_weak_target_store_count,
              'row_count_mismatch_target_scope': len(store_readiness_rows) != len(discovered_target_stores),
              'unexpected_readiness_status_present': bool(unexpected_readiness_status_rows),
              'all_active_categories_zero_despite_positive_best': best_active_categories_count > 0 and all_rows_active_categories_zero,
              'all_comparable_categories_zero_despite_positive_best': best_comparable_categories_count > 0 and all_rows_comparable_categories_zero,
              'all_row_category_counts_zero_despite_category_coverage_artifact': bool(target_store_rows_with_category_coverage) and all_rows_active_categories_zero,
          }
          readiness_consistency_reasons = []
          if contradiction_flags['summary_ready_count_mismatch']:
              readiness_consistency_reasons.append('summary_ready_count_mismatch')
          if contradiction_flags['summary_partial_count_mismatch']:
              readiness_consistency_reasons.append('summary_partial_count_mismatch')
          if contradiction_flags['summary_weak_count_mismatch']:
              readiness_consistency_reasons.append('summary_weak_count_mismatch')
          if contradiction_flags['row_count_mismatch_target_scope']:
              readiness_consistency_reasons.append('store_readiness_row_count_mismatch_target_store_count')
          if contradiction_flags['unexpected_readiness_status_present']:
              readiness_consistency_reasons.append('unexpected_readiness_status_present')
          if contradiction_flags['all_active_categories_zero_despite_positive_best']:
              readiness_consistency_reasons.append('all_active_categories_zero_despite_positive_best')
          if contradiction_flags['all_comparable_categories_zero_despite_positive_best']:
              readiness_consistency_reasons.append('all_comparable_categories_zero_despite_positive_best')
          if contradiction_flags['all_row_category_counts_zero_despite_category_coverage_artifact']:
              readiness_consistency_reasons.append('all_row_category_counts_zero_despite_category_coverage_artifact')
          store_readiness_consistency = {
              'consistency_ok': not any(contradiction_flags.values()),
              'readiness_method': store_readiness_summary['readiness_method'],
              'target_store_count': len(discovered_target_stores),
              'store_readiness_row_count': len(store_readiness_rows),
              'summary_counts': {
                  'ready_target_store_count': store_readiness_summary['ready_target_store_count'],
                  'partial_target_store_count': store_readiness_summary['partial_target_store_count'],
                  'weak_target_store_count': store_readiness_summary['weak_target_store_count'],
                  'excluded_no_prices_target_store_count': store_readiness_summary['excluded_no_prices_target_store_count'],
              },
              'recomputed_counts': {
