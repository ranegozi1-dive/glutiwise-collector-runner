          store_set_consistency["store_set_consistency_ok"] = store_set_consistency_ok
          write_json(OUT_DIR / "store_set_consistency.json", store_set_consistency)
          
          product_payload_coverage = {
              "products_payload": len(products_payload),
              "name_present": sum(1 for row in products_payload if sanitize_optional_text(row.get("name"))),
              "brand_present": sum(1 for row in products_payload if sanitize_optional_text(row.get("brand"))),
              "manufacturer_present": sum(1 for row in products_payload if sanitize_optional_text(row.get("manufacturer"))),
              "category_present": sum(1 for row in products_payload if sanitize_optional_text(row.get("category"))),
              "company_or_brand_present": sum(1 for row in products_payload if sanitize_optional_text(row.get("brand")) or sanitize_optional_text(row.get("manufacturer"))),
          }
          for key in ["name_present", "brand_present", "manufacturer_present", "category_present", "company_or_brand_present"]:
              product_payload_coverage[f"pct_{key.replace('_present','')}"] = round((100.0 * product_payload_coverage[key] / product_payload_coverage["products_payload"]), 2) if product_payload_coverage["products_payload"] else 0.0
          placeholder_leak_summary, placeholder_leak_examples = collect_product_placeholder_leaks(products_payload)
          write_json(OUT_DIR / "product_payload_coverage.json", product_payload_coverage)
          write_json(OUT_DIR / "product_placeholder_leak_summary.json", dict(placeholder_leak_summary))
          write_csv(
              OUT_DIR / "product_placeholder_leak_examples.csv",
              placeholder_leak_examples,
              ["barcode", "field", "value"],
          )
          
          minimum_company_or_brand_pct = 85.0
          minimum_manufacturer_pct = 70.0
          minimum_category_pct = 70.0
          minimum_name_pct_hard = 99.0
          required_product_coverage_keys = {
              "products_payload",
              "name_present",
              "brand_present",
              "manufacturer_present",
              "category_present",
              "company_or_brand_present",
              "pct_name",
              "pct_brand",
              "pct_manufacturer",
              "pct_category",
              "pct_company_or_brand",
          }
          product_hard_quality_ok = (
              product_payload_coverage.get("pct_name", 0) >= minimum_name_pct_hard
              and product_payload_coverage.get("pct_category", 0) >= minimum_category_pct
              and not placeholder_leak_summary
          )
          product_enrichment_quality_ok = (
              product_payload_coverage.get("pct_company_or_brand", 0) >= minimum_company_or_brand_pct
              and product_payload_coverage.get("pct_manufacturer", 0) >= minimum_manufacturer_pct
              and product_payload_coverage.get("pct_category", 0) >= minimum_category_pct
              and not placeholder_leak_summary
          )
          write_json(OUT_DIR / "product_quality_gate.json", {
              "minimum_name_pct_hard": minimum_name_pct_hard,
              "minimum_company_or_brand_pct": minimum_company_or_brand_pct,
              "minimum_manufacturer_pct": minimum_manufacturer_pct,
              "minimum_category_pct": minimum_category_pct,
              "actual_name_pct": product_payload_coverage.get("pct_name", 0),
              "actual_company_or_brand_pct": product_payload_coverage.get("pct_company_or_brand", 0),
              "actual_manufacturer_pct": product_payload_coverage.get("pct_manufacturer", 0),
              "actual_category_pct": product_payload_coverage.get("pct_category", 0),
              "placeholder_leak_entries": sum(placeholder_leak_summary.values()),
              "product_hard_quality_ok": product_hard_quality_ok,
              "product_enrichment_quality_ok": product_enrichment_quality_ok,
              "product_enrichment_quality_blocks_write": False,
              "product_quality_ok": product_enrichment_quality_ok,
          })

          product_rows_by_barcode = {row["barcode"]: row for row in products_payload}

          def normalized_category_key(value) -> str:
              return clean_lookup_text(value).lower()

          def product_brand_key(meta: dict) -> str:
              return clean_lookup_text(meta.get("brand") or meta.get("manufacturer") or "").lower()

          def comparison_price_value(row: dict):
              return (
                  row.get("effective_price")
                  if row.get("effective_price") is not None
                  else row.get("regular_price")
                  if row.get("regular_price") is not None
                  else row.get("price")
              )

          def requires_gluten_preservation(meta: dict) -> bool:
              return meta.get("gf_flag") is True or meta.get("gf_verified") is True

          def gluten_preservation_status(anchor_meta: dict, candidate_meta: dict):
              if not requires_gluten_preservation(anchor_meta):
                  return True, ""
              if candidate_meta.get("gf_flag") is True or candidate_meta.get("gf_verified") is True:
                  return True, ""
              if candidate_meta.get("gf_flag") is None and candidate_meta.get("gf_verified") is None:
                  return False, "not_proven_gf_constraint"
              return False, "gf_constraint_not_preserved"

          product_probe_metadata_by_barcode = {}
          for barcode in all_barcodes:
              payload_row = product_rows_by_barcode.get(barcode, {})
              existing = existing_products.get(barcode, {})
              name_value = payload_row.get("name") or sanitize_optional_text(existing.get("name")) or None
              category_value = payload_row.get("category") or sanitize_optional_text(existing.get("category")) or None
              brand_value = payload_row.get("brand") or sanitize_optional_text(existing.get("brand")) or None
              manufacturer_value = payload_row.get("manufacturer") or sanitize_optional_text(existing.get("manufacturer")) or None
              substitute_group_value = sanitize_optional_text(existing.get("substitute_group")) or None
              gf_flag_value = normalize_boolean_flag(existing.get("gf_flag"))
              gf_verified_value = normalize_boolean_flag(existing.get("gf_verified"))
              product_probe_metadata_by_barcode[barcode] = {
                  "barcode": barcode,
                  "name": name_value,
                  "category": category_value,
                  "brand": brand_value,
                  "manufacturer": manufacturer_value,
                  "substitute_group": substitute_group_value,
                  "gf_flag": gf_flag_value,
                  "gf_verified": gf_verified_value,
                  "requires_gluten_preservation": bool(gf_flag_value is True or gf_verified_value is True),
                  "pack_signature": parse_pack_signature(name_value or ""),
                  "line_signature": build_product_line_signature(name_value or "", brand_value or "", manufacturer_value or ""),
                  "brand_key": product_brand_key({
                      "brand": brand_value,
                      "manufacturer": manufacturer_value,
                  }),
                  "category_key": normalized_category_key(category_value),
              }

          probe_category_cap = 2
          probe_target_sizes = (10, 20)
          budget_alternative_min_savings_pct = 5.0
          comparison_modes = (
              "exact_identity_mode",
              "unit_normalized_same_product_mode",
              "canonical_equivalent_mode",
              "budget_alternative_mode",
          )

          price_row_by_store_barcode = {}
          store_rows_by_substitute_group = defaultdict(lambda: defaultdict(list))
          for row in prices_payload:
              store_key = row.get("store_key")
              barcode = row.get("barcode")
              if store_key not in target_store_keys or not barcode:
                  continue
              price_row_by_store_barcode[(store_key, barcode)] = row
              substitute_group_value = clean_text(product_probe_metadata_by_barcode.get(barcode, {}).get("substitute_group"))
              if substitute_group_value:
                  store_rows_by_substitute_group[store_key][substitute_group_value].append(row)

          for store_group_map in store_rows_by_substitute_group.values():
              for group_rows in store_group_map.values():
                  group_rows.sort(
                      key=lambda row: (
                          comparison_price_value(row) is None,
                          comparison_price_value(row) if comparison_price_value(row) is not None else 10**9,
                          row.get("barcode", ""),
                      )
                  )

          probe_candidates = []
          for barcode in sorted(comparison_universe_barcodes):
              metadata = product_probe_metadata_by_barcode.get(barcode, {})
              probe_candidates.append({
                  "barcode": barcode,
                  "name": metadata.get("name"),
                  "category": metadata.get("category"),
                  "category_key": metadata.get("category_key"),
                  "brand": metadata.get("brand"),
                  "substitute_group": metadata.get("substitute_group"),
                  "has_pack_signature": bool(metadata.get("pack_signature")),
                  "exact_store_coverage_count": len(barcode_store_key_map.get(barcode, set())),
              })
          probe_candidates.sort(
              key=lambda row: (
                  -row["exact_store_coverage_count"],
                  -(1 if row.get("category") else 0),
                  -(1 if row.get("substitute_group") else 0),
                  -(1 if row.get("has_pack_signature") else 0),
                  row.get("category") or "",
                  row.get("name") or "",
                  row["barcode"],
              )
          )

          def looks_like_core_food_probe_candidate(category: str, name: str) -> bool:
              text = clean_lookup_text(" ".join(filter(None, [category, name]))).lower()
              if not text:
                  return False
              exclude_tokens = {
                  "beauty", "cosmetic", "pharm", "drug", "care", "clean", "laundry", "diaper", "toilet", "paper",
                  "pet", "dog", "cat", "household", "kitchen", "bath", "electrical", "toy",
                  "snack", "chips", "candy", "chocolate", "cookie", "biscuit", "energy", "cola", "soda", "beer", "wine",
                  "ביוטי", "קוסמט", "פארם", "טואלט", "חיתול", "ניקוי", "כביסה", "חיות", "מחמד", "בית", "טיפוח",
                  "חטיף", "חטיפים", "נשנוש", "נשנושים", "ממתק", "ממתקים", "שוקולד", "עוגיה", "עוגיות", "ביסקוויט", "ביסקוויטים",
                  "משקה אנרגיה", "בירה", "יין",
              }
              include_tokens = {
                  "food", "grocery", "bread", "bakery", "milk", "dairy", "cheese", "yogurt", "egg", "eggs",
                  "cereal", "oats", "rice", "pasta", "flour", "oil", "sauce", "vegetable", "fruit", "frozen vegetable",
                  "meat", "fish", "chicken", "legume", "bean", "lentil", "tuna", "water",
                  "מזון", "מכולת", "לחם", "מאפה", "חלב", "מוצרי חלב", "גבינה", "יוגורט", "ביצה", "ביצים", "דגני", "שיבולת", "אורז",
                  "פסטה", "קמח", "שמן", "רוטב", "ירק", "ירקות", "פירות", "פירות וירקות", "קפוא", "קפואים", "בשר", "דג", "עוף",
                  "קטניות", "שעועית", "עדשים", "טונה", "מים",
              }
              if any(token in text for token in exclude_tokens):
                  return False
              return any(token in text for token in include_tokens)

          selected_probe_barcodes = []
          selected_probe_barcode_set = set()
          selected_probe_category_counts = Counter()
          preferred_probe_candidates = [
              candidate for candidate in probe_candidates
              if looks_like_core_food_probe_candidate(candidate.get("category") or "", candidate.get("name") or "")
          ]
          fallback_probe_candidates = [
              candidate for candidate in probe_candidates
              if candidate["barcode"] not in {row["barcode"] for row in preferred_probe_candidates}
          ]
          probe_candidate_scan_order = preferred_probe_candidates + fallback_probe_candidates
          for candidate in probe_candidate_scan_order:
              if len(selected_probe_barcodes) >= max(probe_target_sizes):
                  break
              category_key = candidate.get("category_key") or "__uncategorized__"
              if selected_probe_category_counts[category_key] >= probe_category_cap:
                  continue
              selected_probe_barcodes.append(candidate["barcode"])
              selected_probe_barcode_set.add(candidate["barcode"])
              selected_probe_category_counts[category_key] += 1
          if len(selected_probe_barcodes) < max(probe_target_sizes):
              for candidate in probe_candidates:
                  if len(selected_probe_barcodes) >= max(probe_target_sizes):
                      break
                  if candidate["barcode"] in selected_probe_barcode_set:
                      continue
                  selected_probe_barcodes.append(candidate["barcode"])
                  selected_probe_barcode_set.add(candidate["barcode"])

          selected_probe_items = []
          for probe_index, barcode in enumerate(selected_probe_barcodes, start=1):
              metadata = product_probe_metadata_by_barcode.get(barcode, {})
              exact_rows = [
                  price_row_by_store_barcode[(store_key, barcode)]
                  for store_key in sorted(barcode_store_key_map.get(barcode, set()))
                  if (store_key, barcode) in price_row_by_store_barcode
              ]
              reference_prices = [comparison_price_value(row) for row in exact_rows if comparison_price_value(row) is not None]
              reference_unit_prices = [
                  compute_unit_price_from_pack(comparison_price_value(row), metadata.get("pack_signature"))
                  for row in exact_rows
                  if comparison_price_value(row) is not None and metadata.get("pack_signature")
              ]
              selected_probe_items.append({
                  "probe_index": probe_index,
                  "barcode": barcode,
                  "name": metadata.get("name"),
                  "category": metadata.get("category"),
                  "brand": metadata.get("brand"),
                  "substitute_group": metadata.get("substitute_group"),
                  "gf_flag": metadata.get("gf_flag"),
                  "gf_verified": metadata.get("gf_verified"),
                  "requires_gluten_preservation": metadata.get("requires_gluten_preservation", False),
                  "line_signature": metadata.get("line_signature"),
                  "pack_signature": metadata.get("pack_signature"),
                  "exact_store_coverage_count": len(barcode_store_key_map.get(barcode, set())),
                  "reference_effective_price_median": median_number(reference_prices),
                  "reference_unit_price_median": median_number(reference_unit_prices),
              })

          def find_unit_normalized_match(anchor_probe: dict, store_key: str):
              anchor_barcode = anchor_probe["barcode"]
              anchor_meta = product_probe_metadata_by_barcode.get(anchor_barcode, {})
              substitute_group_value = clean_text(anchor_meta.get("substitute_group"))
              if not substitute_group_value:
                  return None, "not_proven_no_substitute_group"
              anchor_pack = anchor_meta.get("pack_signature")
              if not anchor_pack:
                  return None, "not_proven_no_anchor_pack_signature"
              if not anchor_meta.get("line_signature"):
                  return None, "not_proven_no_anchor_line_signature"
              if not anchor_meta.get("brand_key"):
                  return None, "not_proven_no_anchor_brand_key"
              anchor_category_key = anchor_meta.get("category_key")
              any_family_candidate = False
              for candidate_row in store_rows_by_substitute_group.get(store_key, {}).get(substitute_group_value, []):
                  candidate_barcode = candidate_row.get("barcode")
                  if candidate_barcode == anchor_barcode:
                      continue
                  any_family_candidate = True
                  candidate_meta = product_probe_metadata_by_barcode.get(candidate_barcode, {})
                  if candidate_meta.get("category_key") != anchor_category_key:
                      continue
                  if candidate_meta.get("brand_key") != anchor_meta.get("brand_key"):
                      continue
                  if candidate_meta.get("line_signature") != anchor_meta.get("line_signature"):
                      continue
                  candidate_pack = candidate_meta.get("pack_signature")
                  if not candidate_pack:
                      continue
                  if candidate_pack.get("dimension") != anchor_pack.get("dimension"):
                      continue
                  if abs(candidate_pack.get("total_base_qty", 0.0) - anchor_pack.get("total_base_qty", 0.0)) < 0.0001:
                      continue
                  candidate_unit_price = compute_unit_price_from_pack(comparison_price_value(candidate_row), candidate_pack)
                  if candidate_unit_price is None:
                      continue
                  return {
                      "match_type": "unit_normalized_same_product",
                      "matched_barcode": candidate_barcode,
                      "candidate_unit_price": candidate_unit_price,
                  }, ""
              if any_family_candidate:
                  return None, "not_proven_no_unit_normalized_same_product_match"
              return None, "no_store_candidate_in_substitute_group"

          def find_canonical_equivalent_match(anchor_probe: dict, store_key: str):
              anchor_barcode = anchor_probe["barcode"]
              anchor_meta = product_probe_metadata_by_barcode.get(anchor_barcode, {})
              substitute_group_value = clean_text(anchor_meta.get("substitute_group"))
              if not substitute_group_value:
                  return None, "not_proven_no_substitute_group"
              anchor_category_key = anchor_meta.get("category_key")
              if not anchor_category_key:
                  return None, "not_proven_no_anchor_category"
              if not anchor_meta.get("line_signature"):
                  return None, "not_proven_no_anchor_line_signature"
              any_family_candidate = False
              any_category_candidate = False
              gf_blocked = False
              for candidate_row in store_rows_by_substitute_group.get(store_key, {}).get(substitute_group_value, []):
                  candidate_barcode = candidate_row.get("barcode")
                  if candidate_barcode == anchor_barcode:
                      continue
                  any_family_candidate = True
                  candidate_meta = product_probe_metadata_by_barcode.get(candidate_barcode, {})
                  if candidate_meta.get("category_key") != anchor_category_key:
                      continue
                  any_category_candidate = True
                  gf_ok, _ = gluten_preservation_status(anchor_meta, candidate_meta)
                  if not gf_ok:
                      gf_blocked = True
                      continue
                  if candidate_meta.get("line_signature") != anchor_meta.get("line_signature"):
                      continue
                  return {
                      "match_type": "canonical_equivalent",
                      "matched_barcode": candidate_barcode,
                  }, ""
              if gf_blocked:
                  return None, "not_proven_gf_constraint"
              if any_category_candidate:
                  return None, "not_proven_no_canonical_line_match"
              if any_family_candidate:
                  return None, "not_proven_no_same_category_candidate"
              return None, "no_store_candidate_in_substitute_group"

          def find_budget_alternative_match(anchor_probe: dict, store_key: str):
              anchor_barcode = anchor_probe["barcode"]
              anchor_meta = product_probe_metadata_by_barcode.get(anchor_barcode, {})
              substitute_group_value = clean_text(anchor_meta.get("substitute_group"))
              if not substitute_group_value:
                  return None, "not_proven_no_substitute_group"
              anchor_category_key = anchor_meta.get("category_key")
              if not anchor_category_key:
                  return None, "not_proven_no_anchor_category"
              anchor_pack = anchor_meta.get("pack_signature")
              reference_unit_price = anchor_probe.get("reference_unit_price_median")
              reference_effective_price = anchor_probe.get("reference_effective_price_median")
              any_family_candidate = False
              any_price_comparable_candidate = False
              gf_blocked = False
              best_candidate = None
              for candidate_row in store_rows_by_substitute_group.get(store_key, {}).get(substitute_group_value, []):
                  candidate_barcode = candidate_row.get("barcode")
                  if candidate_barcode == anchor_barcode:
                      continue
                  any_family_candidate = True
                  candidate_meta = product_probe_metadata_by_barcode.get(candidate_barcode, {})
                  if candidate_meta.get("category_key") != anchor_category_key:
                      continue
                  gf_ok, _ = gluten_preservation_status(anchor_meta, candidate_meta)
                  if not gf_ok:
                      gf_blocked = True
                      continue
                  candidate_compare_price = None
                  reference_compare_price = None
                  comparison_basis = None
                  candidate_pack = candidate_meta.get("pack_signature")
                  if reference_unit_price is not None and anchor_pack and candidate_pack and candidate_pack.get("dimension") == anchor_pack.get("dimension"):
                      candidate_compare_price = compute_unit_price_from_pack(comparison_price_value(candidate_row), candidate_pack)
                      reference_compare_price = reference_unit_price
                      comparison_basis = "unit_price"
                  elif reference_effective_price is not None and candidate_meta.get("line_signature") and candidate_meta.get("line_signature") == anchor_meta.get("line_signature"):
                      candidate_compare_price = comparison_price_value(candidate_row)
                      reference_compare_price = reference_effective_price
                      comparison_basis = "same_line_price"
                  if candidate_compare_price is None or reference_compare_price is None:
                      continue
                  any_price_comparable_candidate = True
                  if reference_compare_price <= 0:
                      continue
                  savings_pct = round(((reference_compare_price - candidate_compare_price) / reference_compare_price) * 100.0, 2)
                  if savings_pct < budget_alternative_min_savings_pct:
                      continue
                  candidate_payload = {
                      "match_type": "budget_alternative",
                      "matched_barcode": candidate_barcode,
                      "comparison_basis": comparison_basis,
                      "candidate_compare_price": round(candidate_compare_price, 6),
                      "reference_compare_price": round(reference_compare_price, 6),
                      "savings_pct": savings_pct,
                  }
                  if best_candidate is None or candidate_compare_price < best_candidate["candidate_compare_price"]:
                      best_candidate = candidate_payload
              if best_candidate is not None:
                  return best_candidate, ""
              if gf_blocked:
                  return None, "not_proven_gf_constraint"
              if any_price_comparable_candidate:
                  return None, "not_cheaper_enough_for_budget_alternative"
              if any_family_candidate:
                  return None, "not_proven_no_price_comparable_candidate"
              return None, "no_store_candidate_in_substitute_group"

          def summarize_probe_window(item_results, probe_size: int):
              window = item_results[:probe_size]
              covered_item_count = sum(1 for item in window if item.get("covered"))
              match_type_counts = Counter(item.get("match_type") for item in window if item.get("covered"))
              miss_reason_counts = Counter(item.get("reason") for item in window if not item.get("covered"))
              feasible = covered_item_count >= probe_size
              if feasible:
                  top_match_types = ", ".join(
                      f"{key}:{value}"
                      for key, value in sorted(match_type_counts.items())
                  ) or "exact_identity:0"
                  reason = f"covered {covered_item_count}/{probe_size}; match_types={top_match_types}"
              else:
                  top_miss_reasons = ", ".join(
                      f"{key}:{value}"
                      for key, value in miss_reason_counts.most_common(3)
                  ) or "insufficient_coverage"
                  reason = f"covered {covered_item_count}/{probe_size}; missing_reasons={top_miss_reasons}"
              return {
                  "feasible_for_probe": feasible,
                  "covered_item_count": covered_item_count,
