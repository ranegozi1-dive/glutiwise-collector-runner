                  "distinct_same_product_identity_count",
                  "form_factor_examples",
                  "equivalence_group_examples",
              ],
          )
          per_store_family_rows = defaultdict(list)
          for row in store_comparison_family_coverage_rows:
              per_store_family_rows[row["store_key"]].append(row)
          store_family_coverage_summary = {
              "shadow_only": True,
              "publish_gate_impact": "none",
              "target_store_count": len(discovered_target_stores),
              "comparison_family_count": len(comparison_family_registry),
