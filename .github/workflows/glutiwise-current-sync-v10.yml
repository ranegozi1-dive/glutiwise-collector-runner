name: GlutiWise Current Sync to Supabase v10

on:
  # Uncomment the 2 lines below only after the first successful manual run.
  # schedule:
  #   - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      write_to_supabase:
        description: "Write to Supabase (true/false)"
        required: true
        default: "false"
      scraper_today:
        description: "Optional UTC override for scraper TODAY, format YYYY-MM-DD HH:MM"
        required: false
        default: ""

concurrency:
  group: glutiwise-current-sync-v10
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      WRITE_TO_SUPABASE: ${{ inputs.write_to_supabase || 'false' }}
      SCRAPER_TODAY: ${{ inputs.scraper_today || '' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_JWT: ${{ secrets.SUPABASE_SERVICE_ROLE_JWT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare folders
        run: |
          mkdir -p dumps out out/chunks

      - name: Pull scraper image
        run: |
          docker pull erlichsefi/israeli-supermarket-scarpers:latest

      - name: Download store, price, and promotion files
        run: |
          set -euo pipefail
          ARGS=(
            --rm
            -v "${{ github.workspace }}/dumps:/usr/src/app/dumps"
            -e ENABLED_SCRAPERS="RAMI_LEVY,SHUFERSAL,YOHANANOF"
            -e ENABLED_FILE_TYPES="STORE_FILE,PRICE_FULL_FILE,PROMO_FILE,PROMO_FULL_FILE"
            -e NUMBER_OF_PROCESSES="3"
            -e OUTPUT_MODE="disk"
            -e STORAGE_PATH="/usr/src/app/dumps"
          )
          if [ -n "${SCRAPER_TODAY}" ]; then
            ARGS+=( -e "TODAY=${SCRAPER_TODAY}" )
          fi
          docker run "${ARGS[@]}" erlichsefi/israeli-supermarket-scarpers:latest

      - name: Build payload, validate, and sync
        run: |
          cat > sync_glutiwise.py <<'PY'
          import csv
          import gzip
          import io
          import hashlib
          import json
          import os
          import re
          import sys
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          import zipfile
          from collections import Counter, defaultdict
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          TARGET_RETAILERS = ("shufersal", "ramilevy", "yohananof")
          TARGET_CITIES = (
              "הוד השרון",
              "כפר סבא",
              "פתח תקווה",
              "רמת השרון",
              "רעננה",
          )
          CHAIN_ID_TO_RETAILER = {
              "7290027600007": "shufersal",
              "7290058140886": "ramilevy",
              "7290803800003": "yohananof",
          }
          RUN_TS = datetime.now(timezone.utc).replace(microsecond=0)
          RUN_TS_ISO = RUN_TS.isoformat().replace("+00:00", "Z")
          PRICE_STALE_BEFORE = (RUN_TS - timedelta(days=7)).isoformat().replace("+00:00", "Z")
          SUPABASE_URL = os.environ["SUPABASE_URL"].rstrip("/")
          SUPABASE_KEY = os.environ["SUPABASE_SERVICE_ROLE_JWT"]
          WRITE_TO_SUPABASE = os.environ.get("WRITE_TO_SUPABASE", "true").strip().lower() == "true"
          OUT_DIR = Path("out")
          DUMPS_DIR = Path("dumps")
          OUT_DIR.mkdir(parents=True, exist_ok=True)
          (OUT_DIR / "chunks").mkdir(parents=True, exist_ok=True)

          def log(msg: str) -> None:
              print(f"[{datetime.now().strftime('%H:%M:%S')}] {msg}", flush=True)

          def write_json(path: Path, data) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              with path.open("w", encoding="utf-8") as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)

          def write_csv(path: Path, rows, fieldnames) -> None:
              path.parent.mkdir(parents=True, exist_ok=True)
              with path.open("w", encoding="utf-8", newline="") as f:
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({k: row.get(k) for k in fieldnames})

          def localname(tag: str) -> str:
              return tag.split("}")[-1] if "}" in tag else tag

          def clean_text(value) -> str:
              if value is None:
                  return ""
              text = str(value).replace("\u200f", " ").replace("\u200e", " ").replace("\xa0", " ")
              text = re.sub(r"[\t\r\n]+", " ", text)
              text = re.sub(r"\s+", " ", text).strip()
              return text

          def clean_lookup_text(value) -> str:
              text = clean_text(value)
              text = text.replace('"', ' ').replace("׳", " ").replace("'", " ").replace("״", " ")
              text = text.replace("-", " ").replace("/", " ").replace("\\", " ")
              text = re.sub(r"\s+", " ", text).strip()
              return text

          def collapse_for_match(value) -> str:
              return re.sub(r"\s+", "", clean_lookup_text(value))

          def text_is_placeholder(value: str) -> bool:
              v = clean_text(value).lower()
              if not v:
                  return True
              placeholders = {
                  "unknown", "לא ידוע", "לא ידועה", "null", "none", "n/a", "na",
                  "ללא", "0", "---", "-", "_none_", "_off_not_found_", "_off_no_brand_",
                  "_off_no_manufacturer_", "not found", "brand not found", "manufacturer not found",
                  "משתנה", "כללי", "generic", "nan", "nil",
              }
              if v in placeholders:
                  return True
              if v.startswith('_off_'):
                  return True
              if re.fullmatch(r'[-_ ]+', v):
                  return True
              return False

          def sanitize_optional_text(value):
              v = clean_text(value)
              return "" if text_is_placeholder(v) else v

          def has_placeholder_leak(value) -> bool:
              v = clean_text(value)
              return bool(v) and text_is_placeholder(v)

          def scrub_product_row(row: dict):
              cleaned = {
                  "barcode": normalize_barcode(row.get("barcode")),
                  "name": sanitize_optional_text(row.get("name")) or None,
                  "category": sanitize_optional_text(row.get("category")) or None,
                  "brand": sanitize_optional_text(row.get("brand")) or None,
                  "manufacturer": sanitize_optional_text(row.get("manufacturer")) or None,
              }
              if not cleaned["brand"]:
                  cleaned["brand"] = fallback_brand_from_name_or_manufacturer(cleaned["name"] or "", cleaned["manufacturer"] or "") or None
              return cleaned


          def compact_row(row: dict, required_keys=None):
              required_keys = set(required_keys or [])
              compacted = {}
              for key, value in row.items():
                  if key in required_keys:
                      compacted[key] = value
                      continue
                  if value is None:
                      continue
                  if isinstance(value, str) and not clean_text(value):
                      continue
                  compacted[key] = value
              return compacted

          def build_target_coverage_by_store_rows(target_rows, price_keys, promo_keys, missing_price_keys, missing_promo_keys):
              price_keys = set(price_keys)
              promo_keys = set(promo_keys)
              missing_price_keys = set(missing_price_keys)
              missing_promo_keys = set(missing_promo_keys)
              rows = []
              for row in sorted(target_rows, key=lambda x: (x["canonical_city"], x["retailer"], x["store_key"])):
                  store_key = row["store_key"]
                  rows.append({
                      "store_key": store_key,
                      "retailer": row["retailer"],
                      "store_name": row["store_name"],
                      "city": row["canonical_city"],
                      "has_price_payload": store_key in price_keys,
                      "has_promo_payload": store_key in promo_keys,
                      "missing_price_file": store_key in missing_price_keys,
                      "missing_promo_file": store_key in missing_promo_keys,
                  })
              return rows

          def summarize_target_coverage_by_city_retailer(target_rows, price_keys, promo_keys):
              price_keys = set(price_keys)
              promo_keys = set(promo_keys)
              bucket = defaultdict(lambda: {
                  "target_stores": 0,
                  "price_payload_stores": 0,
                  "promo_payload_stores": 0,
              })
              for row in target_rows:
                  key = (row["canonical_city"], row["retailer"])
                  bucket[key]["target_stores"] += 1
                  if row["store_key"] in price_keys:
                      bucket[key]["price_payload_stores"] += 1
                  if row["store_key"] in promo_keys:
                      bucket[key]["promo_payload_stores"] += 1
              rows = []
              for (city, retailer), counts in sorted(bucket.items()):
                  rows.append({
                      "city": city,
                      "retailer": retailer,
                      "target_stores": counts["target_stores"],
                      "price_payload_stores": counts["price_payload_stores"],
                      "promo_payload_stores": counts["promo_payload_stores"],
                      "full_price_coverage": counts["target_stores"] == counts["price_payload_stores"],
                      "full_promo_coverage": counts["target_stores"] == counts["promo_payload_stores"],
                  })
              return rows

          def collect_product_placeholder_leaks(rows, limit=250):
              summary = Counter()
              examples = []
              for row in rows:
                  barcode = normalize_barcode(row.get("barcode"))
                  for field_name in ("name", "brand", "manufacturer", "category"):
                      value = row.get(field_name)
                      if has_placeholder_leak(value):
                          text_value = clean_text(value)
                          summary[f"{field_name}:{text_value}"] += 1
                          if len(examples) < limit:
                              examples.append({
                                  "barcode": barcode,
                                  "field": field_name,
                                  "value": text_value,
                              })
              return summary, examples

          def fetch_promotion_keys(filters):
              rows = rest_get_rows("promotions_current", "promotion_key", filters)
              return sorted({clean_text(row.get("promotion_key", "")) for row in rows if clean_text(row.get("promotion_key", ""))})

          def delete_promotion_items_by_promotion_keys(promotion_keys):
              if not promotion_keys:
                  return
              for batch in chunked(sorted(set(promotion_keys)), 200):
                  delete_rows("promotion_items_current", {"promotion_key": build_in_filter(batch)})

          def looks_like_generic_company_name(value: str) -> bool:
              v = clean_lookup_text(value).lower()
              if not v:
                  return True
              generic_tokens = {
                  "בעמ", "בע מ", "חברה", "תעשיות", "מפעל", "לוגיסטיקה", "שיווק", "יבוא", "יבוא ושיווק",
                  "קמעונאות", "רשת", "מזון", "פרמצבטיות", "מעבדות", "group", "ltd", "inc", "corp", "co"
              }
              return any(tok in v for tok in generic_tokens)

          def fallback_brand_from_name_or_manufacturer(name: str, manufacturer: str) -> str:
              name_v = sanitize_optional_text(name)
              manuf_v = sanitize_optional_text(manufacturer)
              if not manuf_v:
                  return ""
              if len(manuf_v) < 2 or len(manuf_v) > 24:
                  return ""
              if looks_like_generic_company_name(manuf_v):
                  return ""
              name_norm = clean_lookup_text(name_v).lower()
              manuf_norm = clean_lookup_text(manuf_v).lower()
              if not name_norm or not manuf_norm:
                  return ""
              manuf_tokens = [tok for tok in manuf_norm.split() if len(tok) >= 3]
              if manuf_norm in name_norm:
                  return manuf_v
              if manuf_tokens and all(tok in name_norm for tok in manuf_tokens[:2]):
                  return manuf_v
              return ""

          def looks_like_barcode(value: str) -> bool:
              digits = re.sub(r"\D", "", clean_text(value))
              return bool(re.fullmatch(r"\d{8,13}", digits))

          def normalize_barcode(value: str) -> str:
              return re.sub(r"\D", "", clean_text(value))

          def safe_decimal(value):
              s = clean_text(value).replace(",", ".")
              if not s:
                  return None
              try:
                  num = float(s)
              except ValueError:
                  return None
              return round(num, 2) if num > 0 else None

          def parse_datetime_value(value: str):
              value = clean_text(value)
              if not value:
                  return None
              raw = value.replace("Z", "+00:00")
              fmts = (
                  None,
                  "%Y%m%d%H%M",
                  "%Y%m%d%H%M%S",
                  "%d/%m/%Y %H:%M",
                  "%d/%m/%Y %H:%M:%S",
                  "%Y-%m-%d %H:%M:%S",
                  "%Y-%m-%d %H:%M",
                  "%Y-%m-%d",
              )
              for fmt in fmts:
                  try:
                      if fmt is None:
                          dt = datetime.fromisoformat(raw)
                      else:
                          dt = datetime.strptime(value, fmt)
                      if dt.tzinfo is None:
                          dt = dt.replace(tzinfo=timezone.utc)
                      return dt.astimezone(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")
                  except Exception:
                      continue
              return None

          def filename_timestamp(path: Path):
              matches = re.findall(r"(\d{12,14})", path.name)
              for candidate in reversed(matches):
                  parsed = parse_datetime_value(candidate)
                  if parsed:
                      return parsed
              return datetime.fromtimestamp(path.stat().st_mtime, timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          def sha1_text(text: str) -> str:
              return hashlib.sha1(text.encode("utf-8")).hexdigest()

          def canonical_store_id(retailer: str, store_id_raw: str) -> str:
              text = clean_text(store_id_raw)
              digits = re.sub(r"\D", "", text)
              if digits:
                  if retailer in {"shufersal", "yohananof"}:
                      return digits.zfill(3)
                  return str(int(digits))
              return text

          def retailer_from(chain_id: str, chain_name: str):
              cid = clean_text(chain_id)
              cname = clean_text(chain_name)
              if "שופרסל" in cname:
                  return "shufersal"
              if "רמי" in cname and "לוי" in cname:
                  return "ramilevy"
              if "יוחננוף" in cname or "YOHANANOF" in cname.upper():
                  return "yohananof"
              return CHAIN_ID_TO_RETAILER.get(cid)

          def canonical_store_key(retailer: str, store_id_raw: str) -> str:
              return f"{retailer}:{canonical_store_id(retailer, store_id_raw)}"

          def split_store_key(store_key: str):
              parts = clean_text(store_key).split(":", 1)
              if len(parts) != 2:
                  return clean_text(store_key), ""
              return parts[0], parts[1]

          def equivalent_store_keys(store_key: str):
              retailer, store_id_raw = split_store_key(store_key)
              digits = re.sub(r"\D", "", clean_text(store_id_raw))
              keys = []
              seen_local = set()
              if digits:
                  variants = [digits, digits.zfill(3)]
                  try:
                      variants.append(str(int(digits)))
                  except Exception:
                      pass
                  for variant in variants:
                      key = f"{retailer}:{variant}"
                      if key not in seen_local:
                          keys.append(key)
                          seen_local.add(key)
              else:
                  key = f"{retailer}:{clean_text(store_id_raw)}"
                  if key not in seen_local:
                      keys.append(key)
              return keys

          def detect_city(*values):
              matches = []
              reasons = []
              for source_name, value in values:
                  raw = clean_text(value)
                  if not raw:
                      continue
                  text = clean_lookup_text(raw)
                  text_no_space = collapse_for_match(raw)
                  tokens = [tok for tok in re.split(r"[^A-Za-zא-ת0-9]+", text) if tok]
                  token_set = set(tokens)
                  source_matches = []
                  if ("הוד" in token_set and "השרון" in token_set) or "הודהשרון" in text_no_space:
                      source_matches.append("הוד השרון")
                  if ("כפר" in token_set and "סבא" in token_set) or "כפרסבא" in text_no_space or 'כ"ס' in raw or 'כ״ס' in raw:
                      source_matches.append("כפר סבא")
                  pt_abbrev = (
                      'פ"ת' in raw
                      or 'פ״ת' in raw
                      or 'פת' in token_set
                      or ('פ' in token_set and 'ת' in token_set)
                  )
                  if (
                      ("פתח" in token_set and ("תקוה" in token_set or "תקווה" in token_set))
                      or "פתחתקוה" in text_no_space
                      or "פתחתקווה" in text_no_space
                      or pt_abbrev
                  ):
                      source_matches.append("פתח תקווה")
                  if ("רמת" in token_set and "השרון" in token_set) or "רמתהשרון" in text_no_space:
                      source_matches.append("רמת השרון")
                  if "רעננה" in token_set or "רעננה" in text_no_space:
                      source_matches.append("רעננה")
                  for city in source_matches:
                      matches.append(city)
                      reasons.append(f"{source_name}:{raw}")
              unique = []
              for city in matches:
                  if city not in unique:
                      unique.append(city)
              if len(unique) == 1:
                  return unique[0], reasons
              if len(unique) > 1:
                  return None, reasons
              return None, reasons

          def validate_target_assignment(row: dict):
              detected_city, reasons = detect_city(
                  ("city", row.get("city", "")),
                  ("address", row.get("address", "")),
                  ("store_name", row.get("store_name", "")),
              )
              expected_city = clean_text(row.get("canonical_city", ""))
              return detected_city, reasons, bool(expected_city and detected_city == expected_city)

          def choose_better_text(current: str, candidate: str) -> str:
              current = sanitize_optional_text(current)
              candidate = sanitize_optional_text(candidate)
              if not candidate:
                  return current
              if not current:
                  return candidate
              if candidate == current:
                  return current
              def score(value: str):
                  v = clean_text(value)
                  return (
                      0 if text_is_placeholder(v) else 1,
                      1 if re.search(r"[A-Za-zא-ת]", v) else 0,
                      len(v),
                      v.count(" "),
                  )
              return candidate if score(candidate) > score(current) else current

          def normalize_promotion_type(title: str, description: str, benefit_text: str, is_club: bool) -> str:
              text = " ".join(filter(None, [clean_text(title), clean_text(description), clean_text(benefit_text)])).lower()
              if is_club:
                  return "club"
              if re.search(r"\b[2-9]\s*ב", text) or "קנה" in text or "מתנה" in text or "השני" in text:
                  return "multibuy"
              if "%" in text or "הנחה" in text:
                  return "discount"
              if text:
                  return "simple"
              return "unknown"

          def _roots_from_zip_bytes(blob: bytes):
              roots = []
              with zipfile.ZipFile(io.BytesIO(blob), "r") as zf:
                  for name in zf.namelist():
                      if name.lower().endswith(".xml"):
                          roots.append(ET.fromstring(zf.read(name)))
              return roots

          def load_xml_roots(path: Path):
              blob = path.read_bytes()
              lower = path.name.lower()
              # 1) Proper zip files
              if blob[:4] == b"PK\x03\x04" or lower.endswith('.zip'):
                  roots = _roots_from_zip_bytes(blob)
                  if roots:
                      return roots
              # 2) Proper gzip files
              if blob[:2] == b"\x1f\x8b" or lower.endswith('.gz'):
                  try:
                      raw = gzip.decompress(blob)
                      # Some vendors ship zip payloads inside .gz wrappers
                      if raw[:4] == b"PK\x03\x04":
                          roots = _roots_from_zip_bytes(raw)
                          if roots:
                              return roots
                      return [ET.fromstring(raw)]
                  except Exception:
                      pass
              # 3) Mislabelled zip with .gz extension
              try:
                  roots = _roots_from_zip_bytes(blob)
                  if roots:
                      return roots
              except Exception:
                  pass
              # 4) Plain XML fallback
              return [ET.fromstring(blob)]

          def extract_any(elem, names):
              wanted = {n.lower() for n in names}
              for child in elem.iter():
                  if localname(child.tag).lower() in wanted:
                      text = clean_text(child.text)
                      if text:
                          return text
              return ""

          def collect_tag_values(elem):
              data = {}
              for child in elem.iter():
                  key = localname(child.tag)
                  text = clean_text(child.text)
                  if text and key not in data:
                      data[key] = text
              return data

          def iter_dump_paths():
              for path in DUMPS_DIR.rglob("*"):
                  if not path.is_file():
                      continue
                  lower = path.name.lower()
                  if lower.endswith((".xml", ".gz", ".zip", ".xml.gz")):
                      yield path

          def classify_dump_kind(path: Path):
              lower = path.name.lower()
              if lower.startswith("stores") or lower.startswith("store"):
                  return "store"
              if "pricefull" in lower:
                  return "price_full"
              if "promofull" in lower:
                  return "promo_full"
              if lower.startswith("promo") or "promo" in lower:
                  return "promo"
              return None

          def parse_filename_identity(path: Path):
              name = path.name
              patterns = [
                  (r"(?i)pricefull(\d+)-(\d+)", "price_full"),
                  (r"(?i)promofull(\d+)-(\d+)", "promo_full"),
                  (r"(?i)promo(\d+)-(\d+)", "promo"),
                  (r"(?i)stores(\d+)", "store"),
              ]
              for pattern, kind in patterns:
                  m = re.search(pattern, name)
                  if m:
                      chain_id = m.group(1)
                      store_id = m.group(2) if m.lastindex and m.lastindex >= 2 else ""
                      return kind, chain_id, store_id
              return None, "", ""

          def http_json(method: str, path_or_url: str, headers=None, body=None, timeout=120, expect_json=True):
              url = path_or_url if path_or_url.startswith("http") else f"{SUPABASE_URL}{path_or_url}"
              payload = None
              if body is not None:
                  payload = json.dumps(body, ensure_ascii=False).encode("utf-8")
              req = urllib.request.Request(url, data=payload, method=method)
              all_headers = headers.copy() if headers else {}
              all_headers.setdefault("apikey", SUPABASE_KEY)
              all_headers.setdefault("Authorization", f"Bearer {SUPABASE_KEY}")
              if body is not None:
                  all_headers.setdefault("Content-Type", "application/json")
              for k, v in all_headers.items():
                  req.add_header(k, v)
              last_error = None
              for attempt in range(1, 4):
                  try:
                      with urllib.request.urlopen(req, timeout=timeout) as resp:
                          raw = resp.read().decode("utf-8")
                          if not expect_json:
                              return raw
                          if not raw:
                              return None
                          return json.loads(raw)
                  except urllib.error.HTTPError as exc:
                      body_text = exc.read().decode("utf-8", errors="replace")
                      last_error = RuntimeError(f"HTTP {exc.code} {method} {url}: {body_text[:1200]}")
                  except Exception as exc:
                      last_error = exc
                  if attempt < 3:
                      time.sleep(attempt * 2)
              raise last_error

          def pg_quote(value: str) -> str:
              text = clean_text(value)
              text = text.replace('"', '\\"')
              return f'"{text}"'

          def build_in_filter(values):
              return "in.(" + ",".join(pg_quote(v) for v in values) + ")"

          def rest_get_rows(table: str, select_clause: str, filters=None):
              query = {"select": select_clause}
              if filters:
                  query.update(filters)
              parts = []
              for key, value in query.items():
                  parts.append(f"{urllib.parse.quote(str(key), safe='')}={urllib.parse.quote(str(value), safe='().,:*')}")
              path = f"/rest/v1/{table}?" + "&".join(parts)
              data = http_json("GET", path)
              return data or []

          def chunked(iterable, size):
              batch = []
              for item in iterable:
                  batch.append(item)
                  if len(batch) >= size:
                      yield batch
                      batch = []
              if batch:
                  yield batch

          def fetch_existing_products(barcodes):
              rows = {}
              for batch in chunked(sorted(set(barcodes)), 200):
                  filters = {"barcode": build_in_filter(batch)}
                  data = rest_get_rows("products", "barcode,name,category,brand,manufacturer", filters)
                  for row in data:
                      rows[row["barcode"]] = row
              return rows

          def fetch_existing_target_chain_stores():
              filters = {
                  "retailer": build_in_filter(TARGET_RETAILERS),
              }
              data = rest_get_rows(
                  "stores",
                  "retailer,store_id,store_name,city,store_key,address,area,store_type,mvp_active",
                  filters,
              )
              return data

          def post_upsert(table: str, conflict: str, rows, chunk_size: int):
              if not rows:
                  return
              path = f"/rest/v1/{table}?on_conflict={urllib.parse.quote(conflict, safe=',')}"
              headers = {"Prefer": "resolution=merge-duplicates,return=minimal,missing=default"}
              for index, batch in enumerate(chunked(rows, chunk_size), start=1):
                  log(f"Upserting {table} chunk {index} ({len(batch)} rows)")
                  http_json("POST", path, headers=headers, body=batch, expect_json=False)

          def delete_rows(table: str, filters):
              if not filters:
                  return
              parts = []
              for key, value in filters.items():
                  parts.append(f"{urllib.parse.quote(str(key), safe='')}={urllib.parse.quote(str(value), safe='().,:*')}")
              path = f"/rest/v1/{table}?" + "&".join(parts)
              http_json("DELETE", path, headers={"Prefer": "return=minimal"}, expect_json=False)

          def merge_store_row(discovered: dict, existing: dict):
              existing = existing or {}
              city_value = discovered.get("canonical_city") or choose_better_text(existing.get("city", ""), discovered.get("city", ""))
              store_type = choose_better_text(existing.get("store_type", ""), discovered.get("store_type", "")) or "chain"
              return {
                  "retailer": discovered.get("retailer") or existing.get("retailer"),
                  "store_id": discovered.get("store_id") or existing.get("store_id"),
                  "store_name": choose_better_text(existing.get("store_name", ""), discovered.get("store_name", "")),
                  "city": city_value,
                  "store_key": discovered.get("store_key") or existing.get("store_key"),
                  "address": choose_better_text(existing.get("address", ""), discovered.get("address", "")),
                  "area": choose_better_text(existing.get("area", ""), discovered.get("area", "")),
                  "store_type": store_type,
                  "mvp_active": bool(discovered.get("is_target")),
              }

          def best_from_candidates(existing_value: str, candidates):
              value = sanitize_optional_text(existing_value)
              for candidate in candidates:
                  value = choose_better_text(value, candidate)
              return sanitize_optional_text(value) or None

          def discover_stores():
              discovered = {}
              ambiguous = []
              parse_errors = []
              store_file_rows = []
              for path in iter_dump_paths():
                  if classify_dump_kind(path) != "store":
                      continue
                  file_ts = filename_timestamp(path)
                  try:
                      roots = load_xml_roots(path)
                  except Exception as exc:
                      parse_errors.append({"file": str(path), "error": str(exc)})
                      continue
                  for root in roots:
                      chain_id = extract_any(root, {"ChainId", "chainid"})
                      chain_name = extract_any(root, {"ChainName", "chainname"})
                      retailer = retailer_from(chain_id, chain_name)
                      if retailer not in TARGET_RETAILERS:
                          continue
                      for node in root.iter():
                          if localname(node.tag).lower() != "store":
                              continue
                          store_id_raw = extract_any(node, {"StoreId", "storeid"})
                          if not clean_text(store_id_raw):
                              continue
                          store_key = canonical_store_key(retailer, store_id_raw)
                          store_name = extract_any(node, {"StoreName", "storename"})
                          city_raw = extract_any(node, {"City", "city"})
                          address = extract_any(node, {"Address", "address"})
                          area = extract_any(node, {"Area", "area"})
                          store_type = extract_any(node, {"StoreType", "storetype"}) or "chain"
                          target_city, reasons = detect_city(
                              ("city", city_raw),
                              ("address", address),
                              ("store_name", store_name),
                          )
                          is_ambiguous = target_city is None and len({r.split(':', 1)[0] for r in reasons}) > 1 and len(reasons) > 1
                          if is_ambiguous:
                              ambiguous.append({
                                  "retailer": retailer,
                                  "store_key": store_key,
                                  "store_name": store_name,
                                  "city": city_raw,
                                  "address": address,
                                  "reason": " | ".join(reasons),
                              })
                          canonical_city = target_city or clean_text(city_raw)
                          row = {
                              "retailer": retailer,
                              "store_id": canonical_store_id(retailer, store_id_raw),
                              "store_name": store_name,
                              "city": clean_text(city_raw),
                              "canonical_city": canonical_city,
                              "store_key": store_key,
                              "address": address,
                              "area": area,
                              "store_type": store_type,
                              "is_target": target_city in TARGET_CITIES,
                              "target_city": target_city or "",
                              "source_file": str(path),
                              "source_ts": file_ts,
                          }
                          store_file_rows.append(row)
                          previous = discovered.get(store_key)
                          if previous is None:
                              discovered[store_key] = row
                          else:
                              discovered[store_key] = {
                                  **previous,
                                  "store_name": choose_better_text(previous.get("store_name", ""), store_name),
                                  "city": choose_better_text(previous.get("city", ""), clean_text(city_raw)),
                                  "canonical_city": target_city or choose_better_text(previous.get("canonical_city", ""), clean_text(city_raw)),
                                  "address": choose_better_text(previous.get("address", ""), address),
                                  "area": choose_better_text(previous.get("area", ""), area),
                                  "store_type": choose_better_text(previous.get("store_type", ""), store_type) or "chain",
                                  "is_target": previous.get("is_target", False) or (target_city in TARGET_CITIES),
                                  "target_city": previous.get("target_city") or target_city or "",
                                  "source_ts": max(previous.get("source_ts", file_ts), file_ts),
                                  "source_file": previous.get("source_file") if previous.get("source_ts", "") >= file_ts else str(path),
                              }
              return discovered, ambiguous, parse_errors, store_file_rows

          def select_latest_files(kind_expected: str, target_store_keys=None, allow_non_target=False):
              selected = {}
              diagnostics = []
              for path in iter_dump_paths():
                  kind = classify_dump_kind(path)
                  if kind != kind_expected:
                      continue
                  file_ts = filename_timestamp(path)
                  parsed_kind, chain_id, store_id = parse_filename_identity(path)
                  retailer = retailer_from(chain_id, "")
                  store_key = ""
                  if retailer and store_id:
                      store_key = canonical_store_key(retailer, store_id)
                  if not store_key:
                      try:
                          roots = load_xml_roots(path)
                      except Exception as exc:
                          diagnostics.append({"file": str(path), "error": str(exc)})
                          continue
                      root = roots[0] if roots else None
                      if root is None:
                          continue
                      chain_id = extract_any(root, {"ChainId", "chainid"})
                      chain_name = extract_any(root, {"ChainName", "chainname"})
                      retailer = retailer_from(chain_id, chain_name)
                      store_id = extract_any(root, {"StoreId", "storeid"})
                      if retailer and store_id:
                          store_key = canonical_store_key(retailer, store_id)
                  if not store_key:
                      diagnostics.append({"file": str(path), "error": "Could not resolve store_key"})
                      continue
                  if target_store_keys is not None and not allow_non_target and store_key not in target_store_keys:
                      continue
                  prev = selected.get(store_key)
                  priority = 2 if kind_expected.endswith("full") else 1
                  candidate = {
                      "path": path,
                      "store_key": store_key,
                      "timestamp": file_ts,
                      "priority": priority,
                  }
                  if prev is None or (candidate["timestamp"], candidate["priority"]) > (prev["timestamp"], prev["priority"]):
                      selected[store_key] = candidate
              return selected, diagnostics

          def parse_price_file(path: Path, store_key: str):
              items_by_key = {}
              product_candidates = defaultdict(lambda: defaultdict(list))
              parse_errors = []
              file_updated_candidates = []
              coverage = {
                  "store_key": store_key,
                  "valid_price_rows": 0,
                  "unique_barcodes": set(),
                  "name_present": 0,
                  "brand_present": 0,
                  "manufacturer_present": 0,
                  "category_present": 0,
              }
              try:
                  roots = load_xml_roots(path)
              except Exception as exc:
                  return None, None, coverage, [{"store_key": store_key, "file": str(path), "error": str(exc)}]
              for root in roots:
                  root_updated = parse_datetime_value(extract_any(root, {"PriceUpdateDate", "UpdateDate", "LastUpdateDate"}))
                  if root_updated:
                      file_updated_candidates.append(root_updated)
                  for node in root.iter():
                      if localname(node.tag).lower() not in {"item", "product"}:
                          continue
                      barcode = normalize_barcode(
                          extract_any(node, {"ItemCode", "Barcode", "GTIN", "EAN", "Code", "ItemId", "ItemNumber"})
                      )
                      if not looks_like_barcode(barcode):
                          continue
                      price = safe_decimal(
                          extract_any(node, {"ItemPrice", "Price", "UnitPrice", "PriceAfterDiscount", "PriceInclVat"})
                      )
                      if price is None:
                          continue
                      updated_at = parse_datetime_value(
                          extract_any(node, {"PriceUpdateDate", "UpdateDate", "LastUpdateDate"})
                      ) or root_updated or filename_timestamp(path)
                      item_name = extract_any(node, {"ItemName", "ItemNm", "ProductName", "Description", "ItemDescription"})
                      brand = extract_any(node, {"BrandName", "Brand", "BrandNm", "BrandDescription", "BrandDesc", "TradeMark", "Trademark", "BrandHebrewName", "BrandEngName", "ItemBrand", "BrandLabel", "BrandLongName", "BrandShortName", "BrandTitle"})
                      manufacturer = extract_any(node, {"ManufacturerName", "ManufactureName", "Manufacturer", "Manufacture", "ManufactorerName", "Manufactorer", "ManufacturerDesc", "ManufactureDesc", "SupplierName", "Supplier", "SupplierNm", "SupplierHebName", "SupplierEngName", "ProducerName", "VendorName", "VendorNm", "CompanyName", "ImporterName", "Importer", "ManufacturerHebName", "ManufacturerEngName"})
                      category = extract_any(node, {"MainCategoryName", "Category", "DepartmentName", "SubCategoryName", "ItemCategory", "MainCategory", "SubCategory", "CategoryName", "Department", "SubDepartmentName", "DepartmentNm", "SubDepartment", "FamilyName", "FamilyNm", "GroupName", "SubGroupName", "ItemType", "ItemTypeName", "CategoryNm", "SectionName", "PrimaryCategoryName"})
                      item_name = sanitize_optional_text(item_name)
                      brand = sanitize_optional_text(brand)
                      manufacturer = sanitize_optional_text(manufacturer)
                      category = sanitize_optional_text(category)
                      if not brand:
                          brand = fallback_brand_from_name_or_manufacturer(item_name, manufacturer)
                      price_key = f"{barcode}:{store_key}"
                      existing = items_by_key.get(price_key)
                      if existing is None or (updated_at, len(clean_text(item_name))) > (existing["updated_at"], len(clean_text(existing.get("_name_candidate", "")))):
                          items_by_key[price_key] = {
                              "price_key": price_key,
                              "barcode": barcode,
                              "store_key": store_key,
                              "price": price,
                              "updated_at": updated_at,
                              "last_seen_at": RUN_TS_ISO,
                              "_name_candidate": item_name,
                          }
                      coverage["valid_price_rows"] += 1
                      coverage["unique_barcodes"].add(barcode)
                      if clean_text(item_name) and not text_is_placeholder(item_name):
                          coverage["name_present"] += 1
                      if clean_text(brand) and not text_is_placeholder(brand):
                          coverage["brand_present"] += 1
                      if clean_text(manufacturer) and not text_is_placeholder(manufacturer):
                          coverage["manufacturer_present"] += 1
                      if clean_text(category) and not text_is_placeholder(category):
                          coverage["category_present"] += 1
                      product_candidates[barcode]["name"].append(item_name)
                      product_candidates[barcode]["brand"].append(brand)
                      product_candidates[barcode]["manufacturer"].append(manufacturer)
                      product_candidates[barcode]["category"].append(category)
              items = list(items_by_key.values())
              for item in items:
                  item.pop("_name_candidate", None)
              coverage["unique_barcodes"] = len(coverage["unique_barcodes"])
              return items, product_candidates, coverage, parse_errors

          def parse_promo_file(path: Path, store_key: str):
              promo_headers = {}
              promo_items = {}
              parse_errors = []
              try:
                  roots = load_xml_roots(path)
              except Exception as exc:
                  return None, None, [{"store_key": store_key, "file": str(path), "error": str(exc)}]
              for root in roots:
                  for node in root.iter():
                      tag = localname(node.tag).lower()
                      if tag not in {"promotion", "sale", "deal", "discount"}:
                          continue
                      tag_values = collect_tag_values(node)
                      barcodes = []
                      for child in node.iter():
                          child_tag = localname(child.tag).lower()
                          child_text = clean_text(child.text)
                          if child_tag in {"itemcode", "itembarcode", "barcode", "ean", "gtin"} and looks_like_barcode(child_text):
                              barcodes.append(normalize_barcode(child_text))
                      if not barcodes:
                          continue
                      source_promotion_id = (
                          tag_values.get("PromotionId")
                          or tag_values.get("PromotionID")
                          or tag_values.get("PromoId")
                          or tag_values.get("DealId")
                          or tag_values.get("SaleId")
                          or ""
                      )
                      title = (
                          tag_values.get("PromotionDescription")
                          or tag_values.get("PromotionName")
                          or tag_values.get("Description")
                          or tag_values.get("Name")
                          or ""
                      )
                      description = (
                          tag_values.get("AdditionalRemarks")
                          or tag_values.get("Remarks")
                          or tag_values.get("Comment")
                          or ""
                      )
                      benefit_text = (
                          tag_values.get("RewardDescription")
                          or tag_values.get("BenefitDescription")
                          or tag_values.get("DiscountRate")
                          or ""
                      )
                      club_name = tag_values.get("ClubName") or tag_values.get("CustomerClub") or ""
                      is_club = False
                      club_markers = [
                          club_name,
                          tag_values.get("AllowClub"),
                          tag_values.get("IsClub"),
                          title,
                          description,
                          benefit_text,
                      ]
                      for marker in club_markers:
                          marker_text = clean_text(marker).lower()
                          if marker_text in {"1", "true", "yes"} or "מועדון" in marker_text or "club" in marker_text:
                              is_club = True
                              break
                      start_at = parse_datetime_value(
                          tag_values.get("PromotionStartDate") or tag_values.get("StartDate") or tag_values.get("Start") or ""
                      )
                      end_at = parse_datetime_value(
                          tag_values.get("PromotionEndDate") or tag_values.get("EndDate") or tag_values.get("End") or ""
                      )
                      promotion_type = normalize_promotion_type(title, description, benefit_text, is_club)
                      key_basis = "|".join([
                          store_key,
                          source_promotion_id,
                          clean_text(title),
                          clean_text(description),
                          clean_text(benefit_text),
                          start_at or "",
                          end_at or "",
                      ])
                      promotion_key = sha1_text(key_basis)
                      promo_headers[promotion_key] = {
                          "promotion_key": promotion_key,
                          "store_key": store_key,
                          "source_promotion_id": source_promotion_id or None,
                          "title": clean_text(title) or None,
                          "description": clean_text(description) or None,
                          "promotion_type": promotion_type,
                          "benefit_text": clean_text(benefit_text) or None,
                          "is_club": is_club,
                          "club_name": clean_text(club_name) or None,
                          "start_at": start_at,
                          "end_at": end_at,
                          "updated_at": RUN_TS_ISO,
                          "last_seen_at": RUN_TS_ISO,
                          "raw_payload": tag_values,
                      }
                      for barcode in sorted(set(barcodes)):
                          promotion_item_key = sha1_text(f"{promotion_key}|{barcode}")
                          promo_items[promotion_item_key] = {
                              "promotion_item_key": promotion_item_key,
                              "promotion_key": promotion_key,
                              "barcode": barcode,
                              "updated_at": RUN_TS_ISO,
                              "last_seen_at": RUN_TS_ISO,
                              "raw_payload": {"barcode": barcode},
                          }
              return list(promo_headers.values()), list(promo_items.values()), parse_errors

          discovered_stores_map, ambiguous_rows, store_parse_errors, store_file_rows = discover_stores()

          existing_target_chain_rows = fetch_existing_target_chain_stores()
          existing_target_chain_by_key = {row["store_key"]: row for row in existing_target_chain_rows}
          legacy_store_key_aliases = {}
          unresolved_existing_target_rows = []
          auto_deactivated_existing_target_rows = []

          for row in existing_target_chain_rows:
              raw_key = clean_text(row.get("store_key", ""))
              row_retailer = clean_text(row.get("retailer", ""))
              if not raw_key or row_retailer not in TARGET_RETAILERS:
                  continue
              raw_key_retailer, raw_key_store_id = split_store_key(raw_key)
              row_store_id = row.get("store_id", "") or raw_key_store_id
              canonical_key = canonical_store_key(row_retailer, row_store_id)
              if raw_key_retailer == row_retailer and raw_key != canonical_key and canonical_key in discovered_stores_map:
                  legacy_store_key_aliases[raw_key] = canonical_key
              if row.get("mvp_active") and canonical_key not in discovered_stores_map:
                  unresolved_existing_target_rows.append({
                      "store_key": raw_key,
                      "retailer": row.get("retailer", ""),
                      "store_id": row.get("store_id", ""),
                      "store_name": row.get("store_name", ""),
                      "city": row.get("city", ""),
                      "address": row.get("address", ""),
                      "target_city_hint": "",
                      "reason": "existing_mvp_active_store_not_found_in_latest_store_files",
                  })

          def select_existing_store_for_discovered(discovered_key: str):
              exact = existing_target_chain_by_key.get(discovered_key)
              if exact:
                  return exact
              for alias_key in equivalent_store_keys(discovered_key):
                  candidate = existing_target_chain_by_key.get(alias_key)
                  if candidate:
                      if alias_key != discovered_key:
                          legacy_store_key_aliases.setdefault(alias_key, discovered_key)
                      return candidate
              return None

          target_validation_failures = []
          for row in discovered_stores_map.values():
              detected_city, detected_reasons, is_valid_target = validate_target_assignment(row)
              row["validation_detected_city"] = detected_city or ""
              row["validation_reasons"] = " | ".join(detected_reasons)
              if row.get("is_target") and not is_valid_target:
                  target_validation_failures.append({
                      "store_key": row.get("store_key", ""),
                      "retailer": row.get("retailer", ""),
                      "store_name": row.get("store_name", ""),
                      "city": row.get("city", ""),
                      "canonical_city": row.get("canonical_city", ""),
                      "address": row.get("address", ""),
                      "validation_detected_city": detected_city or "",
                      "validation_reasons": " | ".join(detected_reasons),
                      "reason": "target_city_not_supported_by_source_fields",
                  })
                  row["is_target"] = False
                  row["target_city"] = ""
                  row["canonical_city"] = clean_text(row.get("city", "")) or clean_text(row.get("store_name", ""))

          discovered_store_keys = set(discovered_stores_map.keys())
          discovered_target_stores = [row for row in discovered_stores_map.values() if row.get("is_target")]
          discovered_non_target_stores = [row for row in discovered_stores_map.values() if not row.get("is_target")]
          target_store_keys = {row["store_key"] for row in discovered_target_stores}
          non_target_store_keys = {row["store_key"] for row in discovered_non_target_stores}
          legacy_store_keys_to_deactivate = set(legacy_store_key_aliases.keys())

          if not discovered_target_stores:
              raise SystemExit("No target stores were discovered from STORE files after source-only target validation. Aborting.")

          by_retailer = Counter(row["retailer"] for row in discovered_target_stores)
          missing_retailers = [ret for ret in TARGET_RETAILERS if by_retailer.get(ret, 0) == 0]
          if missing_retailers:
              raise SystemExit(f"No target stores discovered for retailers: {', '.join(missing_retailers)}")

          discovered_target_city_set = {row["canonical_city"] for row in discovered_target_stores if row.get("canonical_city") in TARGET_CITIES}
          missing_target_cities = sorted(set(TARGET_CITIES) - discovered_target_city_set)
          if missing_target_cities:
              raise SystemExit(f"No target stores discovered for target cities: {', '.join(missing_target_cities)}")

          write_csv(
              OUT_DIR / "stores_discovered.csv",
              sorted(discovered_stores_map.values(), key=lambda x: (x["retailer"], x["canonical_city"], x["store_key"])),
              ["retailer", "store_id", "store_key", "store_name", "city", "canonical_city", "address", "area", "store_type", "is_target", "source_file", "source_ts"],
          )
          write_csv(
              OUT_DIR / "target_stores.csv",
              sorted(discovered_target_stores, key=lambda x: (x["canonical_city"], x["retailer"], x["store_key"])),
              ["retailer", "store_id", "store_key", "store_name", "canonical_city", "address", "source_file"],
          )
          write_csv(
              OUT_DIR / "non_target_stores.csv",
              sorted(discovered_non_target_stores, key=lambda x: (x["retailer"], x["canonical_city"], x["store_key"])),
              ["retailer", "store_id", "store_key", "store_name", "canonical_city", "address", "source_file"],
          )
          write_csv(
              OUT_DIR / "ambiguous_city_matches.csv",
              ambiguous_rows,
              ["retailer", "store_key", "store_name", "city", "address", "reason"],
          )
          write_csv(
              OUT_DIR / "legacy_store_key_aliases.csv",
              [
                  {
                      "legacy_store_key": old_key,
                      "canonical_store_key": new_key,
                  }
                  for old_key, new_key in sorted(legacy_store_key_aliases.items())
              ],
              ["legacy_store_key", "canonical_store_key"],
          )
          write_csv(
              OUT_DIR / "unresolved_existing_target_rows.csv",
              unresolved_existing_target_rows,
              ["store_key", "retailer", "store_id", "store_name", "city", "address", "target_city_hint", "reason"],
          )
          write_csv(
              OUT_DIR / "target_validation_failures.csv",
              target_validation_failures,
              ["store_key", "retailer", "store_name", "city", "canonical_city", "address", "validation_detected_city", "validation_reasons", "reason"],
          )

          price_file_map, price_file_diagnostics = select_latest_files("price_full", target_store_keys=target_store_keys)
          missing_price_store_keys = sorted(target_store_keys - set(price_file_map.keys()))
          write_csv(
              OUT_DIR / "missing_price_files.csv",
              [
                  {
                      "store_key": key,
                      "retailer": discovered_stores_map[key]["retailer"],
                      "store_name": discovered_stores_map[key]["store_name"],
                      "city": discovered_stores_map[key]["canonical_city"],
                  }
                  for key in missing_price_store_keys
              ],
              ["store_key", "retailer", "store_name", "city"],
          )

          promo_full_map, promo_full_diag = select_latest_files("promo_full", target_store_keys=target_store_keys)
          promo_partial_map, promo_partial_diag = select_latest_files("promo", target_store_keys=target_store_keys)
          promo_file_map = {}
          for store_key in target_store_keys:
              if store_key in promo_full_map:
                  promo_file_map[store_key] = promo_full_map[store_key]
              elif store_key in promo_partial_map:
                  promo_file_map[store_key] = promo_partial_map[store_key]
          missing_promo_store_keys = sorted(target_store_keys - set(promo_file_map.keys()))

          stores_payload = [
              merge_store_row(discovered_stores_map[key], select_existing_store_for_discovered(key))
              for key in sorted(discovered_store_keys)
          ]
          for legacy_key in sorted(legacy_store_keys_to_deactivate):
              existing_row = existing_target_chain_by_key.get(legacy_key)
              if not existing_row:
                  continue
              stores_payload.append({
                  "retailer": existing_row.get("retailer"),
                  "store_id": existing_row.get("store_id"),
                  "store_name": existing_row.get("store_name"),
                  "city": existing_row.get("city"),
                  "store_key": existing_row.get("store_key"),
                  "address": existing_row.get("address"),
                  "area": existing_row.get("area"),
                  "store_type": existing_row.get("store_type") or "chain",
                  "mvp_active": False,
              })

          prices_payload = []
          successful_price_store_keys = []
          failed_price_store_rows = []
          products_candidates = defaultdict(lambda: defaultdict(list))
          prices_summary_rows = []
          price_store_coverage_rows = []
          price_parse_errors = list(price_file_diagnostics)

          for store_key in sorted(target_store_keys):
              selection = price_file_map.get(store_key)
              if not selection:
                  continue
              items, product_candidates, coverage, parse_errors = parse_price_file(selection["path"], store_key)
              price_parse_errors.extend(parse_errors)
              if parse_errors or items is None or not items:
                  price_store_coverage_rows.append({
                      "store_key": store_key,
                      "retailer": discovered_stores_map[store_key]["retailer"],
                      "store_name": discovered_stores_map[store_key]["store_name"],
                      "city": discovered_stores_map[store_key]["canonical_city"],
                      "valid_price_rows": coverage.get("valid_price_rows", 0),
                      "unique_barcodes": coverage.get("unique_barcodes", 0),
                      "name_present": coverage.get("name_present", 0),
                      "brand_present": coverage.get("brand_present", 0),
                      "manufacturer_present": coverage.get("manufacturer_present", 0),
                      "category_present": coverage.get("category_present", 0),
                      "pct_name": 0,
                      "pct_brand": 0,
                      "pct_manufacturer": 0,
                      "pct_category": 0,
                      "source_file": str(selection["path"]),
                      "source_ts": selection["timestamp"],
                  })
                  failed_price_store_rows.append({
                      "store_key": store_key,
                      "retailer": discovered_stores_map[store_key]["retailer"],
                      "store_name": discovered_stores_map[store_key]["store_name"],
                      "city": discovered_stores_map[store_key]["canonical_city"],
                      "source_file": str(selection["path"]),
                      "source_ts": selection["timestamp"],
                      "error": "; ".join(err.get("error", "parse failure") for err in (parse_errors or [{"error": "zero valid items"}])),
                  })
                  continue
              prices_payload.extend(items)
              successful_price_store_keys.append(store_key)
              for barcode, fields in product_candidates.items():
                  for field_name, values in fields.items():
                      products_candidates[barcode][field_name].extend(values)
              def pct(n, d):
                  return round((100.0 * n / d), 2) if d else 0.0
              price_store_coverage_rows.append({
                  "store_key": store_key,
                  "retailer": discovered_stores_map[store_key]["retailer"],
                  "store_name": discovered_stores_map[store_key]["store_name"],
                  "city": discovered_stores_map[store_key]["canonical_city"],
                  "valid_price_rows": coverage.get("valid_price_rows", 0),
                  "unique_barcodes": coverage.get("unique_barcodes", 0),
                  "name_present": coverage.get("name_present", 0),
                  "brand_present": coverage.get("brand_present", 0),
                  "manufacturer_present": coverage.get("manufacturer_present", 0),
                  "category_present": coverage.get("category_present", 0),
                  "pct_name": pct(coverage.get("name_present", 0), coverage.get("valid_price_rows", 0)),
                  "pct_brand": pct(coverage.get("brand_present", 0), coverage.get("valid_price_rows", 0)),
                  "pct_manufacturer": pct(coverage.get("manufacturer_present", 0), coverage.get("valid_price_rows", 0)),
                  "pct_category": pct(coverage.get("category_present", 0), coverage.get("valid_price_rows", 0)),
                  "source_file": str(selection["path"]),
                  "source_ts": selection["timestamp"],
              })
              prices_summary_rows.append({
                  "store_key": store_key,
                  "retailer": discovered_stores_map[store_key]["retailer"],
                  "store_name": discovered_stores_map[store_key]["store_name"],
                  "city": discovered_stores_map[store_key]["canonical_city"],
                  "items_count": len(items),
                  "source_file": str(selection["path"]),
                  "source_ts": selection["timestamp"],
              })

          write_csv(
              OUT_DIR / "failed_price_files.csv",
              failed_price_store_rows,
              ["store_key", "retailer", "store_name", "city", "source_file", "source_ts", "error"],
          )

          if not successful_price_store_keys:
              raise SystemExit("No target stores produced valid price payloads. Aborting before DB write.")

          price_success_by_retailer = Counter(discovered_stores_map[key]["retailer"] for key in successful_price_store_keys)
          missing_price_retailers = [ret for ret in TARGET_RETAILERS if price_success_by_retailer.get(ret, 0) == 0]
          if missing_price_retailers:
              raise SystemExit("No valid price payloads were produced for retailers: " + ", ".join(missing_price_retailers))

          all_barcodes = sorted(products_candidates.keys())
          existing_products = fetch_existing_products(all_barcodes)
          products_payload = []
          for barcode in all_barcodes:
              existing = existing_products.get(barcode, {})
              fields = products_candidates[barcode]
              name_value = best_from_candidates(existing.get("name", ""), fields.get("name", []))
              manufacturer_value = best_from_candidates(existing.get("manufacturer", ""), fields.get("manufacturer", []))
              brand_value = best_from_candidates(existing.get("brand", ""), fields.get("brand", []))
              category_value = best_from_candidates(existing.get("category", ""), fields.get("category", []))
              if not brand_value:
                  brand_value = fallback_brand_from_name_or_manufacturer(name_value or "", manufacturer_value or "") or None
              products_payload.append(compact_row(scrub_product_row({
                  "barcode": barcode,
                  "name": name_value,
                  "category": category_value,
                  "brand": brand_value,
                  "manufacturer": manufacturer_value,
              }), required_keys={"barcode"}))

          promotions_payload = []
          promotion_items_payload = []
          successful_promo_store_keys = []
          failed_promo_store_rows = []
          processed_promotion_keys = set()
          promotions_summary_rows = []
          promo_parse_errors = price_parse_errors[:0] + list(promo_full_diag) + list(promo_partial_diag)

          for store_key in sorted(target_store_keys):
              selection = promo_file_map.get(store_key)
              if not selection:
                  continue
              promo_headers, promo_items, parse_errors = parse_promo_file(selection["path"], store_key)
              promo_parse_errors.extend(parse_errors)
              if parse_errors or promo_headers is None:
                  failed_promo_store_rows.append({
                      "store_key": store_key,
                      "retailer": discovered_stores_map[store_key]["retailer"],
                      "store_name": discovered_stores_map[store_key]["store_name"],
                      "city": discovered_stores_map[store_key]["canonical_city"],
                      "source_file": str(selection["path"]),
                      "source_ts": selection["timestamp"],
                      "error": "; ".join(err.get("error", "parse failure") for err in (parse_errors or [{"error": "promo parse failure"}])),
                  })
                  continue
              promotions_payload.extend(promo_headers)
              promotion_items_payload.extend(promo_items)
              processed_promotion_keys.update(row["promotion_key"] for row in promo_headers)
              successful_promo_store_keys.append(store_key)
              promotions_summary_rows.append({
                  "store_key": store_key,
                  "retailer": discovered_stores_map[store_key]["retailer"],
                  "store_name": discovered_stores_map[store_key]["store_name"],
                  "city": discovered_stores_map[store_key]["canonical_city"],
                  "promotions_count": len(promo_headers),
                  "promotion_items_count": len(promo_items),
                  "source_file": str(selection["path"]),
                  "source_ts": selection["timestamp"],
              })

          def assert_unique(rows, key_name, table_name):
              seen = set()
              duplicates = []
              for row in rows:
                  key = row[key_name]
                  if key in seen:
                      duplicates.append(key)
                  seen.add(key)
              if duplicates:
                  raise SystemExit(f"Duplicate {key_name} values in {table_name}: {duplicates[:20]}")

          assert_unique(products_payload, "barcode", "products")
          assert_unique(stores_payload, "store_key", "stores")
          assert_unique(prices_payload, "price_key", "prices_current")
          assert_unique(promotions_payload, "promotion_key", "promotions_current")
          assert_unique(promotion_items_payload, "promotion_item_key", "promotion_items_current")

          write_csv(
              OUT_DIR / "prices_summary_by_store.csv",
              prices_summary_rows,
              ["store_key", "retailer", "store_name", "city", "items_count", "source_file", "source_ts"],
          )
          write_csv(
              OUT_DIR / "missing_promo_files.csv",
              [
                  {
                      "store_key": key,
                      "retailer": discovered_stores_map[key]["retailer"],
                      "store_name": discovered_stores_map[key]["store_name"],
                      "city": discovered_stores_map[key]["canonical_city"],
                  }
                  for key in missing_promo_store_keys
              ],
              ["store_key", "retailer", "store_name", "city"],
          )
          write_csv(
              OUT_DIR / "promotions_summary_by_store.csv",
              promotions_summary_rows,
              ["store_key", "retailer", "store_name", "city", "promotions_count", "promotion_items_count", "source_file", "source_ts"],
          )
          write_csv(
              OUT_DIR / "failed_promo_files.csv",
              failed_promo_store_rows,
              ["store_key", "retailer", "store_name", "city", "source_file", "source_ts", "error"],
          )
          write_csv(
              OUT_DIR / "product_field_coverage_by_store.csv",
              price_store_coverage_rows,
              ["store_key", "retailer", "store_name", "city", "valid_price_rows", "unique_barcodes", "name_present", "brand_present", "manufacturer_present", "category_present", "pct_name", "pct_brand", "pct_manufacturer", "pct_category", "source_file", "source_ts"],
          )

          target_coverage_by_store_rows = build_target_coverage_by_store_rows(
              discovered_target_stores,
              successful_price_store_keys,
              successful_promo_store_keys,
              missing_price_store_keys,
              missing_promo_store_keys,
          )
          target_coverage_by_city_retailer_rows = summarize_target_coverage_by_city_retailer(
              discovered_target_stores,
              successful_price_store_keys,
              successful_promo_store_keys,
          )
          write_csv(
              OUT_DIR / "target_coverage_by_store.csv",
              target_coverage_by_store_rows,
              ["store_key", "retailer", "store_name", "city", "has_price_payload", "has_promo_payload", "missing_price_file", "missing_promo_file"],
          )
          write_csv(
              OUT_DIR / "target_coverage_by_city_retailer.csv",
              target_coverage_by_city_retailer_rows,
              ["city", "retailer", "target_stores", "price_payload_stores", "promo_payload_stores", "full_price_coverage", "full_promo_coverage"],
          )

          target_store_key_set = set(target_store_keys)
          price_store_key_set = set(successful_price_store_keys)
          promo_store_key_set = set(successful_promo_store_keys)
          coverage_store_key_set = {row["store_key"] for row in price_store_coverage_rows if row.get("valid_price_rows", 0) > 0}
          store_set_consistency = {
              "target_store_count": len(target_store_key_set),
              "target_city_count": len(discovered_target_city_set),
              "target_city_coverage": sorted(discovered_target_city_set),
              "target_missing_cities": missing_target_cities,
              "price_store_count": len(price_store_key_set),
              "promo_store_count": len(promo_store_key_set),
              "coverage_store_count": len(coverage_store_key_set),
              "target_missing_in_prices": sorted(target_store_key_set - price_store_key_set),
              "target_missing_in_promotions": sorted(target_store_key_set - promo_store_key_set),
              "target_missing_in_coverage": sorted(target_store_key_set - coverage_store_key_set),
              "price_not_in_target": sorted(price_store_key_set - target_store_key_set),
              "promo_not_in_target": sorted(promo_store_key_set - target_store_key_set),
              "coverage_not_in_target": sorted(coverage_store_key_set - target_store_key_set),
          }
          store_set_consistency_ok = all(not store_set_consistency[key] for key in [
              "target_missing_cities",
              "target_missing_in_prices",
              "target_missing_in_promotions",
              "target_missing_in_coverage",
              "price_not_in_target",
              "promo_not_in_target",
              "coverage_not_in_target",
          ])
          store_set_consistency["store_set_consistency_ok"] = store_set_consistency_ok
          write_json(OUT_DIR / "store_set_consistency.json", store_set_consistency)

          product_payload_coverage = {
              "products_payload": len(products_payload),
              "name_present": sum(1 for row in products_payload if sanitize_optional_text(row.get("name"))),
              "brand_present": sum(1 for row in products_payload if sanitize_optional_text(row.get("brand"))),
              "manufacturer_present": sum(1 for row in products_payload if sanitize_optional_text(row.get("manufacturer"))),
              "category_present": sum(1 for row in products_payload if sanitize_optional_text(row.get("category"))),
              "company_or_brand_present": sum(1 for row in products_payload if sanitize_optional_text(row.get("brand")) or sanitize_optional_text(row.get("manufacturer"))),
          }
          for key in ["name_present", "brand_present", "manufacturer_present", "category_present", "company_or_brand_present"]:
              product_payload_coverage[f"pct_{key.replace('_present','')}"] = round((100.0 * product_payload_coverage[key] / product_payload_coverage["products_payload"]), 2) if product_payload_coverage["products_payload"] else 0.0
          placeholder_leak_summary, placeholder_leak_examples = collect_product_placeholder_leaks(products_payload)
          write_json(OUT_DIR / "product_payload_coverage.json", product_payload_coverage)
          write_json(OUT_DIR / "product_placeholder_leak_summary.json", dict(placeholder_leak_summary))
          write_csv(
              OUT_DIR / "product_placeholder_leak_examples.csv",
              placeholder_leak_examples,
              ["barcode", "field", "value"],
          )

          minimum_company_or_brand_pct = 85.0
          minimum_manufacturer_pct = 70.0
          minimum_category_pct = 70.0
          minimum_name_pct_hard = 99.0
          required_product_coverage_keys = {
              "products_payload",
              "name_present",
              "brand_present",
              "manufacturer_present",
              "category_present",
              "company_or_brand_present",
              "pct_name",
              "pct_brand",
              "pct_manufacturer",
              "pct_category",
              "pct_company_or_brand",
          }
          product_hard_quality_ok = (
              product_payload_coverage.get("pct_name", 0) >= minimum_name_pct_hard
              and product_payload_coverage.get("pct_category", 0) >= minimum_category_pct
              and not placeholder_leak_summary
          )
          product_enrichment_quality_ok = (
              product_payload_coverage.get("pct_company_or_brand", 0) >= minimum_company_or_brand_pct
              and product_payload_coverage.get("pct_manufacturer", 0) >= minimum_manufacturer_pct
              and product_payload_coverage.get("pct_category", 0) >= minimum_category_pct
              and not placeholder_leak_summary
          )
          write_json(OUT_DIR / "product_quality_gate.json", {
              "minimum_name_pct_hard": minimum_name_pct_hard,
              "minimum_company_or_brand_pct": minimum_company_or_brand_pct,
              "minimum_manufacturer_pct": minimum_manufacturer_pct,
              "minimum_category_pct": minimum_category_pct,
              "actual_name_pct": product_payload_coverage.get("pct_name", 0),
              "actual_company_or_brand_pct": product_payload_coverage.get("pct_company_or_brand", 0),
              "actual_manufacturer_pct": product_payload_coverage.get("pct_manufacturer", 0),
              "actual_category_pct": product_payload_coverage.get("pct_category", 0),
              "placeholder_leak_entries": sum(placeholder_leak_summary.values()),
              "product_hard_quality_ok": product_hard_quality_ok,
              "product_enrichment_quality_ok": product_enrichment_quality_ok,
              "product_quality_ok": product_enrichment_quality_ok,
          })

          price_summary_store_key_set = {row["store_key"] for row in prices_summary_rows}
          promo_summary_store_key_set = {row["store_key"] for row in promotions_summary_rows}
          coverage_all_store_key_set = {row["store_key"] for row in price_store_coverage_rows}
          artifact_self_check = {
              "required_product_coverage_keys_present": required_product_coverage_keys.issubset(set(product_payload_coverage.keys())),
              "all_target_cities_present": not missing_target_cities,
              "price_summary_matches_successful_prices": price_summary_store_key_set == price_store_key_set,
              "promo_summary_matches_successful_promotions": promo_summary_store_key_set == promo_store_key_set,
              "coverage_rows_match_successful_prices": coverage_all_store_key_set == price_store_key_set,
              "target_coverage_rows_match_target_store_count": len(target_coverage_by_store_rows) == len(target_store_key_set),
              "product_placeholder_leaks_absent": not placeholder_leak_summary,
              "store_parse_errors_absent": not store_parse_errors,
          }
          artifact_self_check["artifact_self_check_ok"] = all(artifact_self_check.values())
          write_json(OUT_DIR / "artifact_self_check.json", artifact_self_check)

          strict_target_coverage_ok = not missing_price_store_keys and not failed_price_store_rows and not missing_promo_store_keys and not failed_promo_store_rows
          covered_target_store_keys = sorted(target_store_key_set & price_store_key_set & promo_store_key_set)
          uncovered_target_store_keys = sorted(target_store_key_set - set(covered_target_store_keys))
          covered_target_city_set = {discovered_stores_map[key]["canonical_city"] for key in covered_target_store_keys}
          covered_target_retailer_set = {discovered_stores_map[key]["retailer"] for key in covered_target_store_keys}
          missing_covered_target_cities = sorted(set(TARGET_CITIES) - covered_target_city_set)
          missing_covered_target_retailers = sorted(set(TARGET_RETAILERS) - covered_target_retailer_set)
          write_scope_ok = bool(covered_target_store_keys) and not target_validation_failures and not missing_covered_target_cities and not missing_covered_target_retailers and artifact_self_check["artifact_self_check_ok"] and product_hard_quality_ok
          write_mode = "full" if (strict_target_coverage_ok and store_set_consistency_ok and product_enrichment_quality_ok and write_scope_ok) else ("partial_safe" if write_scope_ok else "blocked")
          if write_mode == "full":
              for unresolved_row in unresolved_existing_target_rows:
                  auto_deactivated_existing_target_rows.append({
                      "store_key": unresolved_row.get("store_key"),
                      "retailer": unresolved_row.get("retailer"),
                      "store_id": unresolved_row.get("store_id"),
                      "store_name": unresolved_row.get("store_name"),
                      "city": unresolved_row.get("city"),
                      "address": unresolved_row.get("address"),
                      "target_city_hint": unresolved_row.get("target_city_hint"),
                      "reason": unresolved_row.get("reason"),
                  })
                  stores_payload.append({
                      "retailer": unresolved_row.get("retailer"),
                      "store_id": unresolved_row.get("store_id"),
                      "store_name": unresolved_row.get("store_name"),
                      "city": unresolved_row.get("city"),
                      "store_key": unresolved_row.get("store_key"),
                      "address": unresolved_row.get("address"),
                      "area": existing_target_chain_by_key.get(unresolved_row.get("store_key"), {}).get("area"),
                      "store_type": existing_target_chain_by_key.get(unresolved_row.get("store_key"), {}).get("store_type") or "chain",
                      "mvp_active": False,
                  })
          write_csv(
              OUT_DIR / "auto_deactivated_existing_target_rows.csv",
              auto_deactivated_existing_target_rows,
              ["store_key", "retailer", "store_id", "store_name", "city", "address", "target_city_hint", "reason"],
          )
          uncovered_target_rows = []
          for store_key in uncovered_target_store_keys:
              row = discovered_stores_map[store_key]
              uncovered_target_rows.append({
                  "store_key": store_key,
                  "retailer": row["retailer"],
                  "store_name": row["store_name"],
                  "city": row["canonical_city"],
                  "missing_price_file": store_key in missing_price_store_keys,
                  "missing_promo_file": store_key in missing_promo_store_keys,
                  "has_price_payload": store_key in price_store_key_set,
                  "has_promo_payload": store_key in promo_store_key_set,
              })
          write_csv(
              OUT_DIR / "uncovered_target_stores.csv",
              uncovered_target_rows,
              ["store_key", "retailer", "store_name", "city", "missing_price_file", "missing_promo_file", "has_price_payload", "has_promo_payload"],
          )
          write_json(OUT_DIR / "db_write_decision.json", {
              "write_mode": write_mode,
              "strict_target_coverage_ok": strict_target_coverage_ok,
              "store_set_consistency_ok": store_set_consistency_ok,
              "artifact_self_check_ok": artifact_self_check["artifact_self_check_ok"],
              "product_hard_quality_ok": product_hard_quality_ok,
              "product_enrichment_quality_ok": product_enrichment_quality_ok,
              "covered_target_store_count": len(covered_target_store_keys),
              "uncovered_target_store_count": len(uncovered_target_store_keys),
              "missing_covered_target_cities": missing_covered_target_cities,
              "missing_covered_target_retailers": missing_covered_target_retailers,
              "ready_for_db_write": write_scope_ok,
          })

          payload_counts = {
              "run_ts": RUN_TS_ISO,
              "write_to_supabase": WRITE_TO_SUPABASE,
              "stores_discovered": len(discovered_stores_map),
              "target_stores": len(discovered_target_stores),
              "non_target_stores": len(discovered_non_target_stores),
              "products_payload": len(products_payload),
              "prices_payload": len(prices_payload),
              "promotions_payload": len(promotions_payload),
              "promotion_items_payload": len(promotion_items_payload),
              "successful_price_store_keys": len(successful_price_store_keys),
              "successful_promo_store_keys": len(successful_promo_store_keys),
              "missing_price_store_keys": len(missing_price_store_keys),
              "missing_promo_store_keys": len(missing_promo_store_keys),
              "failed_promo_store_rows": len(failed_promo_store_rows),
              "legacy_store_key_aliases": len(legacy_store_key_aliases),
              "unresolved_existing_target_rows": len(unresolved_existing_target_rows),
              "auto_deactivated_existing_target_rows": len(auto_deactivated_existing_target_rows),
              "target_validation_failures": len(target_validation_failures),
              "missing_target_cities": len(missing_target_cities),
              "store_set_consistency_ok": store_set_consistency_ok,
              "artifact_self_check_ok": artifact_self_check["artifact_self_check_ok"],
              "strict_target_coverage_ok": strict_target_coverage_ok,
              "covered_target_store_keys": len(covered_target_store_keys),
              "uncovered_target_store_keys": len(uncovered_target_store_keys),
              "missing_covered_target_cities": len(missing_covered_target_cities),
              "missing_covered_target_retailers": len(missing_covered_target_retailers),
              "product_hard_quality_ok": product_hard_quality_ok,
              "product_enrichment_quality_ok": product_enrichment_quality_ok,
              "ready_for_db_write": write_scope_ok,
              "write_mode": write_mode,
              "product_company_or_brand_pct": product_payload_coverage.get("pct_company_or_brand", 0),
          }
          write_json(OUT_DIR / "db_payload_counts.json", payload_counts)
          write_json(OUT_DIR / "run_summary.json", {
              **payload_counts,
              "store_parse_errors": store_parse_errors,
              "price_parse_errors": price_parse_errors,
              "promo_parse_errors": promo_parse_errors,
          })
          write_json(OUT_DIR / "products_upsert.json", products_payload)
          write_json(OUT_DIR / "stores_upsert.json", stores_payload)
          write_json(OUT_DIR / "prices_upsert.json", prices_payload)
          write_json(OUT_DIR / "promotions_upsert.json", promotions_payload)
          write_json(OUT_DIR / "promotion_items_upsert.json", promotion_items_payload)

          if not write_scope_ok:
              coverage_errors = []
              if target_validation_failures:
                  coverage_errors.append(f"target_validation_failures={len(target_validation_failures)}")
              if not artifact_self_check["artifact_self_check_ok"]:
                  coverage_errors.append("artifact_self_check_ok=false")
              if missing_target_cities:
                  coverage_errors.append(f"missing_target_cities={len(missing_target_cities)}")
              if missing_covered_target_cities:
                  coverage_errors.append(f"missing_covered_target_cities={len(missing_covered_target_cities)}")
              if missing_covered_target_retailers:
                  coverage_errors.append(f"missing_covered_target_retailers={len(missing_covered_target_retailers)}")
              if not product_hard_quality_ok:
                  coverage_errors.append(
                      f"product_hard_quality_failed(name>={minimum_name_pct_hard},category>={minimum_category_pct},placeholder_leaks=0)"
                  )
              message = "DB write blocked because the safe write scope is not trustworthy enough: " + ", ".join(coverage_errors)
              if WRITE_TO_SUPABASE:
                  raise SystemExit(message)
              log(message)
              log("WRITE_TO_SUPABASE=false -> payload built for inspection only. Safe write scope not approved.")
              sys.exit(0)

          if not WRITE_TO_SUPABASE:
              if write_mode == "partial_safe":
                  log("WRITE_TO_SUPABASE=false -> safe partial write is possible. Covered target stores would be updated; uncovered target stores would be left untouched.")
              else:
                  log("WRITE_TO_SUPABASE=false -> full target coverage achieved; DB write is ready.")
              sys.exit(0)

          safe_write_store_keys = set(covered_target_store_keys)
          prices_payload_to_write = [row for row in prices_payload if row["store_key"] in safe_write_store_keys]
          promotions_payload_to_write = [row for row in promotions_payload if row["store_key"] in safe_write_store_keys]
          promotion_store_key_by_key = {row["promotion_key"]: row["store_key"] for row in promotions_payload_to_write}
          promotion_items_payload_to_write = [row for row in promotion_items_payload if promotion_store_key_by_key.get(row["promotion_key"]) in safe_write_store_keys]
          processed_promotion_keys_to_write = {row["promotion_key"] for row in promotions_payload_to_write}

          post_upsert("products", "barcode", products_payload, 2000)
          post_upsert("stores", "store_key", stores_payload, 500)
          post_upsert("prices_current", "price_key", prices_payload_to_write, 5000)
          post_upsert("promotions_current", "promotion_key", promotions_payload_to_write, 2000)
          post_upsert("promotion_items_current", "promotion_item_key", promotion_items_payload_to_write, 5000)

          deactivated_missing_target_store_keys = {row["store_key"] for row in auto_deactivated_existing_target_rows}
          cleanup_non_current_store_keys = sorted(non_target_store_keys | legacy_store_keys_to_deactivate | deactivated_missing_target_store_keys)
          cleanup_non_current_batches = list(chunked(cleanup_non_current_store_keys, 200))
          successful_price_batches = list(chunked(sorted(safe_write_store_keys), 200))
          successful_promo_batches = list(chunked(sorted(safe_write_store_keys), 200))

          for batch in cleanup_non_current_batches:
              promo_keys_for_removed_stores = fetch_promotion_keys({"store_key": build_in_filter(batch)})
              delete_promotion_items_by_promotion_keys(promo_keys_for_removed_stores)
              delete_rows("prices_current", {"store_key": build_in_filter(batch)})
              delete_rows("promotions_current", {"store_key": build_in_filter(batch)})

          for batch in successful_price_batches:
              delete_rows(
                  "prices_current",
                  {
                      "store_key": build_in_filter(batch),
                      "last_seen_at": f"lt.{PRICE_STALE_BEFORE}",
                  },
              )

          for batch in successful_promo_batches:
              stale_promo_filters = {
                  "store_key": build_in_filter(batch),
                  "last_seen_at": f"lt.{RUN_TS_ISO}",
              }
              stale_promo_keys = fetch_promotion_keys(stale_promo_filters)
              delete_promotion_items_by_promotion_keys(stale_promo_keys)
              delete_rows(
                  "promotions_current",
                  stale_promo_filters,
              )

          if processed_promotion_keys_to_write:
              for batch in chunked(sorted(processed_promotion_keys_to_write), 200):
                  delete_rows(
                      "promotion_items_current",
                      {
                          "promotion_key": build_in_filter(batch),
                          "last_seen_at": f"lt.{RUN_TS_ISO}",
                      },
                  )

          if write_mode == "partial_safe":
              log(f"GlutiWise current sync completed in partial-safe mode. Updated {len(covered_target_store_keys)} covered target stores and left {len(uncovered_target_store_keys)} uncovered target stores untouched.")
          else:
              log("GlutiWise current sync completed successfully.")
          PY
          python3 -m py_compile sync_glutiwise.py
          python3 sync_glutiwise.py

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: glutiwise-current-sync-v10-${{ github.run_id }}
          path: out
